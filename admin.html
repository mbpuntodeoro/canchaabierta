<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Panel - Cancha Abierta</title>
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F8F9FB;
            --card: #ffffff;
            --text: #1C1C1E;
            --sub: #8E8E93;
            --border: #E5E5EA;
            --success: #34c759;
            --danger: #ff3b30;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; -webkit-font-smoothing: antialiased; }
        .container { max-width: 500px; margin: auto; }
        
        .login-card { background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); text-align: center; margin-top: 100px; border: 1px solid var(--border); }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-bottom: 16px; border: 1px solid var(--border); }
        
        h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 20px; }
        h2 { font-size: 14px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 15px 0; }

        label { font-size: 10px; font-weight: 700; color: var(--sub); text-transform: uppercase; display: block; margin: 0 0 6px 4px; }
        input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; outline: none; transition: 0.2s; background: #fff; margin-bottom: 12px; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(0,122,255,0.05); }

        .btn-main { background: var(--primary); color: white; width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 15px; transition: 0.2s; }
        
        /* Lista Clientes */
        .cliente-item { padding: 16px 0; border-bottom: 1px solid #F2F2F7; }
        .cliente-item:last-child { border-bottom: none; }
        
        .cli-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .cli-name { font-size: 16px; font-weight: 700; }
        
        /* Indicador de estado sutil */
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .dot-active { background: var(--success); }
        .dot-inactive { background: var(--danger); }

        .link-manager { background: #F9FAFB; padding: 12px; border-radius: 14px; margin: 10px 0; border: 1px solid #F0F0F2; }
        .link-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .link-input-small { margin-bottom: 0; padding: 8px 10px; font-size: 12px; flex: 1; }
        
        .btn-action { padding: 8px 12px; border-radius: 8px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; background: #fff; border: 1px solid var(--border); transition: 0.2s; display: flex; align-items: center; gap: 4px; }
        .btn-save { background: var(--text); color: #fff; border: none; }
        .btn-blue-soft { background: #E1F0FF; color: var(--primary); border: none; }
        .btn-green-soft { background: #E5FFE5; color: var(--success); border: none; }
        .btn-red-soft { background: #FFE5E5; color: var(--danger); border: none; }

        .cli-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .cli-stats { font-size: 11px; font-weight: 600; color: var(--sub); }
        .btn-del { color: var(--sub); font-size: 16px; background: none; border: none; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="login" class="login-card">
        <h1>MASTER PANEL</h1>
        <input type="password" id="p" placeholder="Contraseña Master">
        <button class="btn-main" onclick="entrar()">Ingresar</button>
    </div>

    <div id="panel" class="hidden">
        <div class="card">
            <h2>🚀 Nuevo Organizador</h2>
            <label>Nombre del Evento</label>
            <input type="text" id="n" placeholder="Ej: Lasigues El Abierto">
            <button class="btn-main" onclick="crear()">Crear Acceso</button>
        </div>

        <div class="card">
            <h2>📁 Mis Clientes</h2>
            <div id="lista">Cargando...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const baseURL = "https://mbpuntodeoro.github.io/canchaabierta/v.html";

    window.entrar = () => {
        if(document.getElementById('p').value === "Cancha2026") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
            cargar();
        } else { alert("Error"); }
    };

    window.crear = () => {
        const n = document.getElementById('n').value.trim();
        if(!n) return;
        const id = n.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
        set(ref(db, 'eventos/' + id), { organiza: n, cupo: 30, activo: true, bloqueado: false, password: "123", valor: 15000, alias: "tu.alias.mp" })
        .then(() => { document.getElementById('n').value = ""; });
    };

    function cargar() {
        onValue(ref(db, 'eventos'), (snap) => {
            const data = snap.val();
            const list = document.getElementById('lista');
            list.innerHTML = "";
            if(!data) { list.innerHTML = "No hay eventos."; return; }
            
            for(let id in data) {
                const ev = data[id];
                const insCount = ev.inscriptos ? ev.inscriptos.length : 0;
                const linkLargo = `${baseURL}?id=${id}`;
                const linkCorto = ev.linkCorto || "";
                
                list.innerHTML += `
                    <div class="cliente-item">
                        <div class="cli-top">
                            <div>
                                <span class="dot ${ev.activo ? 'dot-active' : 'dot-inactive'}"></span>
                                <span class="cli-name">${ev.organiza}</span>
                            </div>
                            <button class="btn-action ${ev.activo ? 'btn-red-soft' : 'btn-green-soft'}" onclick="toggleActivo('${id}', ${ev.activo})">
                                ${ev.activo ? '⏸️ Pausar' : '▶️ Activar'}
                            </button>
                        </div>
                        
                        <div class="link-manager">
                            <label>Link Corto</label>
                            <div class="link-row">
                                <input type="text" class="link-input-small" id="lc-${id}" value="${linkCorto}" placeholder="Pegar bit.ly aquí">
                                <button class="btn-action btn-save" onclick="guardarLink('${id}')">💾</button>
                            </div>
                            <div class="link-row" style="margin-top:10px;">
                                <button class="btn-action btn-blue-soft" onclick="copiar('${linkLargo}', 'Largo')">🔗 Largo</button>
                                <button class="btn-action btn-green-soft" onclick="copiar('${linkCorto}', 'Corto')">✂️ Corto</button>
                                <button class="btn-action" onclick="window.open('${linkLargo}')">✏️ Editar</button>
                            </div>
                        </div>

                        <div class="cli-bottom">
                            <span class="cli-stats">👥 ${insCount} | ID: ${id}</span>
                            <button class="btn-del" onclick="borrar('${id}')">🗑️</button>
                        </div>
                    </div>`;
            }
        });
    }

    window.guardarLink = (id) => {
        const nuevoLink = document.getElementById(`lc-${id}`).value.trim();
        update(ref(db, 'eventos/' + id), { linkCorto: nuevoLink }).then(() => alert("Link guardado"));
    };

    window.copiar = (url, tipo) => {
        if(!url) return alert("No hay link");
        navigator.clipboard.writeText(url);
        alert("Link " + tipo + " copiado");
    };

    window.toggleActivo = (id, actual) => {
        update(ref(db, 'eventos/' + id), { activo: !actual });
    };

    window.borrar = (id) => { if(confirm("¿Borrar definitivamente?")) remove(ref(db, 'eventos/'+id)); };
</script>
</body>
</html>
