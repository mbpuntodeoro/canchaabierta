<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cancher.App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js?v=27"></script>
    
    <style>
        /* --- SISTEMA DE DISEÑO CANCHER --- */
        :root { 
            --bg-base: #F7F7F7;
            --bg-white: #FFFFFF;
            --text-main: #111111;
            --text-sub: #6B7280;
            --border: #E5E7EB;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-base); color: var(--text-main); 
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* --- 1. HEADER (GLOBAL) --- */
        .header-global {
            background: var(--bg-white); padding: 16px;
            position: sticky; top: 0; z-index: 50;
        }
        .header-brand { font-size: 18px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .header-org { font-size: 13px; font-weight: 400; color: var(--text-sub); margin-top: 2px; }

        /* --- 2. CARTELERA --- */
        .cartelera-container { background: var(--bg-white); min-height: 100vh; padding-bottom: 40px; }
        .day-header {
            background: #F3F4F6; color: #374151; font-size: 13px; font-weight: 600;
            text-transform: uppercase; padding: 10px 16px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            position: sticky; top: 55px; z-index: 40;
        }
        .court-item {
            padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer;
            display: block; background: var(--bg-white); transition: background 0.1s ease;
        }
        .court-item:active { background: #F9FAFB; }
        .c-line-1 { display: flex; justify-content: space-between; align-items: flex-start; font-size: 16px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; line-height: 1.2; }
        .c-line-2 { font-size: 13px; color: var(--text-sub); margin-bottom: 4px; }
        .c-line-3 { font-size: 13px; color: var(--text-sub); }
        .c-cat-bold { font-weight: 600; color: var(--text-main); }
        #loading-init { text-align: center; padding: 40px 20px; font-size: 14px; font-weight: 600; color: var(--text-sub); }

        /* --- 3. INSCRIPCIÓN --- */
        .view-inscripcion {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base); z-index: 100;
            transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            overflow-y: auto; padding-bottom: 40px;
        }
        .view-inscripcion.active { transform: translateX(0); }

        .nav-back {
            padding: 16px; background: var(--bg-white); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; position: sticky; top: 0; z-index: 110;
            font-weight: 600; color: var(--text-main); font-size: 16px; cursor: pointer;
        }
        .nav-back svg { margin-right: 8px; }

        .content-pad { padding: 24px 16px; }
        
        .info-card {
            background: var(--bg-white); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 12px;
        }
        .i-title { font-size: 18px; font-weight: 800; margin-bottom: 12px; line-height: 1.2; text-transform: uppercase; }
        .i-row { font-size: 14px; color: var(--text-sub); margin-bottom: 6px; display: flex; align-items: center;}
        .i-row span { margin-left: 6px; }
        .i-price { margin-top: 16px; font-size: 16px; font-weight: 700; color: var(--text-main); }
        
        .scarcity-msg {
            font-size: 13px; font-weight: 500; color: var(--text-sub); background: #F3F4F6;
            padding: 10px 12px; border-radius: 8px; margin-bottom: 24px; text-align: center;
        }

        .form-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text-main); }

        .input-group { margin-bottom: 16px; }
        .input-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 6px; }
        .input-clean {
            width: 100%; height: 44px; padding: 10px 12px; font-size: 16px;
            border: 1px solid var(--border); border-radius: 8px; background: var(--bg-white);
            font-family: inherit; outline: none; transition: border 0.2s; color: var(--text-main);
        }
        .input-clean:focus { border-color: #111111; }
        select.input-clean {
            appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2214%22%20height%3D%2214%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23111%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 12px center;
        }

        /* Animación para nuevos campos */
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .total-box {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 32px; margin-bottom: 24px; padding-top: 16px; border-top: 1px solid var(--border);
        }
        .t-label { font-size: 14px; font-weight: 700; color: var(--text-sub); }
        .t-amount { font-size: 24px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px;}

        .btn-black {
            width: 100%; height: 48px; background: #111111; color: #FFFFFF;
            border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s ease;
        }
        .btn-black:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <header class="header-global">
        <div class="header-brand">CANCHER</div>
        <div class="header-org" id="t-org-name">Cargando...</div>
    </header>

    <main id="app-content">
        <div id="loading-init">Buscando canchas...</div>
        <div id="court-list-container"></div>
    </main>

    <div id="view-inscripcion" class="view-inscripcion">
        <div class="nav-back" onclick="cerrarInscripcion()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            Atrás
        </div>
        <div class="content-pad">
            
            <div class="info-card">
                <div class="i-title" id="ins-title">--</div>
                <div class="i-row">📅 <span id="ins-date">--</span></div>
                <div class="i-row" id="ins-loc-container">📍 <span id="ins-loc">--</span></div>
                <div class="i-row">👤 <span>Organiza: <span id="ins-org">--</span></span></div>
                <div class="i-price"><span id="ins-price">--</span> por jugador</div>
            </div>
            
            <div class="scarcity-msg">⚡ Esta cancha suele completarse rápido</div>

            <div class="form-title">Tus datos (Titular)</div>
            
            <div style="display:flex; gap:12px;">
                <div class="input-group" style="flex:1;">
                    <label class="input-label">Nombre</label>
                    <input type="text" id="ins-nombre" class="input-clean" placeholder="Ej: Juan">
                </div>
                <div class="input-group" style="flex:1;">
                    <label class="input-label">Apellido</label>
                    <input type="text" id="ins-apellido" class="input-clean" placeholder="Ej: Pérez">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Tu WhatsApp</label>
                <input type="tel" inputmode="numeric" pattern="[0-9]*" id="ins-celu" class="input-clean" placeholder="Ej: 1122334455">
            </div>

            <div class="input-group" style="margin-top: 24px;">
                <label class="input-label" style="color: var(--text-sub);">¿A cuántos jugadores anotás?</label>
                <select id="ins-lugares" class="input-clean" onchange="actualizarTotal()">
                    <option value="1">Solo yo</option>
                    <option value="2">Yo + 1</option>
                    <option value="3">Yo + 2</option>
                    <option value="4">Yo + 3</option>
                </select>
            </div>

            <div id="extra-players-container"></div>

            <div class="total-box">
                <div class="t-label">TOTAL</div>
                <div class="t-amount" id="ins-total-calc">$0</div>
            </div>

            <button class="btn-black" onclick="avanzarPaso4()">Anotarme ahora</button>
        </div>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orgId = urlParams.get('org');
    let dbEvents = [];
    let currentEventData = null;

    if(!orgId) {
        document.getElementById('loading-init').innerText = "Enlace incompleto.";
    } else {
        cargarBase();
    }

    function cargarBase() {
        db.ref(`facturacion/${orgId}/cuenta`).once('value', snap => {
            const cuenta = snap.val() || {};
            document.getElementById('t-org-name').innerText = `Organizado por ${cuenta.nombreOrg || "Club"}`;
        });

        db.ref('hubs/' + orgId).on('value', async (snap) => {
            const listContainer = document.getElementById('court-list-container');
            document.getElementById('loading-init').style.display = 'none';
            const hubData = snap.val();
            if (!hubData || !hubData.canchas) {
                listContainer.innerHTML = "<div style='text-align:center; padding:40px; color:var(--text-sub); font-size:14px;'>No hay canchas publicadas.</div>";
                return;
            }
            const promesas = hubData.canchas.map(cid => db.ref('eventos/' + cid).once('value'));
            const snapshots = await Promise.all(promesas);
            dbEvents = [];
            snapshots.forEach(s => { if(s.exists()) dbEvents.push({ id: s.key, ...s.val() }); });
            dbEvents.sort((a,b) => new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));

            let htmlAcumulado = "<div class='cartelera-container'>";
            let lastDate = ""; let canchasActivas = 0;
            dbEvents.forEach((d) => {
                const ahora = Date.now();
                let horaFinReal = d.horaFin || '23:59';
                let finEvento = new Date(d.fecha + 'T' + horaFinReal).getTime();
                if (d.hora && horaFinReal < d.hora) finEvento += 86400000;
                if (ahora <= finEvento || d.tipo === 'recurrente') {
                    canchasActivas++;
                    if (d.fecha !== lastDate) {
                        htmlAcumulado += `<div class="day-header">${formatearDiaHeader(d.fecha)}</div>`;
                        lastDate = d.fecha;
                    }
                    let tituloCancha = d.organiza || 'Cancha';
                    htmlAcumulado += `
                        <div class="court-item" onclick="abrirInscripcion('${d.id}')">
                            <div class="c-line-1"><span>${tituloCancha.toUpperCase()}</span><span>${PadelUtils.fmtDinero(d.valor)}</span></div>
                            <div class="c-line-2">📅 ${formatearDiaCorto(d.fecha)} · ${d.hora} a ${d.horaFin || '--'} hs</div>
                            ${d.lugar ? `<div class="c-line-2">📍 ${d.lugar}</div>` : ''}
                            <div class="c-line-3">🎾 Categoría: <span class="c-cat-bold">${d.categorias || 'Todas'}</span></div>
                        </div>`;
                }
            });
            listContainer.innerHTML = canchasActivas === 0 ? "<div style='text-align:center; padding:40px; color:var(--text-sub); font-size:14px;'>No hay canchas publicadas hoy.</div>" : htmlAcumulado + "</div>";
        });
    }

    function abrirInscripcion(id) {
        currentEventData = dbEvents.find(e => e.id === id);
        if(!currentEventData) return;
        document.getElementById('ins-title').innerText = currentEventData.organiza || 'Cancha';
        document.getElementById('ins-date').innerText = `${formatearDiaCorto(currentEventData.fecha)} · ${currentEventData.hora} a ${currentEventData.horaFin || '--'} hs`;
        document.getElementById('ins-loc-container').style.display = currentEventData.lugar ? 'flex' : 'none';
        if(currentEventData.lugar) document.getElementById('ins-loc').innerText = currentEventData.lugar;
        document.getElementById('ins-org').innerText = currentEventData.nombreOrganizador || 'Organizador';
        document.getElementById('ins-price').innerText = PadelUtils.fmtDinero(currentEventData.valor);
        document.getElementById('ins-lugares').value = "1";
        actualizarTotal();
        document.getElementById('view-inscripcion').classList.add('active');
        document.body.style.overflow = 'hidden'; 
    }

    function cerrarInscripcion() {
        document.getElementById('view-inscripcion').classList.remove('active');
        document.body.style.overflow = '';
        currentEventData = null;
    }

    function actualizarTotal() {
        if(!currentEventData) return;
        const lugares = parseInt(document.getElementById('ins-lugares').value) || 1;
        const total = lugares * (currentEventData.valor || 0);
        document.getElementById('ins-total-calc').innerText = PadelUtils.fmtDinero(total);
        
        // Renderizar campos extra si corresponde
        renderExtraPlayers(lugares);
    }

    function renderExtraPlayers(lugares) {
        const container = document.getElementById('extra-players-container');
        container.innerHTML = '';
        
        for (let i = 2; i <= lugares; i++) {
            const div = document.createElement('div');
            div.style.marginTop = '24px';
            div.style.animation = 'fadeSlide 0.2s ease';
            div.innerHTML = `
                <div class="form-title" style="font-size: 14px; margin-bottom: 12px; color: var(--text-sub);">Datos Jugador ${i}</div>
                <div style="display:flex; gap:12px;">
                    <div class="input-group" style="flex:1;">
                        <label class="input-label">Nombre</label>
                        <input type="text" class="input-clean extra-nombre" placeholder="Nombre">
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label class="input-label">Apellido</label>
                        <input type="text" class="input-clean extra-apellido" placeholder="Apellido">
                    </div>
                </div>
            `;
            container.appendChild(div);
        }
    }

    function avanzarPaso4() {
        const nom = document.getElementById('ins-nombre').value.trim();
        const ape = document.getElementById('ins-apellido').value.trim();
        const celu = document.getElementById('ins-celu').value.trim();
        
        if(!nom || !ape || !celu) {
            alert("Completá tus datos para avanzar."); return;
        }

        // Validar jugadores extra
        const extraNombres = document.querySelectorAll('.extra-nombre');
        const extraApellidos = document.querySelectorAll('.extra-apellido');
        for (let i = 0; i < extraNombres.length; i++) {
            if(!extraNombres[i].value.trim() || !extraApellidos[i].value.trim()) {
                alert(`Completá los datos del Jugador ${i + 2}`);
                return;
            }
        }

        alert("Paso 3 validado. ¡Vamos a la confirmación de pago!");
    }

    function formatearDiaHeader(fechaStr) {
        const dias = ['DOMINGO', 'LUNES', 'MARTES', 'MIÉRCOLES', 'JUEVES', 'VIERNES', 'SÁBADO'];
        const meses = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
        const f = new Date(fechaStr + 'T12:00:00');
        return `${dias[f.getDay()]} ${f.getDate()} ${meses[f.getMonth()]}`;
    }

    function formatearDiaCorto(fechaStr) {
        const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
        const f = new Date(fechaStr + 'T12:00:00');
        return `${dias[f.getDay()]} ${f.getDate()}`;
    }
</script>
</body>
</html>
