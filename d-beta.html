<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard - PadelApp</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script src="app-config.js?v=21"></script>

    <style>
        :root {
            --bg-main:#F2F2F7;--bg-card:#fff;--bg-dark:#1C1C1E;
            --text-primary:#1C1C1E;--text-secondary:#8E8E93;--text-inverse:#fff;
            --blue:#007AFF;--green:#34C759;--orange:#FF9F0A;--red:#FF3B30;
            --border:#E5E5EA;
            --r-lg:24px;--r-md:16px;
        }

        body{font-family:Outfit,-apple-system,sans-serif;background:var(--bg-main);margin:0;padding:16px;color:var(--text-primary)}
        .h1{font-size:28px;font-weight:900;margin:0}
        .container{max-width:520px;margin:auto;display:none}
        .card{background:#fff;border-radius:var(--r-lg);padding:16px}
        .btn{width:100%;padding:14px;border-radius:14px;border:none;font-weight:800;cursor:pointer}
        .btn-primary{background:var(--blue);color:#fff}
        .btn-dark{background:#111;color:#fff}
        .btn-light{background:#eee}
        .input{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);margin-bottom:10px}

        #boot-screen{display:flex;align-items:center;justify-content:center;height:90vh;flex-direction:column}
        .spinner{width:40px;height:40px;border:4px solid #ddd;border-top:4px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
        .modal-content{background:#fff;padding:16px;border-radius:16px;max-width:500px;width:100%}
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="spinner"></div>
    <h3>Cargando...</h3>
</div>

<div id="login-screen" style="display:none;">
    <div class="container" style="display:block">
        <div class="card">
            <h1 class="h1">PadelApp</h1>
            <input id="log-email" class="input" placeholder="Email">
            <input id="log-pass" type="password" class="input" placeholder="Password">
            <button class="btn btn-dark" onclick="iniciarSesion()">Ingresar</button>
            <p id="log-error" style="color:red;display:none">Error login</p>
        </div>
    </div>
</div>

<div id="app-content">
    <div class="container" id="main-container">
        <header style="display:flex;justify-content:space-between;align-items:center">
            <h1 id="org-name-disp" class="h1">...</h1>
            <button onclick="cerrarSesion()" style="color:red;background:none;border:none">Salir</button>
        </header>

        <div id="canchas-list">Cargando...</div>

        <button class="btn btn-dark" onclick="abrirNuevaCancha()">Agregar cancha</button>
    </div>
</div>

<div id="modal-players" class="modal">
    <div class="modal-content">
        <h2>Jugadores</h2>
        <input type="hidden" id="pl-id"/>
        <div id="players-list"></div>
        <button class="btn btn-dark" onclick="cerrarModals()">Cerrar</button>
    </div>
</div>

<script>
let orgId = new URLSearchParams(window.location.search).get('org');
let courtData = {};
let currentPlayerRef = null;
let playersListener = null;
let dbRefSafe = null;

function safe(el){return document.getElementById(el)}

window.addEventListener('DOMContentLoaded',()=>{
    setTimeout(()=>{
        document.getElementById('boot-screen').style.display='none';
        document.getElementById('login-screen').style.display='block';
    },800);
});

window.iniciarSesion = function(){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-content').style.display='block';
    document.getElementById('main-container').style.display='block';
}

window.cerrarSesion=function(){location.reload()}

window.abrirJugadores=function(id){
    safe('pl-id').value=id;
    const ref=db.ref('eventos/'+id);

    if(currentPlayerRef && playersListener){
        currentPlayerRef.off('value',playersListener);
    }

    currentPlayerRef=ref;

    playersListener=function(s){
        const d=s.val();if(!d)return;
        const ins=d.inscriptos||[];

        let html='';
        ins.forEach((p,i)=>{
            html+=`<div style='display:flex;justify-content:space-between;margin:6px 0'>
                <span>${p.nombre}</span>
                <button onclick="togglePago(${i})">${p.estado||'pendiente'}</button>
                <button onclick="borrarP(${i})">x</button>
            </div>`;
        });

        safe('players-list').innerHTML=html;
    };

    currentPlayerRef.on('value',playersListener);
    document.getElementById('modal-players').style.display='flex';
}

window.cerrarModals=function(){
    document.querySelectorAll('.modal').forEach(m=>m.style.display='none');

    if(currentPlayerRef && playersListener){
        currentPlayerRef.off('value',playersListener);
        currentPlayerRef=null;
        playersListener=null;
    }
}

window.togglePago=function(i){
    const id=safe('pl-id').value;
    db.ref(`eventos/${id}/inscriptos/${i}/estado`).once('value',s=>{
        const v=s.val();
        const next=v==='pagado'?'pendiente':'pagado';
        db.ref(`eventos/${id}/inscriptos/${i}/estado`).set(next);
    });
}

window.borrarP=function(i){
    const id=safe('pl-id').value;
    db.ref(`eventos/${id}/inscriptos`).once('value',s=>{
        let arr=s.val()||[];
        arr.splice(i,1);
        db.ref(`eventos/${id}/inscriptos`).set(arr);
    });
}

function renderizarCanchas(){
    const el=safe('canchas-list');
    if(!el) return;
    el.innerHTML='OK dashboard cargado';
}

</script>

</body>
</html>
