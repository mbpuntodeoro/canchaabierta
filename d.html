<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Organizador - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ff9500; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; }
        .hero { background: #1d1d1f; color: white; padding: 25px; border-radius: 28px; margin-bottom: 20px; }
        .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .fin-box { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 18px; text-align: center; }
        .fin-box span { font-size: 9px; text-transform: uppercase; color: #aaa; font-weight: 800; display: block; margin-bottom: 5px; }
        .cancha-card { background: white; padding: 20px; border-radius: 24px; border: 1.5px solid #f2f2f7; margin-bottom: 12px; position: relative; }
        .cancha-card.disabled { opacity: 0.6; filter: grayscale(1); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); font-weight: 600; margin-bottom: 6px; }
        .btn-dash { border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 11px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 8px; }
        .btn-config { background: #f2f2f7; color: var(--text); } .btn-players { background: #000; color: #fff; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 30px; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none !important; }
        .input-std { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; font-family: inherit; }
        .switch-box { background: #f8f9fb; padding: 15px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border: 1px solid #eee; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 10px 0 4px 5px; }
    </style>
</head>
<body>
    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1 id="org-name-disp" style="margin:0; font-weight:900; letter-spacing:-1.5px">...</h1>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--sub); font-weight:800; cursor:pointer">ACTUALIZAR</button>
        </header>

        <div class="hero">
            <span>Balance del Club</span>
            <div class="fin-grid">
                <div class="fin-box"><span>Deuda</span><b id="txt-deu">$0</b></div>
                <div class="fin-box"><span>Límite</span><b id="txt-lim">$0</b></div>
            </div>
        </div>

        <div id="canchas-list">Cargando...</div>
    </div>

    <div id="modal-config" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">Configuración</h2>
            
            <div class="switch-box">
                <b style="font-size: 13px;">ESTADO DE LA CANCHA</b>
                <select id="ed-status" class="input-std" style="width: auto; margin:0; padding: 8px;">
                    <option value="activa">✅ ACTIVA</option>
                    <option value="deshabilitada">🚫 DESHABILITADA</option>
                </select>
            </div>

            <label>Nombre Cancha</label><input id="ed-org" class="input-std">
            <label>🏷️ Categorías</label><input id="ed-cat" class="input-std">
            <label>📍 Lugar</label><input id="ed-lug" class="input-std">
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>📅 Fecha</label><input id="ed-fec" type="date" class="input-std"></div>
                <div><label>👥 Cupo</label><input id="ed-cup" type="number" class="input-std"></div>
            </div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>🕒 Inicio</label><input id="ed-h1" type="time" class="input-std"></div>
                <div><label>🕒 Fin</label><input id="ed-h2" type="time" class="input-std"></div>
            </div>

            <label>💰 Precio por Persona</label><input id="ed-val" type="number" class="input-std">
            <label>Alias Mercado Pago</label><input id="ed-ali" class="input-std">
            
            <button onclick="window.guardarConfig()" style="width:100%; padding:18px; border-radius:18px; border:none; font-weight:900; background:var(--primary); color:white; cursor:pointer">GUARDAR CAMBIOS</button>
            <button onclick="window.cerrarModals()" style="width:100%; padding:15px; border-radius:18px; border:none; font-weight:800; background:#eee; color:#333; margin-top:10px; cursor:pointer">CANCELAR</button>
        </div>
    </div>

    <div id="modal-players" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">👥 Jugadores</h2>
            <div id="players-list"></div>
            <button onclick="window.cerrarModals()" style="width:100%; padding:18px; border-radius:18px; border:none; font-weight:900; background:#000; color:white; cursor:pointer; margin-top:20px">CERRAR</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI", authDomain: "padelapp-e72af.firebaseapp.com", databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com", projectId: "padelapp-e72af", storageBucket: "padelapp-e72af.appspot.com", messagingSenderId: "806914592971", appId: "1:806914592971:web:84720063fc36a882b40b4e" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);
    const orgId = new URLSearchParams(window.location.search).get('org');
    let currentCanchaId = null;

    if(orgId) {
        onValue(ref(db, `facturacion/${orgId}/cuenta`), snap => {
            const f = snap.val() || {};
            document.getElementById('org-name-disp').innerText = f.nombreOrg || orgId;
            document.getElementById('txt-deu').innerText = "$" + (f.consumoActual || 0).toLocaleString();
            document.getElementById('txt-lim').innerText = "$" + (f.limiteCredito || 0).toLocaleString();
            renderCanchas();
        });
    }

    async function renderCanchas() {
        const hSnap = await get(ref(db, 'hubs/'+orgId)); const h = hSnap.val() || {};
        const list = document.getElementById('canchas-list'); list.innerHTML = "";
        for(let id of (h.canchas || [])) {
            const s = await get(ref(db, 'eventos/'+id));
            if(s.exists()) {
                const d = s.val(); const isDisabled = d.estado === 'deshabilitada';
                const card = document.createElement('div');
                card.className = `cancha-card ${isDisabled ? 'disabled' : ''}`;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between"><b>🎾 ${d.organiza}</b> <span class="tag-cat">${d.categorias || 'Gral'}</span></div>
                    <div class="info-row">📅 ${d.fecha} | 🕒 ${d.hora} HS ${isDisabled ? '| 🚫 DESHABILITADA' : ''}</div>
                    <div class="info-row">📍 ${d.lugar || 'Sede a definir'}</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px">
                        <button class="btn-dash btn-config" onclick="window.abrirConfig('${id}')">⚙️ CONFIG</button>
                        <button class="btn-dash btn-players" onclick="window.abrirJugadores('${id}')">👥 JUGADORES</button>
                    </div>`;
                list.appendChild(card);
            }
        }
    }

    window.abrirConfig = async (id) => {
        currentCanchaId = id; const s = await get(ref(db, 'eventos/'+id)); const d = s.val();
        document.getElementById('ed-status').value = d.estado || 'activa';
        document.getElementById('ed-org').value = d.organiza || "";
        document.getElementById('ed-cat').value = d.categorias || "";
        document.getElementById('ed-lug').value = d.lugar || "";
        document.getElementById('ed-fec').value = d.fecha || "";
        document.getElementById('ed-h1').value = d.hora || "";
        document.getElementById('ed-h2').value = d.horaFin || "";
        document.getElementById('ed-cup').value = d.cupo || 0;
        document.getElementById('ed-val').value = d.valor || 0;
        document.getElementById('ed-ali').value = d.alias || "";
        document.getElementById('modal-config').classList.remove('hidden');
    };

    window.guardarConfig = async () => {
        const updates = {
            estado: document.getElementById('ed-status').value,
            organiza: document.getElementById('ed-org').value,
            categorias: document.getElementById('ed-cat').value,
            lugar: document.getElementById('ed-lug').value,
            fecha: document.getElementById('ed-fec').value,
            hora: document.getElementById('ed-h1').value,
            horaFin: document.getElementById('ed-h2').value,
            cupo: parseInt(document.getElementById('ed-cup').value),
            valor: parseInt(document.getElementById('ed-val').value),
            alias: document.getElementById('ed-ali').value
        };
        await update(ref(db, 'eventos/'+currentCanchaId), updates);
        alert("¡Guardado correctamente!"); window.cerrarModals();
    }

    window.abrirJugadores = async (id) => {
        const s = await get(ref(db, `eventos/${id}/inscriptos`)); const ins = s.val() || [];
        const list = document.getElementById('players-list'); list.innerHTML = ins.length ? "" : "No hay inscriptos";
        ins.forEach(p => { list.innerHTML += `<div class="player-row"><b>${p.nombre}</b> - ${p.estado}</div>`; });
        document.getElementById('modal-players').classList.remove('hidden');
    };

    window.cerrarModals = () => { document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden')); };
</script>
</body>
</html>
