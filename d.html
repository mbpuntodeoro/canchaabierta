<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Gestión - SGCA</title>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 24px; box-shadow: var(--shadow); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.02); }
        .hero { background: #1d1d1f; color: white; padding: 30px 25px; }
        .hero span { font-size: 11px; text-transform: uppercase; opacity: 0.7; font-weight: 800; }
        .hero h2 { font-size: 36px; margin: 10px 0; letter-spacing: -1.5px; }
        
        /* GESTIÓN DE CANCHAS */
        .cancha-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 18px; border: 1px solid #f2f2f7; margin-bottom: 10px; }
        .cancha-info b { display: block; font-size: 15px; text-transform: uppercase; }
        .cancha-info span { font-size: 12px; color: var(--sub); font-weight: 600; }
        .btn-manage { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 800; font-size: 12px; cursor: pointer; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 28px; max-height: 90vh; overflow-y: auto; }
        
        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 15px 0 6px 6px; }
        .input-std { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid #e5e5e7; font-size: 15px; outline: none; }
        .btn-full { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 800; background: var(--primary); color: white; cursor: pointer; }
        .hidden { display: none !important; }
        
        .player-row { display: flex; align-items: center; padding: 10px; background: #f8f9fb; border-radius: 12px; margin-bottom: 5px; gap: 10px; }
        .btn-status { flex: 1; padding: 8px; border-radius: 8px; border: none; color: white; font-weight: 800; font-size: 10px; text-transform: uppercase; }
        .pagado { background: var(--success); } .pendiente { background: var(--danger); } .paga-en-la-cancha { background: #FF9500; }
    </style>
</head>
<body>
<div class="container">
    <div id="auth-view" class="card" style="margin-top:50px; text-align:center;">
        <h1 style="font-size:24px; font-weight:900;">Acceso Organizador</h1>
        <input type="password" id="pass-dash" class="input-std" placeholder="Clave de Gestión" style="text-align:center;">
        <button class="btn-full" onclick="validarAcceso()" style="margin-top:10px;">Entrar</button>
    </div>

    <div id="dash-view" class="hidden">
        <div class="card hero">
            <span>Recaudación Real (Turnos Finalizados)</span>
            <h2 id="txt-ingresos">$0</h2>
            <p id="txt-plan" style="font-size:12px; font-weight:700; color:var(--success); margin:0;">Plan Pro Activo</p>
        </div>

        <h3 style="margin: 25px 0 10px 10px; font-size:14px; color:var(--sub); text-transform:uppercase;">Mis Turnos y Canchas</h3>
        <div id="canchas-list"></div>

        <div class="card" style="margin-top:30px;">
            <label>Inversión en el Sistema</label>
            <h2 id="txt-costo" style="margin:5px 0; font-size:28px;">$0</h2>
            <div style="background:#f2f2f7; height:8px; border-radius:10px; margin:10px 0;"><div id="bar-fill" style="background:var(--primary); height:100%; width:0%; border-radius:10px;"></div></div>
            <p style="font-size:11px; color:var(--sub); font-weight:600;">Límite de crédito: <span id="txt-limite">$0</span></p>
        </div>
    </div>
</div>

<div id="modal-cancha" class="modal hidden">
    <div class="modal-content">
        <h2 id="edit-title" style="margin:0 0 20px 0;">Gestionar Turno</h2>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Horario</label><input id="ed-hora" class="input-std" type="time"></div>
            <div><label>Precio ($)</label><input id="ed-valor" class="input-std" type="number"></div>
        </div>
        
        <label>Estado Inscripciones</label>
        <select id="ed-status" class="input-std"><option value="abiertas">Abiertas</option><option value="cerradas">Cerradas</option></select>

        <h4 style="margin: 20px 0 10px 0; font-size:12px; text-transform:uppercase;">Jugadores Anotados</h4>
        <div id="players-list" style="margin-bottom:20px;"></div>

        <button class="btn-full" onclick="guardarCancha()">Guardar Cambios</button>
        <button class="btn-full" onclick="cerrarModal()" style="background:#f2f2f7; color:var(--text); margin-top:10px;">Cerrar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const params = new URLSearchParams(window.location.search);
    const orgId = params.get('org');
    let currentCanchaId = null, currentEv = {};

    window.validarAcceso = async () => {
        const pass = document.getElementById('pass-dash').value;
        const hubSnap = await get(ref(db, 'hubs/'+orgId));
        const canchas = hubSnap.val()?.canchas || [];
        const evSnap = await get(ref(db, 'eventos/'+canchas[0]));
        if(evSnap.val()?.password === pass) {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('dash-view').classList.remove('hidden');
            renderDash();
        } else { alert("Clave Incorrecta"); }
    };

    function renderDash() {
        // 1. Facturación
        onValue(ref(db, 'facturacion/'+orgId), snap => {
            const d = snap.val() || {}; const c = d.cuenta || {};
            document.getElementById('txt-costo').innerText = '$' + (c.consumoActual || 0).toLocaleString();
            document.getElementById('txt-limite').innerText = '$' + (c.limiteCredito || 30000).toLocaleString();
            const perc = (c.consumoActual / (c.limiteCredito || 30000)) * 100;
            document.getElementById('bar-fill').style.width = perc + '%';
            
            let totalRecaudado = 0;
            Object.values(d.ingresos || {}).forEach(i => totalRecaudado += i.monto);
            document.getElementById('txt-ingresos').innerText = '$' + totalRecaudado.toLocaleString();
        });

        // 2. Lista de Canchas
        onValue(ref(db, 'hubs/'+orgId), async snap => {
            const canchas = snap.val()?.canchas || [];
            const list = document.getElementById('canchas-list'); list.innerHTML = "";
            for(let id of canchas) {
                const s = await get(ref(db, 'eventos/'+id)); const d = s.val();
                if(d) {
                    const div = document.createElement('div'); div.className = "cancha-card";
                    div.innerHTML = `<div class="cancha-info"><b>${d.organiza}</b><span>${d.hora} HS | ${(d.inscriptos||[]).length}/${d.cupo} Jugadores</span></div><button class="btn-manage" onclick="abrirCancha('${id}')">GESTIONAR</button>`;
                    list.appendChild(div);
                }
            }
        });
    }

    window.abrirCancha = async (id) => {
        currentCanchaId = id;
        const s = await get(ref(db, 'eventos/'+id)); currentEv = s.val();
        document.getElementById('edit-title').innerText = currentEv.organiza;
        document.getElementById('ed-hora').value = currentEv.hora;
        document.getElementById('ed-valor').value = currentEv.valor;
        document.getElementById('ed-status').value = currentEv.inscripcionesCerradas ? 'cerradas' : 'abiertas';
        
        const pList = document.getElementById('players-list'); pList.innerHTML = "";
        (currentEv.inscriptos || []).forEach((p, idx) => {
            pList.innerHTML += `<div class="player-row"><span>${p.nombre}</span><button class="btn-status ${p.estado}" onclick="cambiarPago(${idx})">${p.estado}</button><button onclick="borrarPlayer(${idx})" style="background:none; border:none; color:var(--danger);">🗑️</button></div>`;
        });
        document.getElementById('modal-cancha').classList.remove('hidden');
    };

    window.cambiarPago = (idx) => {
        const est = ["pendiente", "paga-en-la-cancha", "pagado"];
        currentEv.inscriptos[idx].estado = est[(est.indexOf(currentEv.inscriptos[idx].estado) + 1) % 3];
        update(ref(db, 'eventos/'+currentCanchaId), { inscriptos: currentEv.inscriptos }).then(() => abrirCancha(currentCanchaId));
    };

    window.borrarPlayer = (idx) => {
        if(confirm("¿Borrar jugador?")) {
            currentEv.inscriptos.splice(idx, 1);
            update(ref(db, 'eventos/'+currentCanchaId), { inscriptos: currentEv.inscriptos }).then(() => abrirCancha(currentCanchaId));
        }
    };

    window.guardarCancha = () => {
        const updates = {
            hora: document.getElementById('ed-hora').value,
            valor: parseInt(document.getElementById('ed-valor').value),
            inscripcionesCerradas: document.getElementById('ed-status').value === 'cerradas'
        };
        update(ref(db, 'eventos/'+currentCanchaId), updates).then(() => { alert("Guardado!"); cerrarModal(); });
    };

    window.cerrarModal = () => document.getElementById('modal-cancha').classList.add('hidden');
</script>
</body>
</html>
