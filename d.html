<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Organizador - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ff9500; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; }
        
        /* HEADER Y HERO */
        .hero { background: #1d1d1f; color: white; padding: 25px; border-radius: 28px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .fin-box { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 18px; text-align: center; }
        .fin-box span { font-size: 9px; text-transform: uppercase; color: #aaa; font-weight: 800; display: block; margin-bottom: 5px; }
        .fin-box b { font-size: 16px; font-weight: 900; }

        /* CANCHA CARD */
        .cancha-card { background: white; border-radius: 24px; border: 1.5px solid #f2f2f7; margin-bottom: 12px; padding: 20px; box-shadow: var(--shadow); }
        .cancha-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); font-weight: 600; margin-bottom: 6px; }
        
        /* BOTONES */
        .btn-dash { border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 11px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 8px; }
        .btn-config { background: #f2f2f7; color: var(--text); } 
        .btn-players { background: #000; color: #fff; }
        .btn-full { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 900; background: var(--primary); color: white; cursor: pointer; margin-bottom: 20px; }

        /* MODALES */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 30px; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none !important; }
        .player-row { display: flex; align-items: center; padding: 12px; background: #f8f9fb; border-radius: 14px; margin-bottom: 6px; gap: 10px; border: 1px solid #eee; }
        .btn-status { flex: 1; padding: 10px; border-radius: 10px; border: none; color: white; font-weight: 800; font-size: 9px; cursor: pointer; }
        .pagado { background: var(--success); } .pendiente { background: var(--danger); } .paga-en-la-cancha { background: var(--warning); }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 10px 0 4px 5px; }
        .input-std { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; font-family: inherit; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1 id="org-name-disp" style="margin:0; font-weight:900; letter-spacing:-1.5px">...</h1>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--sub); font-weight:800; cursor:pointer">SALIR</button>
        </header>

        <div class="hero">
            <span>Balance del Club</span>
            <div class="fin-grid">
                <div class="fin-box"><span>Deuda Actual</span><b id="txt-deu">$0</b></div>
                <div class="fin-box"><span>Crédito Disp.</span><b id="txt-lim">$0</b></div>
            </div>
        </div>

        <button class="btn-full" id="btn-share">🔗 COMPARTIR CARTELERA PÚBLICA</button>
        
        <div id="canchas-list">Cargando tus canchas...</div>
    </div>

    <div id="modal-players" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">👥 Lista de Jugadores</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:20px">
                <div class="fin-box" style="background:#f8f9fb; color:#333"><span>Conf</span><b id="st-pag" style="color:var(--success)">0</b></div>
                <div class="fin-box" style="background:#f8f9fb; color:#333"><span>Pend</span><b id="st-pen" style="color:var(--danger)">0</b></div>
                <div class="fin-box" style="background:#f8f9fb; color:#333"><span>Libre</span><b id="st-lib" style="color:var(--primary)">0</b></div>
            </div>
            <div id="players-list"></div>
            <button class="btn-full" onclick="window.cerrarModals()" style="background:#000; margin-top:20px">CERRAR</button>
        </div>
    </div>

    <div id="modal-config" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">Configurar Cancha</h2>
            <label>Nombre Cancha</label><input id="ed-org" class="input-std">
            <label>🏷️ Categorías</label><input id="ed-cat" class="input-std">
            <label>📍 Lugar</label><input id="ed-lug" class="input-std">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>📅 Fecha</label><input id="ed-fec" type="date" class="input-std"></div>
                <div><label>👥 Cupo</label><input id="ed-cup" type="number" class="input-std"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>🕒 Inicio</label><input id="ed-h1" type="time" class="input-std"></div>
                <div><label>🕒 Fin</label><input id="ed-h2" type="time" class="input-std"></div>
            </div>
            <label>Alias Mercado Pago</label><input id="ed-ali" class="input-std">
            <button class="btn-full" onclick="window.guardarConfig()">GUARDAR</button>
            <button class="btn-full" onclick="window.cerrarModals()" style="background:#eee; color:#333; margin-top:10px">CANCELAR</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI", authDomain: "padelapp-e72af.firebaseapp.com", databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com", projectId: "padelapp-e72af", storageBucket: "padelapp-e72af.appspot.com", messagingSenderId: "806914592971", appId: "1:806914592971:web:84720063fc36a882b40b4e" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);
    
    const orgId = new URLSearchParams(window.location.search).get('org');
    let currentCanchaId = null;
    let currentCanchaData = null;

    // FORMATO DE FECHA PROFESIONAL
    const fmtFechaHumana = (f, h1, h2) => {
        if(!f) return '--';
        const ds = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const [y, m, d] = f.split('-'); const dO = new Date(y, m - 1, d);
        return `${ds[dO.getDay()]} ${parseInt(d)}/${parseInt(m)} de ${h1} a ${h2 || '--'} hs`;
    };

    // CARGA DE DATOS FINANCIEROS
    if(orgId) {
        onValue(ref(db, `facturacion/${orgId}/cuenta`), snap => {
            const f = snap.val() || {};
            document.getElementById('org-name-disp').innerText = f.nombreOrg || orgId;
            document.getElementById('txt-deu').innerText = "$" + (f.consumoActual || 0).toLocaleString();
            document.getElementById('txt-lim').innerText = "$" + (f.limiteCredito || 0).toLocaleString();
            renderCanchas();
        });
    }

    // RENDER DE TARJETAS
    async function renderCanchas() {
        const hSnap = await get(ref(db, 'hubs/'+orgId)); 
        const h = hSnap.val() || {};
        const list = document.getElementById('canchas-list'); 
        list.innerHTML = "";
        
        let canchas = [];
        for(let id of (h.canchas || [])) {
            const s = await get(ref(db, 'eventos/'+id));
            if(s.exists()) canchas.push({ id, ...s.val() });
        }
        
        canchas.sort((a,b) => new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));
        
        canchas.forEach(d => {
            const conf = (d.inscriptos || []).filter(p => p.estado !== 'pendiente').length;
            const item = document.createElement('div'); 
            item.className = "cancha-card";
            item.innerHTML = `
                <div class="cancha-header">
                    <b style="font-size:17px">🎾 ${d.organiza}</b>
                    <span class="tag-cat">${d.categorias || 'Gral'}</span>
                </div>
                <div class="info-row">📅 ${fmtFechaHumana(d.fecha, d.hora, d.horaFin)}</div>
                <div class="info-row">📍 ${d.lugar || 'Sede a definir'}</div>
                <div class="info-row">👥 ${conf}/${d.cupo} Jugadores</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px">
                    <button class="btn-dash btn-config" onclick="window.abrirConfig('${d.id}')">⚙️ CONFIG</button>
                    <button class="btn-dash btn-players" onclick="window.abrirJugadores('${d.id}')">👥 JUGADORES</button>
                </div>`;
            list.appendChild(item);
        });
    }

    // FUNCIÓN: ABRIR JUGADORES (MODAL)
    window.abrirJugadores = async (id) => {
        currentCanchaId = id;
        const s = await get(ref(db, 'eventos/'+id));
        if(!s.exists()) return;
        currentCanchaData = s.val();
        
        const ins = currentCanchaData.inscriptos || [];
        const pesos = { "pagado": 1, "paga-en-la-cancha": 2, "pendiente": 3 };
        ins.sort((a,b) => (pesos[a.estado] || 99) - (pesos[b.estado] || 99));
        
        const conf = ins.filter(p => p.estado !== 'pendiente').length;
        document.getElementById('st-total').innerText = currentCanchaData.cupo;
        document.getElementById('st-pag').innerText = conf;
        document.getElementById('st-pen').innerText = ins.length - conf;
        document.getElementById('st-lib').innerText = Math.max(0, currentCanchaData.cupo - conf);
        
        const list = document.getElementById('players-list'); 
        list.innerHTML = "";
        ins.forEach((p, idx) => {
            const originalIdx = currentCanchaData.inscriptos.indexOf(p);
            list.innerHTML += `
                <div class="player-row">
                    <span style="flex:1; font-weight:700">${p.nombre}</span>
                    <button class="btn-status ${p.estado}" onclick="window.togglePago(${originalIdx})">
                        ${p.estado === 'paga-en-la-cancha' ? 'EN CANCHA' : p.estado.toUpperCase()}
                    </button>
                    <button onclick="window.borrarP(${originalIdx})" style="background:none; border:none; color:var(--danger); font-weight:800; cursor:pointer">✕</button>
                </div>`;
        });
        document.getElementById('modal-players').classList.remove('hidden');
    };

    window.togglePago = (i) => {
        const ests = ["pendiente", "paga-en-la-cancha", "pagado"];
        currentCanchaData.inscriptos[i].estado = ests[(ests.indexOf(currentCanchaData.inscriptos[i].estado) + 1) % 3];
        update(ref(db, 'eventos/'+currentCanchaId), { inscriptos: currentCanchaData.inscriptos }).then(() => window.abrirJugadores(currentCanchaId));
    };

    window.borrarP = (i) => {
        if(confirm("¿Borrar jugador?")) {
            currentCanchaData.inscriptos.splice(i, 1);
            update(ref(db, 'eventos/'+currentCanchaId), { inscriptos: currentCanchaData.inscriptos }).then(() => window.abrirJugadores(currentCanchaId));
        }
    };

    // CONFIGURACIÓN
    window.abrirConfig = async id => {
        currentCanchaId = id;
        const s = await get(ref(db, 'eventos/'+id));
        const d = s.val();
        document.getElementById('ed-org').value = d.organiza || "";
        document.getElementById('ed-cat').value = d.categorias || "";
        document.getElementById('ed-lug').value = d.lugar || "";
        document.getElementById('ed-fec').value = d.fecha || "";
        document.getElementById('ed-h1').value = d.hora || "";
        document.getElementById('ed-h2').value = d.horaFin || "";
        document.getElementById('ed-cup').value = d.cupo || 0;
        document.getElementById('ed-ali').value = d.alias || "";
        document.getElementById('modal-config').classList.remove('hidden');
    };

    window.guardarConfig = async () => {
        await update(ref(db, 'eventos/'+currentCanchaId), {
            organiza: document.getElementById('ed-org').value,
            categorias: document.getElementById('ed-cat').value,
            lugar: document.getElementById('ed-lug').value,
            fecha: document.getElementById('ed-fec').value,
            hora: document.getElementById('ed-h1').value,
            horaFin: document.getElementById('ed-h2').value,
            cupo: parseInt(document.getElementById('ed-cup').value),
            alias: document.getElementById('ed-ali').value
        });
        alert("Guardado"); window.cerrarModals();
    };

    window.cerrarModals = () => {
        document.getElementById('modal-config').classList.add('hidden');
        document.getElementById('modal-players').classList.add('hidden');
    };

    document.getElementById('btn-share').onclick = () => {
        const url = window.location.origin + "/canchaabierta/v.html?org=" + orgId;
        navigator.clipboard.writeText(url).then(() => alert("Copiado: " + url));
    };

</script>
</body>
</html>
