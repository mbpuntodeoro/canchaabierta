<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ff9500; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .login-card { background: white; padding: 40px; border-radius: 30px; box-shadow: var(--shadow); width: 100%; max-width: 350px; text-align: center; box-sizing: border-box; }
        .container { max-width: 550px; margin: auto; padding-bottom: 100px; display: none; }
        
        /* HEADER FINANCIERO */
        .hero { background: #1d1d1f; color: white; padding: 25px; border-radius: 28px; margin-bottom: 15px; box-shadow: var(--shadow); }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 5px; }
        .fin-box { background: rgba(255,255,255,0.07); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .fin-box span { font-size: 9px; text-transform: uppercase; color: #aaa; font-weight: 800; display: block; margin-bottom: 4px;}
        .fin-box b { font-size: 15px; font-weight: 900; color: #fff; }
        
        .cancha-card { background: white; padding: 22px; border-radius: 28px; border: 1.5px solid #f2f2f7; margin-bottom: 12px; box-shadow: var(--shadow); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .btn-dash { border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; margin-top: 8px; text-transform: uppercase; }
        .input-std { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; margin-bottom: 10px; outline: none; box-sizing: border-box; font-family: inherit;}
        
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: 0.5s; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 35px; max-height: 90vh; overflow-y: auto; }
        .player-row { background: #f8f9fb; border-radius: 18px; padding: 12px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        label { display: block; font-size: 9px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 10px 0 2px 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="margin: 0 0 5px 0; font-weight: 900; letter-spacing: -1px;">PadelApp</h1>
            <input id="log-email" type="email" class="input-std" placeholder="Email">
            <input id="log-pass" type="password" class="input-std" placeholder="Clave">
            <button class="btn-dash" style="background: black; color: white;" onclick="iniciarSesion()">INGRESAR</button>
        </div>
    </div>

    <div id="app-content" class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1 id="org-name-disp" style="margin:0; font-weight:900; letter-spacing:-1.5px">...</h1>
            <button onclick="cerrarSesion()" style="background:none; border:none; color:var(--sub); font-weight:800; cursor:pointer">SALIR</button>
        </header>

        <div class="hero">
            <div id="abono-status-badge" class="status-badge">...</div>
            <div style="font-size: 13px; font-weight: 700; margin-bottom: 20px;">Vencimiento abono: <span id="txt-venc-abono">--</span></div>
            <div class="fin-grid">
                <div class="fin-box"><span>Deuda Canchas</span><b id="txt-consumo-canchas">$0</b></div>
                <div class="fin-box"><span>Límite Disponible</span><b id="txt-disponible-canchas">$0</b></div>
            </div>
            <div class="progress-bar"><div id="limit-progress" class="progress-fill" style="width: 0%"></div></div>
            <div style="font-size: 9px; color: #888; font-weight: 800; margin-top: 10px; text-transform: uppercase; text-align: center;">Límite Total: <span id="txt-limite-total">$0</span></div>
        </div>

        <button onclick="PadelUtils.copiarLink('https://mbpuntodeoro.github.io/canchaabierta/v.html?org=' + orgId)" class="btn-dash" style="background:var(--primary); color:white; margin-bottom:20px;">🔗 COPIAR LINK CARTELERA</button>

        <div id="canchas-list">Cargando...</div>

        <button id="btn-add-cancha" onclick="abrirNueva()" style="width:100%; padding:20px; border-radius:20px; background:#000; color:white; border:none; font-weight:900; margin-top:10px; cursor:pointer">➕ AGREGAR NUEVA CANCHA</button>
        <p id="msg-locked" style="display:none; color:red; font-size:11px; font-weight:800; text-align:center; margin-top:15px; background: #fff2f2; padding: 10px; border-radius: 10px;"></p>

        <div style="text-align:center; margin-top:50px;">
            <button onclick="abrirHistorial()" class="btn-dash" style="background:#f2f2f7; color:var(--text); width: auto; padding: 10px 20px; border: 1px solid #ddd; margin-bottom: 15px;">📋 VER HISTORIAL DE PAGOS</button>
            <p style="font-size:10px; font-weight:800; color:#ccc;">DESARROLLADO POR MARIANO BLUMENFELD</p>
        </div>
    </div>

    <div id="modal-players" class="modal"><div class="modal-content"><h2 style="margin-top:0">👥 Jugadores</h2><input type="hidden" id="pl-id"><div id="players-list"></div><button onclick="cerrarModals()" class="btn-dash" style="background:#000; color:white; margin-top:20px">CERRAR</button></div></div>
    
    <div id="modal-config" class="modal"><div class="modal-content"><h2 id="modal-title">⚙️ Configuración</h2><input type="hidden" id="ed-id"><label>Nombre Cancha</label><input id="ed-org" class="input-std"><label>Sede</label><input id="ed-lug" class="input-std"><label>🏷️ Categoría</label><input id="ed-cat" class="input-std"><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px"><div><label>Fecha</label><input id="ed-fec" type="date" class="input-std"></div><div><label>Cupo</label><input id="ed-cup" type="number" class="input-std"></div></div><div style="display:grid; grid-template-columns:1fr 1fr; gap:10px"><div><label>Inicio</label><input id="ed-h1" type="time" class="input-std"></div><div><label>Fin</label><input id="ed-h2" type="time" class="input-std"></div></div><label>Precio ($)</label><input id="ed-val" type="number" class="input-std"><label>Alias MP</label><input id="ed-ali" class="input-std"><button onclick="guardarConfig()" class="btn-dash" style="background:#007aff; color:white;">GUARDAR CAMBIOS</button><button onclick="cerrarModals()" class="btn-dash" style="background:#eee; color:#333; margin-top:10px">CANCELAR</button><button id="btn-del-cancha" onclick="borrarCancha()" class="btn-dash" style="background:var(--danger); color:white; margin-top:10px; display:none;">ELIMINAR CANCHA</button></div></div>

    <div id="modal-historial" class="modal"><div class="modal-content"><h2>📋 Historial</h2><div id="historial-items"></div><button onclick="cerrarModals()" class="btn-dash" style="background:#000; color:white; margin-top:20px">CERRAR</button></div></div>

<script>
    let orgId = new URLSearchParams(window.location.search).get('org');
    let store = { cuenta: {}, movimientos: [], canchas: {} };
    const auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            if (!orgId) {
                const snap = await db.ref('facturacion').once('value');
                snap.forEach(c => { if(c.val().cuenta?.emailOrganizador === user.email) orgId = c.key; });
                if(orgId) window.history.replaceState(null, null, `?org=${orgId}`);
            }
            if (orgId) initDashboard();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    function initDashboard() {
        db.ref(`facturacion/${orgId}/cuenta`).on('value', s => { store.cuenta = s.val() || {}; updateUI(); });
        db.ref(`facturacion/${orgId}/movimientos`).on('value', s => {
            const d = s.val() || {}; store.movimientos = Object.keys(d).map(k => ({id:k, ...d[k]}));
            updateUI();
        });
        db.ref(`hubs/${orgId}/canchas`).on('value', snap => {
            const ids = snap.val() ? (Array.isArray(snap.val()) ? snap.val() : Object.values(snap.val())) : [];
            ids.forEach(id => {
                db.ref(`eventos/${id}`).on('value', ev => { if(ev.val()){ store.canchas[id] = {id, ...ev.val()}; drawCanchas(); } });
            });
        });
    }

    function updateUI() {
        if (!store.cuenta.nombreOrg || typeof PadelSaaS === 'undefined') return;
        const res = PadelSaaS.analizarCuenta(store.cuenta, store.movimientos);
        document.getElementById('org-name-disp').innerText = store.cuenta.nombreOrg;
        document.getElementById('txt-venc-abono').innerText = PadelSaaS.fmtFecha(res.vencimientoAbono);
        document.getElementById('txt-consumo-canchas').innerText = PadelUtils.fmtDinero(res.deudaCanchas);
        document.getElementById('txt-disponible-canchas').innerText = PadelUtils.fmtDinero(res.disponible);
        document.getElementById('txt-limite-total').innerText = PadelUtils.fmtDinero(res.limiteTotal);
        document.getElementById('limit-progress').style.width = res.porcentaje + '%';
        const badge = document.getElementById('abono-status-badge');
        badge.innerText = Date.now() > res.vencimientoAbono ? "VENCIDO" : "AL DÍA";
        badge.style.background = Date.now() > res.vencimientoAbono ? 'var(--danger)' : 'var(--success)';
        document.getElementById('btn-add-cancha').style.opacity = res.bloqueado ? '0.3' : '1';
        document.getElementById('msg-locked').style.display = res.bloqueado ? 'block' : 'none';
        document.getElementById('msg-locked').innerText = res.msg;
    }

    function drawCanchas() {
        const list = document.getElementById('canchas-list');
        const sorted = Object.values(store.canchas).sort((a,b) => new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));
        list.innerHTML = sorted.length ? "" : "No hay canchas.";
        sorted.forEach(c => {
            const conf = (c.inscriptos || []).filter(p => p.estado !== 'pendiente').length;
            list.innerHTML += `<div class="cancha-card">
                <div style="display:flex;justify-content:space-between"><b>🎾 ${c.organiza}</b> <span class="tag-cat">${c.categorias}</span></div>
                <div style="font-size:12px; color:var(--sub); margin:8px 0;">📅 ${PadelSaaS.fmtFecha(new Date(c.fecha+'T12:00:00'))} | 🕒 ${c.hora} hs</div>
                <div style="font-size:11px; font-weight:700;">👥 ${conf} / ${c.cupo} confirmados</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px">
                    <button class="btn-dash" style="background:#f2f2f7; margin:0;" onclick="abrirConfig('${c.id}')">⚙️ CONFIG</button>
                    <button class="btn-dash" style="background:#000; color:#fff; margin:0;" onclick="abrirJugadores('${c.id}')">👥 JUGADORES</button>
                </div></div>`;
        });
    }

    function abrirNueva() {
        document.getElementById('modal-title').innerText = "➕ Nueva Cancha";
        document.getElementById('ed-id').value = ""; document.getElementById('ed-org').value = "";
        document.getElementById('ed-fec').value = ""; document.getElementById('btn-del-cancha').style.display = 'none';
        document.getElementById('modal-config').style.display = 'flex';
    }

    function abrirConfig(id) {
        const c = store.canchas[id]; document.getElementById('modal-title').innerText = "⚙️ Editar";
        document.getElementById('ed-id').value = id; document.getElementById('ed-org').value = c.organiza;
        document.getElementById('ed-lug').value = c.lugar; document.getElementById('ed-cat').value = c.categorias;
        document.getElementById('ed-fec').value = c.fecha; document.getElementById('ed-h1').value = c.hora;
        document.getElementById('ed-cup').value = c.cupo; document.getElementById('ed-val').value = c.valor;
        document.getElementById('ed-ali').value = c.alias || ""; document.getElementById('btn-del-cancha').style.display = 'block';
        document.getElementById('modal-config').style.display = 'flex';
    }

    function abrirJugadores(id) {
        document.getElementById('pl-id').value = id;
        const list = document.getElementById('players-list');
        db.ref(`eventos/${id}/inscriptos`).on('value', s => {
            const ins = s.val() || []; list.innerHTML = ins.length ? "" : "Vacío.";
            ins.forEach((p, idx) => {
                list.innerHTML += `<div class="player-row"><span>${p.nombre}</span><div style="display:flex;gap:8px;">
                    <button onclick="togglePago('${id}',${idx})" style="border:none; background:${p.estado==='pagado'?'#34c759':'#ff3b30'}; color:white; padding:6px 12px; border-radius:10px; font-size:10px; font-weight:800;">${p.estado.toUpperCase()}</button>
                    <button onclick="borrarP('${id}',${idx})" style="border:none; background:none; color:red; font-weight:bold;">✕</button></div></div>`;
            });
            document.getElementById('modal-players').style.display = 'flex';
        });
    }

    function guardarConfig() {
        const id = document.getElementById('ed-id').value;
        const upd = { organiza: document.getElementById('ed-org').value, lugar: document.getElementById('ed-lug').value, categorias: document.getElementById('ed-cat').value, fecha: document.getElementById('ed-fec').value, hora: document.getElementById('ed-h1').value, cupo: parseInt(document.getElementById('ed-cup').value), valor: parseInt(document.getElementById('ed-val').value), alias: document.getElementById('ed-ali').value };
        if(!id) {
            const nR = db.ref('eventos').push();
            nR.set({...upd, inscriptos: []}).then(() => {
                db.ref(`hubs/${orgId}/canchas`).once('value', s => {
                    let c = s.val() ? (Array.isArray(s.val()) ? s.val() : Object.values(s.val())) : [];
                    c.push(nR.key); db.ref(`hubs/${orgId}/canchas`).set(c);
                });
            });
        } else { db.ref(`eventos/${id}`).update(upd); }
        cerrarModals();
    }

    function borrarCancha() { if(confirm("¿Borrar?")) { const id = document.getElementById('ed-id').value; db.ref(`hubs/${orgId}/canchas`).once('value', s => { let c = Array.isArray(s.val())?s.val():Object.values(s.val()); db.ref(`hubs/${orgId}/canchas`).set(c.filter(i=>i!==id)); db.ref(`eventos/${id}`).remove(); delete store.canchas[id]; drawCanchas(); cerrarModals(); }); } }
    function togglePago(id, idx) { db.ref(`eventos/${id}/inscriptos/${idx}/estado`).once('value', s => { db.ref(`eventos/${id}/inscriptos/${idx}/estado`).set(s.val()==='pagado'?'pendiente':'pagado'); }); }
    function borrarP(id, idx) { if(confirm("¿Quitar?")) { db.ref(`eventos/${id}/inscriptos`).once('value', s => { let i = s.val(); i.splice(idx,1); db.ref(`eventos/${id}/inscriptos`).set(i); }); } }
    function abrirHistorial() {
        const list = document.getElementById('historial-items'); list.innerHTML = "";
        store.movimientos.sort((a,b)=>b.fecha-a.fecha).forEach(m => {
            list.innerHTML += `<div style="padding:12px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><div><b>${m.descripcion}</b><br><small>${PadelSaaS.fmtFecha(m.fecha)}</small></div><div><b>${PadelUtils.fmtDinero(m.monto)}</b></div></div>`;
        });
        document.getElementById('modal-historial').style.display = 'flex';
    }
    function iniciarSesion() { auth.signInWithEmailAndPassword(document.getElementById('log-email').value, document.getElementById('log-pass').value).catch(e => alert("Error")); }
    function cerrarSesion() { auth.signOut().then(() => window.location.href='index.html'); }
    function cerrarModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
