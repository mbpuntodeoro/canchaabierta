<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Organizador - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ff9500; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; padding-bottom: 100px;}
        .hero { background: #1d1d1f; color: white; padding: 25px; border-radius: 28px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .fin-box { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 18px; text-align: center; }
        .fin-box b { font-size: 16px; font-weight: 900; display: block;}
        .fin-box span { font-size: 9px; text-transform: uppercase; color: #aaa; font-weight: 800;}
        .cancha-card { background: white; padding: 22px; border-radius: 28px; border: 1.5px solid #f2f2f7; margin-bottom: 12px; box-shadow: var(--shadow); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); font-weight: 600; margin-top: 5px; }
        .btn-dash { border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; margin-top: 8px; text-transform: uppercase; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 35px; max-height: 95vh; overflow-y: auto; }
        .player-row { background: white; border: 1.5px solid #eee; border-radius: 20px; padding: 12px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-status { width: 130px; padding: 10px; border-radius: 10px; border: none; color: white; font-weight: 800; font-size: 10px; }
        .pagado { background: #34c759; } .pendiente { background: #ff3b30; } .paga-en-la-cancha { background: #ff9500; }
        .input-std { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; margin-bottom: 10px; outline: none; box-sizing: border-box; font-family: inherit;}
        label { display: block; font-size: 9px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 10px 0 2px 5px; }
        .footer-personal { text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid #eee; }
        .btn-orange { background: #ff9500; color: white; text-decoration: none; padding: 14px 25px; border-radius: 50px; font-weight: 900; font-size: 13px; display: inline-block; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,149,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1 id="org-name-disp" style="margin:0; font-weight:900; letter-spacing:-1.5px">...</h1>
            <button onclick="window.location.href='m.html'" style="background:none; border:none; color:var(--sub); font-weight:800; cursor:pointer">SALIR</button>
        </header>

        <div class="hero">
            <div class="fin-grid">
                <div class="fin-box"><span>Deuda Actual</span><b id="txt-deu">$0</b></div>
                <div class="fin-box"><span>Límite Crédito</span><b id="txt-lim">$0</b></div>
            </div>
        </div>

        <button onclick="copiarLink()" style="width:100%; padding:18px; border-radius:18px; background:var(--primary); color:white; border:none; font-weight:900; margin-bottom:20px; cursor:pointer">🔗 COPIAR LINK CARTELERA</button>

        <div id="canchas-list">Cargando canchas...</div>

        <button onclick="abrirNuevaCancha()" style="width:100%; padding:20px; border-radius:20px; background:#000; color:white; border:none; font-weight:900; margin-top:10px; cursor:pointer">➕ AGREGAR NUEVA CANCHA</button>

        <div class="footer-personal">
            <p style="font-size:10px; font-weight:800; color:#ccc; letter-spacing:1px">DESARROLLADO POR MARIANO BLUMENFELD</p>
            <a href="https://wa.me/5491166463800" class="btn-orange">💬 ¿DUDAS? ESCRIBIME</a>
        </div>
    </div>

    <div id="modal-players" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">👥 Jugadores</h2>
            <input type="hidden" id="pl-id">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px">
                <div class="fin-box" style="background:#f2f2f7; color:#333; padding:10px"><span>TOTAL CUPO</span><b id="st-total">0</b></div>
                <div class="fin-box" style="background:#f2f2f7; color:#333; padding:10px"><span>CONFIRMADOS</span><b id="st-pag" style="color:var(--success)">0</b></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:15px">
                <div class="fin-box" style="background:#f2f2f7; color:#333; padding:10px"><span>PENDIENTES</span><b id="st-pen" style="color:var(--danger)">0</b></div>
                <div class="fin-box" style="background:#f2f2f7; color:#333; padding:10px"><span>LIBRES</span><b id="st-lib" style="color:var(--primary)">0</b></div>
            </div>
            <div id="players-list"></div>
            <button onclick="cerrarModals()" style="width:100%; padding:18px; border-radius:18px; background:#000; color:white; border:none; margin-top:10px; cursor:pointer">CERRAR</button>
        </div>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">⚙️ Configuración</h2>
            <input type="hidden" id="ed-id">
            
            <label>Tipo de Evento</label>
            <select id="ed-tipo" class="input-std">
                <option value="unico">Evento Único</option>
                <option value="recurrente">Recurrente Semanal</option>
            </select>

            <label>Nombre Cancha</label><input id="ed-org" class="input-std">
            <label>Organizador (Nombre)</label><input id="ed-owner" class="input-std">
            <label>WhatsApp Organizador</label><input id="ed-celu" class="input-std">
            <label>📍 Lugar / Sede</label><input id="ed-lug" class="input-std">
            <label>🏷️ Categorías</label><input id="ed-cat" class="input-std">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Fecha</label><input id="ed-fec" type="date" class="input-std"></div>
                <div><label>Cupo Total</label><input id="ed-cup" type="number" class="input-std"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Inicio</label><input id="ed-h1" type="time" class="input-std"></div>
                <div><label>Fin</label><input id="ed-h2" type="time" class="input-std"></div>
            </div>
            <label>Precio por Persona ($)</label><input id="ed-val" type="number" class="input-std">
            <label>Alias Mercado Pago</label><input id="ed-ali" class="input-std">
            
            <button onclick="guardarConfig()" style="width:100%; padding:18px; border-radius:18px; background:#007aff; color:white; border:none; font-weight:900; cursor:pointer">GUARDAR CAMBIOS</button>
            <button onclick="cerrarModals()" style="width:100%; padding:15px; border-radius:18px; background:#eee; color:#333; border:none; margin-top:10px; cursor:pointer">CANCELAR</button>
        </div>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const orgId = new URLSearchParams(window.location.search).get('org');
    let isNew = false;
    let courtListeners = {};

    function fmtFecha(f) {
        if(!f) return '--';
        const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
        const d = new Date(f + 'T00:00:00');
        return dias[d.getDay()] + ' ' + f.split('-').reverse().slice(0,2).join('/');
    }

    function init() {
        if(!orgId) return;
        db.ref(`facturacion/${orgId}/cuenta`).on('value', s => { 
            const f = s.val() || {};
            document.getElementById('org-name-disp').innerText = f.nombreOrg || orgId;
            document.getElementById('txt-deu').innerText = "$" + (f.consumoActual || 0).toLocaleString();
            document.getElementById('txt-lim').innerText = "$" + (f.limiteCredito || 0).toLocaleString();
        });

        db.ref('hubs/'+orgId).on('value', snap => {
            const ids = snap.val()?.canchas || [];
            const listContainer = document.getElementById('canchas-list');
            if(ids.length === 0) listContainer.innerHTML = "No tienes canchas creadas.";
            ids.forEach(id => {
                if(!document.getElementById('card-'+id)) {
                    const div = document.createElement('div'); div.id = 'card-'+id;
                    listContainer.appendChild(div);
                }
                if(!courtListeners[id]) {
                    courtListeners[id] = true;
                    db.ref('eventos/'+id).on('value', evS => {
                        const d = evS.val(); if(!d) return;
                        const conf = (d.inscriptos || []).filter(p => p.estado !== 'pendiente').length;
                        document.getElementById('card-'+id).innerHTML = `
                            <div class="cancha-card">
                                <div style="display:flex;justify-content:space-between"><b>🎾 ${d.organiza}</b> <span class="tag-cat">${d.categorias}</span></div>
                                <div class="info-row">📅 ${fmtFecha(d.fecha)} | 🕒 ${d.hora} a ${d.horaFin || '--'} hs</div>
                                <div class="info-row">📍 ${d.lugar || 'Sede no definida'}</div>
                                <div class="info-row">👥 ${conf} / ${d.cupo} Confirmados ${d.tipo === 'recurrente' ? '• 🔄' : ''}</div>
                                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                                    <button class="btn-dash" style="background:#f2f2f7" onclick="abrirConfig('${id}')">⚙️ CONFIG</button>
                                    <button class="btn-dash" style="background:#000; color:#fff" onclick="abrirJugadores('${id}')">👥 JUGADORES</button>
                                </div>
                            </div>`;
                    });
                }
            });
        });
    }

    function abrirNuevaCancha() {
        isNew = true;
        document.getElementById('modal-title').innerText = "➕ Nueva Cancha";
        document.getElementById('ed-id').value = "";
        document.getElementById('ed-tipo').value = "unico";
        document.getElementById('ed-org').value = "";
        document.getElementById('ed-owner').value = "";
        document.getElementById('ed-celu').value = "";
        document.getElementById('ed-lug').value = "";
        document.getElementById('ed-cat').value = "Todas las categorías";
        document.getElementById('ed-fec').value = "";
        document.getElementById('ed-h1').value = "15:00";
        document.getElementById('ed-h2').value = "16:30";
        document.getElementById('ed-cup').value = 12;
        document.getElementById('ed-val').value = 0;
        document.getElementById('ed-ali').value = "";
        document.getElementById('modal-config').style.display = 'flex';
    }

    function abrirConfig(id) {
        isNew = false;
        document.getElementById('modal-title').innerText = "⚙️ Configuración";
        db.ref('eventos/'+id).once('value', s => {
            const d = s.val(); 
            document.getElementById('ed-id').value = id;
            document.getElementById('ed-tipo').value = d.tipo || "unico";
            document.getElementById('ed-org').value = d.organiza || "";
            document.getElementById('ed-owner').value = d.nombreOrganizador || "";
            document.getElementById('ed-celu').value = d.celuOrganizador || "";
            document.getElementById('ed-lug').value = d.lugar || "";
            document.getElementById('ed-cat').value = d.categorias || "";
            document.getElementById('ed-fec').value = d.fecha || "";
            document.getElementById('ed-h1').value = d.hora || "";
            document.getElementById('ed-h2').value = d.horaFin || "";
            document.getElementById('ed-cup').value = d.cupo || 0;
            document.getElementById('ed-val').value = d.valor || 0;
            document.getElementById('ed-ali').value = d.alias || "";
            document.getElementById('modal-config').style.display = 'flex';
        });
    }

    function guardarConfig() {
        let id = document.getElementById('ed-id').value;
        const upd = {
            tipo: document.getElementById('ed-tipo').value,
            organiza: document.getElementById('ed-org').value,
            nombreOrganizador: document.getElementById('ed-owner').value,
            celuOrganizador: document.getElementById('ed-celu').value,
            lugar: document.getElementById('ed-lug').value,
            categorias: document.getElementById('ed-cat').value,
            fecha: document.getElementById('ed-fec').value,
            hora: document.getElementById('ed-h1').value,
            horaFin: document.getElementById('ed-h2').value,
            cupo: parseInt(document.getElementById('ed-cup').value),
            valor: parseInt(document.getElementById('ed-val').value),
            alias: document.getElementById('ed-ali').value
        };
        if(isNew) {
            const newRef = db.ref('eventos').push(); id = newRef.key; upd.inscriptos = [];
            db.ref('eventos/'+id).set(upd).then(() => {
                db.ref('hubs/'+orgId+'/canchas').once('value', s => {
                    let canchas = s.val() || []; canchas.push(id);
                    db.ref('hubs/'+orgId+'/canchas').set(canchas);
                });
            });
        } else {
            db.ref('eventos/'+id).update(upd);
        }
        alert("¡Guardado!"); cerrarModals();
    }

    function abrirJugadores(id) {
        document.getElementById('pl-id').value = id;
        db.ref('eventos/'+id).on('value', s => {
            const d = s.val(); if(!d) return;
            const ins = d.inscriptos || [];
            const conf = ins.filter(p => p.estado !== 'pendiente').length;
            document.getElementById('st-pag').innerText = conf;
            document.getElementById('st-total').innerText = d.cupo;
            document.getElementById('st-pen').innerText = ins.length - conf;
            document.getElementById('st-lib').innerText = Math.max(0, d.cupo - conf);
            const list = document.getElementById('players-list'); list.innerHTML = "";
            ins.forEach((p, idx) => {
                const label = p.estado === 'paga-en-la-cancha' ? 'EN CANCHA' : p.estado.toUpperCase();
                list.innerHTML += `<div class="player-row"><b>${p.nombre}</b>
                    <button class="btn-status ${p.estado}" onclick="togglePago(${idx})">${label}</button>
                    <button onclick="borrarP(${idx})" style="border:none;background:none;color:red;font-weight:900;cursor:pointer">✕</button></div>`;
            });
            document.getElementById('modal-players').style.display = 'flex';
        });
    }

    function togglePago(idx) {
        const id = document.getElementById('pl-id').value;
        db.ref(`eventos/${id}/inscriptos/${idx}`).once('value', s => {
            const ests = ["pendiente", "paga-en-la-cancha", "pagado"];
            const next = ests[(ests.indexOf(s.val().estado) + 1) % 3];
            db.ref(`eventos/${id}/inscriptos/${idx}/estado`).set(next);
        });
    }

    function borrarP(idx) {
        if(!confirm("¿Borrar?")) return;
        const id = document.getElementById('pl-id').value;
        db.ref(`eventos/${id}/inscriptos`).once('value', s => {
            let ins = s.val(); ins.splice(idx, 1);
            db.ref(`eventos/${id}/inscriptos`).set(ins);
        });
    }

    function cerrarModals() { 
        document.getElementById('modal-config').style.display = 'none'; 
        document.getElementById('modal-players').style.display = 'none';
        if(document.getElementById('pl-id').value) db.ref('eventos/'+document.getElementById('pl-id').value).off();
    }

    function copiarLink() {
        const url = "https://mbpuntodeoro.github.io/canchaabierta/v.html?org=" + orgId;
        const temp = document.createElement("input"); document.body.appendChild(temp);
        temp.value = url; temp.select(); document.execCommand("copy");
        document.body.removeChild(temp); alert("Link Cartelera copiado!");
    }
    init();
</script>
</body>
</html>
