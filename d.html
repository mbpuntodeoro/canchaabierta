<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Organizador</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; }
        .hero { background: #1d1d1f; color: white; padding: 25px; border-radius: 28px; margin-bottom: 20px; }
        .cancha-card { background: white; padding: 22px; border-radius: 28px; border: 1.5px solid #f2f2f7; margin-bottom: 12px; box-shadow: var(--shadow); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); font-weight: 600; margin-top: 5px; }
        .btn-dash { border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; margin-top: 8px; text-transform: uppercase; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 35px; max-height: 95vh; overflow-y: auto; }
        .input-std { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        label { display: block; font-size: 9px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 10px 0 2px 5px; }
    </style>
</head>
<body>
    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1 id="org-name-disp" style="margin:0; font-weight:900; letter-spacing:-1.5px">...</h1>
            <button onclick="window.location.href='m.html'" style="background:none; border:none; color:var(--sub); font-weight:800; cursor:pointer">SALIR</button>
        </header>

        <div id="canchas-list">Cargando...</div>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">⚙️ Configuración</h2>
            <input type="hidden" id="ed-id">
            <label>Nombre Cancha</label><input id="ed-org" class="input-std">
            <label>📍 Lugar</label><input id="ed-lug" class="input-std">
            <label>🏷️ Categorías</label><input id="ed-cat" class="input-std">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Fecha</label><input id="ed-fec" type="date" class="input-std"></div>
                <div><label>Cupo</label><input id="ed-cup" type="number" class="input-std"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Inicio</label><input id="ed-h1" type="time" class="input-std"></div>
                <div><label>Fin</label><input id="ed-h2" type="time" class="input-std"></div>
            </div>
            <label>Precio ($)</label><input id="ed-val" type="number" class="input-std">
            <label>Alias MP</label><input id="ed-ali" class="input-std">
            
            <button onclick="guardarConfig()" style="width:100%; padding:18px; border-radius:18px; background:#007aff; color:white; border:none; font-weight:900">GUARDAR CAMBIOS</button>
            <button onclick="cerrarModals()" style="width:100%; padding:15px; border-radius:18px; background:#eee; color:#333; border:none; margin-top:10px">CANCELAR</button>
        </div>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const orgId = new URLSearchParams(window.location.search).get('org');

    function fmtFecha(f) {
        if(!f) return '--';
        const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
        const d = new Date(f + 'T00:00:00');
        return dias[d.getDay()] + ' ' + f.split('-').reverse().slice(0,2).join('/');
    }

    function init() {
        db.ref(`facturacion/${orgId}/cuenta`).on('value', s => { document.getElementById('org-name-disp').innerText = s.val()?.nombreOrg || orgId; });

        db.ref('hubs/'+orgId).on('value', async snap => {
            const list = document.getElementById('canchas-list'); list.innerHTML = "";
            const ids = snap.val()?.canchas || [];
            for(let id of ids) {
                const evS = await db.ref('eventos/'+id).once('value');
                if(evS.exists()) {
                    const d = evS.val();
                    list.innerHTML += `<div class="cancha-card">
                        <div style="display:flex;justify-content:space-between"><b>🎾 ${d.organiza}</b> <span class="tag-cat">${d.categorias}</span></div>
                        <div class="info-row">📅 ${fmtFecha(d.fecha)} | 🕒 ${d.hora} a ${d.horaFin || '--'} hs</div>
                        <div class="info-row">📍 ${d.lugar || 'Sede no definida'}</div>
                        <button class="btn-dash" style="background:#f2f2f7" onclick="abrirConfig('${id}')">⚙️ CONFIG</button>
                    </div>`;
                }
            }
        });
    }

    function abrirConfig(id) {
        db.ref('eventos/'+id).once('value', s => {
            const d = s.val(); document.getElementById('ed-id').value = id;
            document.getElementById('ed-org').value = d.organiza || "";
            document.getElementById('ed-lug').value = d.lugar || "";
            document.getElementById('ed-cat').value = d.categorias || "";
            document.getElementById('ed-fec').value = d.fecha || "";
            document.getElementById('ed-h1').value = d.hora || "";
            document.getElementById('ed-h2').value = d.horaFin || "";
            document.getElementById('ed-cup').value = d.cupo || 0;
            document.getElementById('ed-val').value = d.valor || 0;
            document.getElementById('ed-ali').value = d.alias || "";
            document.getElementById('modal-config').style.display = 'flex';
        });
    }

    function guardarConfig() {
        const id = document.getElementById('ed-id').value;
        const upd = {
            organiza: document.getElementById('ed-org').value,
            lugar: document.getElementById('ed-lug').value,
            categorias: document.getElementById('ed-cat').value,
            fecha: document.getElementById('ed-fec').value,
            hora: document.getElementById('ed-h1').value,
            horaFin: document.getElementById('ed-h2').value,
            cupo: parseInt(document.getElementById('ed-cup').value),
            valor: parseInt(document.getElementById('ed-val').value),
            alias: document.getElementById('ed-ali').value
        };
        db.ref('eventos/'+id).update(upd).then(() => { alert("¡Cambios grabados!"); cerrarModals(); });
    }

    function cerrarModals() { document.getElementById('modal-config').style.display = 'none'; }
    init();
</script>
</body>
</html>
