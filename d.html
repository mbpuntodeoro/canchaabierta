<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ff9500; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .login-card { background: white; padding: 40px; border-radius: 30px; box-shadow: var(--shadow); width: 100%; max-width: 350px; text-align: center; }
        .container { max-width: 550px; margin: auto; padding-bottom: 100px; display: none; }
        .hero { background: #1d1d1f; color: white; padding: 25px; border-radius: 28px; margin-bottom: 15px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .fin-box { background: rgba(255,255,255,0.07); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .fin-box b { font-size: 16px; display: block; color: #fff; margin-top: 5px; }
        .fin-box span { font-size: 9px; text-transform: uppercase; color: #aaa; font-weight: 800; }
        .cancha-card { background: white; padding: 22px; border-radius: 28px; border: 1.5px solid #f2f2f7; margin-bottom: 12px; box-shadow: var(--shadow); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .btn-dash { border: none; padding: 16px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 8px; text-transform: uppercase; font-size: 11px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: 0.5s; }
        .input-std { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; margin-bottom: 10px; outline: none; font-family: inherit;}
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 35px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="margin: 0 0 20px 0; font-weight: 900;">PadelApp</h2>
            <input id="log-email" type="email" class="input-std" placeholder="Email">
            <input id="log-pass" type="password" class="input-std" placeholder="Clave">
            <button class="btn-dash" style="background: black; color: white;" onclick="iniciarSesion()">INGRESAR</button>
        </div>
    </div>

    <div id="app-content" class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1 id="org-name" style="margin:0; font-weight:900; letter-spacing:-1.5px">...</h1>
            <button onclick="cerrarSesion()" style="background:none; border:none; color:var(--sub); font-weight:800; cursor:pointer">SALIR</button>
        </header>

        <div class="hero">
            <div id="badge-abono" class="status-badge">...</div>
            <div style="font-size: 13px; font-weight: 700; color: #fff;">Abono vence: <span id="venc-abono">--/--/----</span></div>
            
            <div class="fin-grid">
                <div class="fin-box"><span>Deuda Canchas</span><b id="deuda-canchas">$0</b></div>
                <div class="fin-box"><span>Crédito Disponible</span><b id="disp-canchas">$0</b></div>
            </div>
            <div class="progress-bar"><div id="bar-fill" class="progress-fill" style="width: 0%"></div></div>
            <div style="font-size: 9px; color: #666; font-weight: 800; margin-top: 10px; text-transform: uppercase; text-align: center;">Límite Total: <span id="limite-total">$0</span></div>
        </div>

        <button onclick="PadelUtils.copiarLink('https://mbpuntodeoro.github.io/canchaabierta/v.html?org=' + orgId)" class="btn-dash" style="background:var(--primary); color:white; margin-bottom:20px;">🔗 COPIAR LINK CARTELERA</button>

        <div id="lista-canchas">Buscando canchas...</div>

        <button id="btn-nueva" onclick="alert('Funcionalidad en desarrollo')" class="btn-dash" style="background:#000; color:white; margin-top:10px; padding:20px; border-radius:22px; font-size:13px;">➕ AGREGAR NUEVA CANCHA</button>
        
        <div id="alerta-bloqueo" style="display:none; color:red; font-size:11px; font-weight:800; text-align:center; margin-top:15px; background: #fff2f2; padding: 12px; border-radius: 12px;"></div>

        <div style="text-align:center; margin-top:40px; padding:20px; border-top:1px solid #eee;">
            <button onclick="abrirHistorial()" class="btn-dash" style="background:#f2f2f7; color:var(--text); width: auto; padding: 10px 20px; border: 1px solid #ddd; margin-bottom: 15px;">📋 VER HISTORIAL DE PAGOS</button>
            <p style="font-size:10px; font-weight:800; color:#ccc;">DESARROLLADO POR MARIANO BLUMENFELD</p>
        </div>
    </div>

<script>
    let orgId = new URLSearchParams(window.location.search).get('org');
    let store = { cuenta: {}, movimientos: [], canchas: {} };
    const auth = firebase.auth();

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            
            if (!orgId) {
                const snap = await db.ref('facturacion').once('value');
                const data = snap.val() || {};
                for (let id in data) {
                    if (data[id].cuenta && data[id].cuenta.emailOrganizador === user.email) {
                        orgId = id; window.history.replaceState(null, null, `?org=${id}`);
                        break;
                    }
                }
            }
            if (orgId) initApp();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-content').style.display = 'none';
        }
    });

    function initApp() {
        // Datos del Club
        db.ref(`facturacion/${orgId}/cuenta`).on('value', s => { 
            store.cuenta = s.val() || {}; 
            renderUI(); 
        });

        // Movimientos
        db.ref(`facturacion/${orgId}/movimientos`).on('value', s => { 
            const d = s.val() || {}; 
            store.movimientos = Object.keys(d).map(k => ({id:k, ...d[k]}));
            renderUI(); 
        });

        // Canchas
        db.ref(`hubs/${orgId}/canchas`).on('value', snap => {
            const val = snap.val();
            const ids = val ? (Array.isArray(val) ? val : Object.values(val)) : [];
            if(ids.length === 0) document.getElementById('lista-canchas').innerHTML = "No hay canchas configuradas.";
            
            ids.forEach(id => {
                db.ref(`eventos/${id}`).on('value', evS => {
                    const eData = evS.val();
                    if(eData) { store.canchas[id] = { id, ...eData }; drawCanchas(); }
                });
            });
        });
    }

    function renderUI() {
        const res = PadelSaaS.analizarCuenta(store.cuenta, store.movimientos);
        if(!res) return;

        document.getElementById('org-name').innerText = store.cuenta.nombreOrg || orgId;
        document.getElementById('venc-abono').innerText = PadelSaaS.fmtFecha(res.vencimientoAbono);
        document.getElementById('deuda-canchas').innerText = PadelUtils.fmtDinero(res.deudaCanchas);
        document.getElementById('disp-canchas').innerText = PadelUtils.fmtDinero(res.disponible);
        document.getElementById('limite-total').innerText = PadelUtils.fmtDinero(res.limiteTotal);
        document.getElementById('bar-fill').style.width = res.porcentaje + '%';

        const badge = document.getElementById('badge-abono');
        badge.innerText = res.statusTime === 'vencido' ? "ABONO VENCIDO" : "ABONO AL DÍA";
        badge.style.background = res.statusTime === 'vencido' ? 'var(--danger)' : 'var(--success)';
        badge.style.color = 'white';

        document.getElementById('btn-nueva').style.opacity = res.isBlocked ? '0.3' : '1';
        const alerta = document.getElementById('alerta-bloqueo');
        if(res.isBlocked) { 
            alerta.style.display = 'block'; 
            alerta.innerText = res.msgLocked; 
        } else { 
            alerta.style.display = 'none'; 
        }
    }

    function drawCanchas() {
        const list = document.getElementById('lista-canchas');
        const sorted = Object.values(store.canchas).sort((a,b) => new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));
        let html = "";
        sorted.forEach(c => {
            const conf = (c.inscriptos || []).filter(p => p.estado !== 'pendiente').length;
            html += `<div class="cancha-card">
                <div style="display:flex;justify-content:space-between"><b>🎾 ${c.organiza}</b> <span class="tag-cat">${c.categorias}</span></div>
                <div style="font-size:12px; color:var(--sub); margin:8px 0;">📅 ${PadelSaaS.fmtFecha(new Date(c.fecha+'T12:00:00'))} | 🕒 ${c.hora} hs</div>
                <div style="font-size:11px; font-weight:700;">👥 ${conf} / ${c.cupo} confirmados</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px">
                    <button class="btn-dash" style="background:#f2f2f7; margin:0;" onclick="alert('Config: '+ '${c.id}')">⚙️ CONFIG</button>
                    <button class="btn-dash" style="background:#000; color:#fff; margin:0;" onclick="alert('Jugadores: '+ '${c.id}')">👥 JUGADORES</button>
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }

    function iniciarSesion() { auth.signInWithEmailAndPassword(document.getElementById('log-email').value, document.getElementById('log-pass').value).catch(e => alert("Error")); }
    function cerrarSesion() { auth.signOut().then(() => window.location.href='index.html'); }
</script>
</body>
</html>
