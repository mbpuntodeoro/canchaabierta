<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Organizador - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ff9500; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; padding-bottom: 100px;}
        .hero { background: #1d1d1f; color: white; padding: 25px; border-radius: 28px; margin-bottom: 15px; box-shadow: var(--shadow); }
        .fin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .fin-box { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 18px; text-align: center; }
        .fin-box b { font-size: 16px; font-weight: 900; display: block;}
        .fin-box span { font-size: 9px; text-transform: uppercase; color: #aaa; font-weight: 800;}
        
        /* BLOQUE TU PLAN */
        .plan-card { background: white; padding: 25px; border-radius: 28px; border: 1.5px solid #f2f2f7; margin-bottom: 15px; text-align: center; box-shadow: var(--shadow); }
        .plan-status { font-weight: 900; font-size: 18px; margin-bottom: 5px; display: block; }
        .plan-info { font-size: 13px; color: var(--sub); font-weight: 600; display: block; margin-bottom: 15px; }
        .btn-plan { display: inline-block; padding: 12px 25px; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 13px; transition: 0.3s; }

        .cancha-card { background: white; padding: 22px; border-radius: 28px; border: 1.5px solid #f2f2f7; margin-bottom: 12px; box-shadow: var(--shadow); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; }
        .btn-dash { border: none; padding: 14px; border-radius: 16px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; margin-top: 8px; text-transform: uppercase; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 35px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .player-row { background: white; border: 1px solid #eee; border-radius: 20px; padding: 10px 15px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 10px; }
        .btn-status { width: 110px; padding: 10px; border-radius: 12px; border: none; color: white; font-weight: 800; font-size: 10px; cursor: pointer; }
        .input-std { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #ddd; margin-bottom: 10px; outline: none; box-sizing: border-box; font-family: inherit;}
        label { display: block; font-size: 9px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 10px 0 2px 5px; }
        .error-msj { background: #fff2f2; color: var(--danger); padding: 10px; border-radius: 10px; font-size: 11px; font-weight: 800; margin-bottom: 10px; display: none; }
        .footer-personal { text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid #eee; }
        .btn-orange { background: #ff9500; color: white; text-decoration: none; padding: 14px 25px; border-radius: 50px; font-weight: 900; font-size: 13px; display: inline-block; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,149,0,0.3); }
        .btn-locked { background: #eee !important; color: #aaa !important; cursor: not-allowed !important; }
    </style>
</head>
<body>
    <div class="container">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
            <h1 id="org-name-disp" style="margin:0; font-weight:900; letter-spacing:-1.5px">...</h1>
            <button onclick="window.location.href='index.html'" style="background:none; border:none; color:var(--sub); font-weight:800; cursor:pointer">SALIR</button>
        </header>

        <div class="hero"><div class="fin-grid">
            <div class="fin-box"><span>Ingresos Estimados</span><b id="txt-deu">$0</b></div>
            <div class="fin-box"><span>Saldo Sistema</span><b id="txt-lim">$0</b></div>
        </div></div>

        <div class="plan-card" id="card-plan">
            <span id="plan-status" class="plan-status">Analizando plan...</span>
            <span id="plan-days" style="font-weight: 800; font-size: 14px; display: block; margin-bottom: 5px;">-</span>
            <span class="plan-info">Tu abono dura 30 días desde que lo activás.</span>
            <a id="btn-plan-action" href="#" target="_blank" class="btn-plan">RENOVAR AHORA</a>
        </div>

        <button onclick="copiarLink()" style="width:100%; padding:18px; border-radius:18px; background:var(--primary); color:white; border:none; font-weight:900; margin-bottom:20px; cursor:pointer">🔗 COPIAR LINK CARTELERA</button>

        <div id="canchas-list">Cargando canchas...</div>

        <button id="btn-add-cancha" onclick="abrirNuevaCancha()" style="width:100%; padding:20px; border-radius:20px; background:#000; color:white; border:none; font-weight:900; margin-top:10px; cursor:pointer">➕ AGREGAR NUEVA CANCHA</button>
        <p id="msg-plan-locked" style="color: var(--danger); font-size: 11px; font-weight: 800; text-align: center; display: none; margin-top: 10px;">Para crear nuevos turnos necesitás renovar tu plan.</p>

        <div class="footer-personal">
            <p style="font-size:10px; font-weight:800; color:#ccc; letter-spacing:1px">DESARROLLADO POR MARIANO BLUMENFELD</p>
            <a href="https://wa.me/5491166463800" class="btn-orange">💬 ¿DUDAS? ESCRIBIME</a>
        </div>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0">⚙️ Configuración</h2>
            <input type="hidden" id="ed-id">
            <label>Tipo de Evento</label>
            <select id="ed-tipo" class="input-std" onchange="validarRecurrencia()">
                <option value="unico">Evento Único</option>
                <option value="recurrente">Todas las semanas</option>
            </select>
            <label>Nombre Cancha</label><input id="ed-org" class="input-std">
            <label>Organizador</label><input id="ed-owner" class="input-std">
            <label>WhatsApp</label><input id="ed-celu" class="input-std">
            <label>Sede</label><input id="ed-lug" class="input-std">
            <label>🏷️ Categoría</label><input id="ed-cat" class="input-std">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Fecha</label><input id="ed-fec" type="date" class="input-std" onchange="validarRecurrencia()"></div>
                <div><label>Cupo</label><input id="ed-cup" type="number" class="input-std"></div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Inicio</label><input id="ed-h1" type="time" class="input-std"></div>
                <div><label>Fin</label><input id="ed-h2" type="time" class="input-std"></div>
            </div>
            <label>Precio ($)</label><input id="ed-val" type="number" class="input-std">
            <label>Alias MP</label><input id="ed-ali" class="input-std">
            <button id="btn-save-config" onclick="guardarConfig()" style="width:100%; padding:18px; border-radius:18px; background:#007aff; color:white; border:none; font-weight:900; cursor:pointer">GUARDAR CAMBIOS</button>
            <button onclick="cerrarModals()" style="width:100%; padding:15px; border-radius:18px; background:#eee; color:#333; border:none; margin-top:10px; cursor:pointer">CANCELAR</button>
        </div>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const orgId = new URLSearchParams(window.location.search).get('org');
    let isNew = false, courtData = {}, isPlanActive = true;
    window.defaultData = { owner: "", celu: "", alias: "" };

    function updatePlanUI(f) {
        const statusTxt = document.getElementById('plan-status');
        const daysTxt = document.getElementById('plan-days');
        const btnPlan = document.getElementById('btn-plan-action');
        const btnAdd = document.getElementById('btn-add-cancha');
        const msgLocked = document.getElementById('msg-plan-locked');
        
        const expiry = f.planExpiryDate || Date.now();
        const diff = expiry - Date.now();
        const remainingDays = Math.ceil(diff / 86400000);
        const fechaFormat = new Date(expiry).toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });

        const waMsg = encodeURIComponent(`Hola Mariano, quiero renovar mi abono de PadelApp para el club ${f.nombreOrg || orgId}`);
        btnPlan.href = `https://wa.me/5491166463800?text=${waMsg}`;

        if (remainingDays <= 0) {
            isPlanActive = false;
            statusTxt.innerText = `🔴 Vencido el ${fechaFormat}`;
            statusTxt.style.color = 'var(--danger)';
            daysTxt.innerText = `Venció hace ${Math.abs(remainingDays)} días`;
            btnPlan.innerText = "ACTIVAR PLAN";
            btnPlan.style.background = 'var(--primary)';
            btnPlan.style.color = 'white';
            btnAdd.className = "btn-dash btn-locked";
            btnAdd.onclick = null;
            msgLocked.style.display = 'block';
        } else {
            isPlanActive = true;
            statusTxt.innerText = `🟢 Activo hasta ${fechaFormat}`;
            statusTxt.style.color = 'var(--success)';
            daysTxt.innerText = `Te quedan ${remainingDays} días`;
            btnPlan.innerText = "RENOVAR AHORA";
            btnPlan.style.background = '#f2f2f7';
            btnPlan.style.color = 'var(--text)';
            if (remainingDays < 5) {
                statusTxt.style.color = 'var(--warning)';
                statusTxt.innerText = `⚠️ Plan por vencer (${fechaFormat})`;
            }
        }
    }

    function init() {
        if(!orgId) return;
        db.ref(`facturacion/${orgId}/cuenta`).on('value', s => { 
            const f = s.val() || {};
            document.getElementById('org-name-disp').innerText = f.nombreOrg || orgId;
            document.getElementById('txt-deu').innerText = "$" + (f.consumoActual || 0).toLocaleString();
            document.getElementById('txt-lim').innerText = "$" + (f.limiteCredito || 0).toLocaleString();
            window.defaultData = { owner: f.nombreContacto || "", celu: f.celularContacto || "", alias: f.aliasPredeterminado || "" };
            updatePlanUI(f);
        });
        db.ref('hubs/'+orgId).on('value', snap => {
            const ids = snap.val()?.canchas || [];
            ids.forEach(id => {
                db.ref('eventos/'+id).on('value', evS => {
                    const d = evS.val(); if(!d) return;
                    courtData[id] = { id, ...d }; renderizarCanchas();
                });
            });
        });
    }

    function renderizarCanchas() {
        const listContainer = document.getElementById('canchas-list');
        const sortedArray = Object.values(courtData).sort((a,b) => new Date(a.fecha + 'T' + a.hora) - new Date(b.fecha + 'T' + b.hora));
        listContainer.innerHTML = sortedArray.length ? "" : "No tienes canchas creadas.";
        sortedArray.forEach(d => {
            const conf = (d.inscriptos || []).filter(p => p.estado !== 'pendiente').length;
            listContainer.innerHTML += `<div class="cancha-card">
                <div style="display:flex;justify-content:space-between"><b>🎾 ${d.organiza}</b> <span class="tag-cat">${d.categorias}</span></div>
                <div class="info-row">📅 ${d.fecha} | 🕒 ${d.hora} hs</div>
                <div class="info-row">👥 ${conf} / ${d.cupo} Confirmados</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <button class="btn-dash" style="background:#f2f2f7" onclick="abrirConfig('${d.id}')">⚙️ CONFIG</button>
                    <button class="btn-dash" style="background:#000; color:#fff" onclick="window.abrirJugadores('${d.id}')">👥 JUGADORES</button>
                </div></div>`;
        });
    }

    function abrirNuevaCancha() {
        if(!isPlanActive) return alert("Tu plan está vencido. Renovalo para crear canchas.");
        isNew = true; document.getElementById('modal-config').style.display = 'flex';
        document.getElementById('ed-id').value = ""; document.getElementById('ed-owner').value = window.defaultData.owner;
        document.getElementById('ed-celu').value = window.defaultData.celu; document.getElementById('ed-ali').value = window.defaultData.alias;
    }

    function guardarConfig() {
        let id = document.getElementById('ed-id').value;
        const upd = { organiza: document.getElementById('ed-org').value, nombreOrganizador: document.getElementById('ed-owner').value, celuOrganizador: document.getElementById('ed-celu').value, lugar: document.getElementById('ed-lug').value, categorias: document.getElementById('ed-cat').value, fecha: document.getElementById('ed-fec').value, hora: document.getElementById('ed-h1').value, horaFin: document.getElementById('ed-h2').value, cupo: parseInt(document.getElementById('ed-cup').value), valor: parseInt(document.getElementById('ed-val').value), alias: document.getElementById('ed-ali').value };
        if(isNew) {
            const newRef = db.ref('eventos').push(); id = newRef.key;
            db.ref('eventos/'+id).set(upd).then(() => {
                db.ref('hubs/'+orgId+'/canchas').once('value', s => {
                    let c = s.val() || []; c.push(id); db.ref('hubs/'+orgId+'/canchas').set(c);
                });
            });
        } else { db.ref('eventos/'+id).update(upd); }
        alert("¡Guardado!"); cerrarModals();
    }

    function cerrarModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    function copiarLink() { alert("Link copiado!"); }
    init();
</script>
</body>
</html>
