<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Organizador - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --text: #1d1d1f; --sub: #86868b; --danger: #ff3b30; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 550px; margin: auto; }
        #suspension-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; color: white; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
        .card { background: white; padding: 22px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .tag-cat { font-size: 10px; color: var(--sub); background: rgba(134, 134, 139, 0.12); padding: 3px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; margin-left: 8px; }
        .btn-full { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 900; background: var(--primary); color: white; cursor: pointer; }
        .footer-brand { margin-top: 50px; text-align: center; padding: 30px 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        .footer-brand p { font-size: 10px; font-weight: 800; color: var(--sub); letter-spacing: 2px; text-transform: uppercase; }
        .btn-footer-wa { background: #FF9500; color: white; text-decoration: none; padding: 12px 25px; border-radius: 12px; font-size: 11px; font-weight: 800; display: inline-block; }
    </style>
</head>
<body>
    <div id="suspension-overlay">
        <h1 style="font-size:80px">🚫</h1><h2>ACCESO RESTRINGIDO</h2>
        <p style="color:#888;max-width:400px">Tu cuenta ha sido suspendida por la administración. Por favor contactate para regularizar tu situación.</p>
        <div style="background:#1c1c1e;padding:20px;border-radius:24px;margin:25px 0">
            <p style="font-size:11px;color:#aaa">SALDO PENDIENTE:</p><h2 id="muro-deuda" style="color:var(--danger);font-size:32px">$0</h2>
        </div>
        <button class="btn-full" onclick="window.open('https://wa.me/5491166463800')">HABLAR CON SOPORTE</button>
    </div>

    <div class="container" id="main-content">
        <header style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
            <h1 id="org-name" style="margin:0;font-weight:900">Cargando...</h1>
            <button onclick="signOut(auth)" style="background:none;border:none;font-weight:800;color:var(--sub)">SALIR</button>
        </header>
        <div class="card">
            <label style="font-size:10px;font-weight:800;color:var(--sub);text-transform:uppercase">Consumo Sistema</label>
            <h2 id="txt-costo" style="font-size:32px;margin:10px 0">$0</h2>
        </div>
        <div id="canchas-list"></div>
        
        <div class="footer-brand">
            <p>DESARROLLADO POR MARIANO BLUMENFELD</p>
            <a href="https://wa.me/5491166463800" class="btn-footer-wa">🚀 ¡QUIERO ORGANIZAR MI CANCHA!</a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI", authDomain: "padelapp-e72af.firebaseapp.com", databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com", projectId: "padelapp-e72af", storageBucket: "padelapp-e72af.appspot.com", messagingSenderId: "806914592971", appId: "1:806914592971:web:84720063fc36a882b40b4e" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app); const auth = getAuth(app);
    const orgId = new URLSearchParams(window.location.search).get('org');

    onAuthStateChanged(auth, user => {
        if(user && orgId) {
            onValue(ref(db, `facturacion/${orgId}/cuenta`), snap => {
                const c = snap.val() || {};
                if(c.cuentaSuspendida) {
                    document.getElementById('suspension-overlay').style.display = 'flex';
                    document.getElementById('main-content').style.display = 'none';
                    document.getElementById('muro-deuda').innerText = `$${c.consumoActual.toLocaleString()}`;
                } else {
                    document.getElementById('org-name').innerText = c.nombreOrg || orgId;
                    document.getElementById('txt-costo').innerText = `$${c.consumoActual.toLocaleString()}`;
                }
            });
        }
    });
</script>
</body>
</html>
