<script>

document.addEventListener("change",function(e){

    if(!e.target.closest("#fc-categorias input")) return;

    const checks=[
        ...document.querySelectorAll("#fc-categorias input")
    ];

    const todas=
        checks.find(c=>c.value==="Todas");

    if(e.target.value==="Todas" && e.target.checked){

        checks.forEach(c=>{
            if(c!==todas){
                c.checked=false;
            }
        });

        return;
    }

    if(e.target.value!=="Todas" && e.target.checked){

        todas.checked=false;

    }

    const alguna=
        checks.some(c=>c.checked && c.value!=="Todas");

    if(!alguna){

        todas.checked=true;

    }

});

</script>

    function clonarCancha(c) {
        if(!confirm('¿Duplicar cancha para la próxima semana?')) return;
        var btn = document.getElementById('btn-clonar-semana');
        btn.disabled = true; btn.innerHTML = "⏳...";
        var fObj = new Date(c.fecha + 'T12:00:00'); fObj.setDate(fObj.getDate() + 7);
        var nuevaF = fObj.toISOString().split('T')[0];
        var nc = {
            fecha: nuevaF, hora: c.hora, horaFin: c.horaFin || "", organiza: c.organiza || "", lugar: c.lugar || "",
            valor: c.valor || 0, cupo: c.cupo || 8, alias: c.alias || "", celuOrganizador: c.celuOrganizador || "",
            estado: 'PROGRAMADA', tipo: c.tipo || 'unica', inscriptos: {} 
        };
        var ref = db.ref('eventos').push();
        ref.set(nc).then(function() {
            db.ref('hubs/' + globalOrgId + '/canchas').once('value', function(s) {
                var l = Array.isArray(s.val()) ? s.val() : Object.values(s.val() || {});
                l.push(ref.key);
                db.ref('hubs/' + globalOrgId + '/canchas').set(l).then(function() {
                    alert('Clonada.'); cerrarPanelCancha(); btn.disabled = false;
                });
            });
        });
    }

    function guardarCancha() {
   var d = {
    tipo: document.getElementById('fc-tipo').value,
    fecha: document.getElementById('fc-fecha').value,
    hora: document.getElementById('fc-hora').value,
    horaFin: document.getElementById('fc-horafin').value,

    orgId: globalOrgId,

    organiza: document.getElementById('fc-titulo').value,
    lugar: document.getElementById('fc-lugar').value,
    valor: parseInt(document.getElementById('fc-precio').value) || 0,
    cupo: parseInt(document.getElementById('fc-cupo').value) || 8,
    alias: document.getElementById('fc-alias').value,
    celuOrganizador: document.getElementById('fc-celu').value,
categorias: [
    ...document.querySelectorAll(
        "#fc-categorias input:checked"
    )
].map(c => c.value),
    siguienteGenerada:
    editandoCanchaId
        ? eventosCache.find(e => e.id === editandoCanchaId)?.siguienteGenerada ?? false
        : false
};

    // Guardar configuración permanente del organizador
   if (d.alias || d.celuOrganizador) {
    db.ref('facturacion/' + globalOrgId + '/cuenta').update({
        aliasCobro: d.alias,
        whatsappOrganizador: d.celuOrganizador
    });
}

    var btnSave = document.getElementById('btn-save-form');
    btnSave.disabled = true;

    if (editandoCanchaId) {

        db.ref('eventos/' + editandoCanchaId)
            .update(d)
            .then(() => {
                btnSave.disabled = false;
                cerrarFormularioCancha();
            });

    } else {

        var ref = db.ref('eventos').push();

        ref.set(
            Object.assign(d, {
                estado: 'PROGRAMADA',
                inscriptos: {}
            })
        ).then(function() {

            db.ref('hubs/' + globalOrgId + '/canchas')
                .once('value', function(s) {

                    var l = Array.isArray(s.val())
                        ? s.val()
                        : Object.values(s.val() || {});

                    l.push(ref.key);

                    db.ref('hubs/' + globalOrgId + '/canchas')
                        .set(l)
                        .then(() => {
                            btnSave.disabled = false;
                            cerrarFormularioCancha();
                        });
                });
        });
    }
}
    function toggleSuspender() {
        if(!editandoCanchaId) return;
        var c = eventosCache.find(e => e.id === editandoCanchaId);
        var nuevoEstado = (c.estado === 'NO_REALIZADA') ? 'PROGRAMADA' : 'NO_REALIZADA';

        var ahora = new Date();
        var inicioCancha = new Date(c.fecha + 'T' + c.hora);
        var diferenciaHoras = (inicioCancha - ahora) / (1000 * 60 * 60);

        if (nuevoEstado === 'NO_REALIZADA' && diferenciaHoras < 1) {
            const penalizacion = {
                concepto: "Penalización: Suspensión tardía (" + c.fecha + " " + c.hora + ")",
                monto: 500, tipo: 'cancha', estado: 'pendiente', fecha: ahora.toISOString()
            };
            db.ref('facturacion/' + globalOrgId + '/movimientos').push(penalizacion);
            alert("⚠️ Cancha suspendida. Se aplicó un cargo por suspensión tardía (menos de 1h).");
        } else if (nuevoEstado === 'NO_REALIZADA') {
            alert("✅ Cancha suspendida sin cargos adicionales.");
        }

        db.ref('eventos/' + editandoCanchaId).update({ estado: nuevoEstado }).then(() => {
            cerrarFormularioCancha(); cerrarPanelCancha();
        });
    }
