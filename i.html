<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --text: #1d1d1f; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 450px; margin: auto; }
        .input-std { width: 100%; padding: 15px; border-radius: 15px; border: 1.5px solid #eee; margin-top: 10px; font-family: inherit; font-size: 16px; outline: none; box-sizing: border-box;}
        .btn-join { background: #000; color: #fff; border: none; padding: 20px; border-radius: 20px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loading" style="text-align:center; margin-top:50px; font-weight:800; color:#ccc;">Cargando evento...</div>

    <div id="main-content" class="card" style="display:none">
        <h3 id="match-title" style="margin:0; font-weight:900; font-size:24px;"></h3>
        <p id="match-info" style="color:#888; font-weight:600; line-height:1.5; margin-top:10px;"></p>
        
        <hr style="border:0; border-top:1px solid #eee; margin:25px 0;">
        
        <label style="font-weight:800; font-size:12px; text-transform:uppercase; color:#aaa;">Tu Nombre y Apellido</label>
        <input id="p-name" class="input-std" placeholder="Ej: Mariano B.">
        
        <button onclick="anotarse()" class="btn-join">CONFIRMAR INSCRIPCIÓN</button>
    </div>

<script>
    const id = new URLSearchParams(window.location.search).get('id');
    const org = new URLSearchParams(window.location.search).get('org');

    if(!id) document.body.innerHTML = "Link inválido";

    db.ref(`eventos/${id}`).on('value', snap => {
        const d = snap.val();
        if(!d) { document.getElementById('loading').innerText = "Este evento ya no existe."; return; }
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        
        document.getElementById('match-title').innerText = d.organiza;
        document.getElementById('match-info').innerHTML = `
            📅 ${PadelSaaS.fmtFecha(new Date(d.fecha+'T12:00:00'))}<br>
            🕒 ${d.hora} hs | 📍 ${d.lugar || 'Sede a confirmar'}<br>
            💰 Valor: ${PadelUtils.fmtDinero(d.valor)}
        `;
    });

    function anotarse() {
        const name = document.getElementById('p-name').value.trim();
        if(!name) return alert("Poné tu nombre");
        
        db.ref(`eventos/${id}/inscriptos`).once('value', s => {
            const list = s.val() || [];
            list.push({ nombre: name, estado: 'pendiente', fecha: Date.now() });
            db.ref(`eventos/${id}/inscriptos`).set(list).then(() => {
                alert("¡Te anotaste con éxito!");
                window.location.href = `v.html?org=${org}`;
            });
        });
    }
</script>
</body>
</html>
