<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js?v=9"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --text: #1d1d1f; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; flex-direction: column; align-items: center; margin: 0; min-height: 100vh;}
        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); text-align: center; max-width: 450px; width: 100%; box-sizing: border-box; display: none;}
        .info-box { background: #f8f9fb; padding: 25px; border-radius: 20px; margin: 20px 0; text-align: left; font-size: 15px; border: 1px solid #eee; line-height: 1.6;}
        .input-std { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #f2f2f7; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; font-family: inherit;}
        .btn-pay { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; border-radius: 22px; font-weight: 900; cursor: pointer; font-size: 17px; text-transform: uppercase;}
        .payment-box { background: #fff2f2; border: 2px solid #ffdbdb; border-radius: 24px; padding: 25px; margin-top: 25px; }
        .footer-personal { text-align: center; margin-top: 40px; padding: 20px; width: 100%; max-width: 450px;}
        .btn-orange { background: #ff9500; color: white; text-decoration: none; padding: 14px 25px; border-radius: 50px; font-weight: 900; font-size: 13px; display: inline-block; margin-top: 10px; }
        #loading { font-weight: 800; color: #888; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

<div id="loading">Cargando datos del evento...</div>

<div class="card" id="main-card">
    <h1 id="t-org" style="margin-top:0; font-weight: 900; text-transform: uppercase;">...</h1>
    
    <div class="info-box">
        <p style="margin: 0 0 8px 0;">📅 FECHA: <b id="t-fec">--</b></p>
        <p style="margin: 0 0 8px 0;">🕒 HORARIO: <b id="t-hor">--</b></p>
        <p style="margin: 0 0 8px 0;">📍 LUGAR: <b id="t-lug">--</b></p>
        <p style="margin: 0 0 8px 0;">👤 ORGANIZA: <b id="t-owner">--</b></p>
        <p style="margin: 0 0 15px 0;">🏷️ CATEGORÍA: <b id="t-cat">--</b></p>
        <p style="margin: 0; font-size: 18px;">💰 VALOR: <b id="t-val">$0</b></p>
    </div>
    
    <input id="p-nom" class="input-std" placeholder="Tu Nombre">
    <input id="p-tel" type="tel" class="input-std" placeholder="Tu WhatsApp">
    
    <button class="btn-pay" onclick="registrar()" id="btn-submit">ANOTARME</button>
    <button onclick="volverCartelera()" style="width:100%; background:none; border:none; color:#888; font-weight:800; margin-top:15px; cursor:pointer; font-size:12px; text-transform:uppercase;">VOLVER A LA CARTELERA</button>
</div>

<div class="footer-personal">
    <p style="font-size:10px; font-weight:800; color:#ccc; letter-spacing:1px">DESARROLLADO POR MARIANO BLUMENFELD</p>
    <a href="https://wa.me/5491166463800" class="btn-orange">💬 ¿DUDAS? ESCRIBIME</a>
</div>

<script>
    const eid = new URLSearchParams(window.location.search).get('id');
    const org = new URLSearchParams(window.location.search).get('org');
    let ev = null;
    
    if(eid) {
        db.ref('eventos/'+eid).once('value', s => {
            ev = s.val();
            if(!ev) {
                document.getElementById('loading').innerText = "Este evento ya no está disponible.";
                return;
            }
            
            // Oculta el loading y muestra tu tarjeta dorada
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';

            document.getElementById('t-org').innerText = ev.organiza;
            document.getElementById('t-fec').innerText = PadelUtils.fmtFechaFull(ev.fecha);
            document.getElementById('t-hor').innerText = ev.hora + ' a ' + (ev.horaFin || '--') + ' hs';
            document.getElementById('t-lug').innerText = ev.lugar || 'Sede a confirmar';
            document.getElementById('t-owner').innerText = ev.nombreOrganizador || 'Admin';
            document.getElementById('t-cat').innerText = ev.categorias || 'General';
            document.getElementById('t-val').innerText = PadelUtils.fmtDinero(ev.valor);
        });
    } else {
        document.getElementById('loading').innerText = "Link de inscripción inválido.";
    }

    function volverCartelera() {
        if(org) window.location.href = `v.html?org=${org}`;
        else window.history.back();
    }

    function registrar() {
        const n = document.getElementById('p-nom').value.trim();
        const t = document.getElementById('p-tel').value.trim();
        if(!n || !t) return alert("Por favor, completá tu nombre y WhatsApp.");
        
        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-submit').innerText = "PROCESANDO...";

        db.ref('eventos/'+eid+'/inscriptos').once('value', s => {
            const ins = s.val() || [];
            if(ins.length >= ev.cupo) {
                alert("Lo sentimos, la cancha ya está llena.");
                document.getElementById('btn-submit').disabled = false;
                document.getElementById('btn-submit').innerText = "ANOTARME";
                return;
            }
            
            ins.push({ nombre: n, telefono: t, estado: 'pendiente' });
            
            db.ref('eventos/'+eid+'/inscriptos').set(ins).then(() => {
                document.getElementById('main-card').innerHTML = `
                    <div style="font-size:60px; margin-bottom:10px">✅</div>
                    <h2 style="font-weight:900; margin-bottom:5px">¡Inscripción Exitosa!</h2>
                    <p style="color:#888; font-weight:600; margin-bottom:20px">Tu lugar está pre-reservado.</p>
                    
                    <div class="payment-box">
                        <b style="color:#ff3b30; font-size:12px; display:block; margin-bottom:15px; text-transform:uppercase; letter-spacing:0.5px; line-height:1.4;">PARA ASEGURAR TU LUGAR, TRANSFERÍ EL MONTO TOTAL Y ENVIÁ EL COMPROBANTE O CONTACTATE CON EL ORGANIZADOR PARA COORDINAR OTRA FORMA DE PAGO.</b>
                        
                        <p style="font-size:14px; color:#555; margin-bottom:5px; font-weight:800;">MONTO A TRANSFERIR:</p>
                        <h2 style="margin:0 0 15px 0; font-weight:900; color:#1d1d1f; font-size:28px;">${PadelUtils.fmtDinero(ev.valor)}</h2>
                        
                        <p style="font-size:13px; color:#555; margin-bottom:5px; font-weight:800;">ALIAS:</p>
                        <h2 style="margin:0 0 15px 0; font-weight:900; color:var(--primary); font-size:22px; word-break: break-all;">${ev.alias || 'Consultar'}</h2>
                        
                        <button onclick="PadelUtils.copiarLink('${ev.alias || ''}')" style="padding:12px 25px; border-radius:15px; border:1.5px solid #ddd; background:white; cursor:pointer; font-family:inherit; font-weight:800; font-size:12px; text-transform:uppercase;">📋 COPIAR ALIAS</button>
                    </div>
                    
                    <a href="https://wa.me/${ev.celuOrganizador}?text=${encodeURIComponent('Hola! Soy ' + n + ', te envío el comprobante por la cancha de ' + ev.organiza + ' del ' + PadelUtils.fmtFechaCorta(ev.fecha))}" style="display:block; background:#25D366; color:white; padding:20px; border-radius:22px; margin-top:20px; text-decoration:none; font-weight:900; font-size:16px; text-transform:uppercase;">💬 ENVIAR COMPROBANTE</a>
                    <button onclick="volverCartelera()" style="width:100%; background:none; border:none; color:#888; font-weight:800; margin-top:20px; cursor:pointer; font-size:12px; text-transform:uppercase;">VOLVER A LA CARTELERA</button>
                `;
                window.scrollTo(0,0);
            });
        });
    }
</script>
</body>
</html>
