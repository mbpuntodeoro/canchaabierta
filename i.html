<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js?v=2"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f2f2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #1d1d1f; }
        .card { background: white; border-radius: 30px; padding: 35px 30px; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .title { font-size: 24px; font-weight: 900; text-align: center; text-transform: uppercase; margin-bottom: 25px; line-height: 1.2; }
        .info-box { background: #f8f9fb; border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid #f2f2f7; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 12px; }
        .info-row:last-child { margin-bottom: 0; }
        .input-std { width: 100%; padding: 16px; border-radius: 16px; border: 1.5px solid #eee; margin-bottom: 12px; font-family: inherit; font-size: 15px; outline: none; box-sizing: border-box; }
        .btn-join { background: #007aff; color: white; border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; font-size: 15px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        #loading { text-align: center; font-weight: 800; color: #888; margin-top: 50px; }
    </style>
</head>
<body>

    <div id="loading">Buscando evento...</div>

    <div class="card" id="main-card" style="display:none;">
        <div class="title" id="t-nombre">Cargando...</div>
        
        <div class="info-box">
            <div class="info-row">📅 FECHA: <span id="t-fec">--</span></div>
            <div class="info-row">🕒 HORARIO: <span id="t-hs">--</span></div>
            <div class="info-row">📍 LUGAR: <span id="t-lug">--</span></div>
            <div class="info-row">👤 ORGANIZA: <span id="t-org">--</span></div>
            <div class="info-row">🏷️ CATEGORÍA: <span id="t-cat">--</span></div>
            <div class="info-row" style="margin-top: 15px;">💰 VALOR: <b id="t-val" style="color:#1d1d1f">$0</b></div>
        </div>

        <input type="text" id="p-name" class="input-std" placeholder="Tu Nombre y Apellido">
        <input type="tel" id="p-celu" class="input-std" placeholder="Tu WhatsApp">
        
        <button onclick="anotarse()" class="btn-join" id="btn-submit">ANOTARME</button>
    </div>

<script>
    const id = new URLSearchParams(window.location.search).get('id');
    const org = new URLSearchParams(window.location.search).get('org');

    if(!id || !org) {
        document.getElementById('loading').innerText = "Link inválido o incompleto.";
    } else {
        db.ref(`eventos/${id}`).once('value', snap => {
            const d = snap.val();
            if(!d) {
                document.getElementById('loading').innerText = "El evento no existe o fue eliminado.";
                return;
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';

            const diasList = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const fObj = new Date(d.fecha + 'T12:00:00');
            const fechaFormateada = `${diasList[fObj.getDay()]} ${PadelSaaS.fmtFecha(fObj.getTime())}`;

            document.getElementById('t-nombre').innerText = d.organiza || "CANCHA ABIERTA";
            document.getElementById('t-fec').innerText = fechaFormateada;
            document.getElementById('t-hs').innerText = d.hora + ' a ' + (d.horaFin || '--') + ' hs';
            document.getElementById('t-lug').innerText = d.lugar || '--';
            document.getElementById('t-org').innerText = d.nombreOrganizador || '--';
            document.getElementById('t-cat').innerText = d.categorias || 'Todas las categorías';
            document.getElementById('t-val').innerText = PadelUtils.fmtDinero(d.valor);
        });
    }

    function anotarse() {
        const name = document.getElementById('p-name').value.trim();
        const celu = document.getElementById('p-celu').value.trim();
        
        if(!name || !celu) return alert("Por favor, completá tu nombre y tu WhatsApp.");
        
        const btn = document.getElementById('btn-submit');
        btn.innerText = "ANOTANDO...";
        btn.disabled = true;

        db.ref(`eventos/${id}/inscriptos`).once('value', s => {
            const list = s.val() || [];
            list.push({ nombre: name, celular: celu, estado: 'pendiente', fecha: Date.now() });
            
            db.ref(`eventos/${id}/inscriptos`).set(list).then(() => {
                alert("¡Te anotaste con éxito!");
                window.location.href = `v.html?org=${org}`;
            }).catch(err => {
                alert("Error al anotarse. Reintentá.");
                btn.innerText = "ANOTARME";
                btn.disabled = false;
            });
        });
    }
</script>
</body>
</html>
