<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --text: #1d1d1f; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); text-align: center; max-width: 450px; width: 100%; }
        .info-box { background: #f8f9fb; padding: 20px; border-radius: 20px; margin: 20px 0; text-align: left; font-size: 14px; line-height: 1.6; }
        .input-std { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #f2f2f7; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box;}
        .btn-pay { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; border-radius: 22px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>
<div class="card" id="main-card">
    <h1 id="t-org" style="margin-top:0">CARGANDO...</h1>
    <div class="info-box">
        <p>📅 FECHA: <b id="t-fec">--</b></p>
        <p>🕒 HORARIO: <b id="t-hor">--</b></p>
        <p>📍 LUGAR: <b id="t-lug">--</b></p>
        <p>🏷️ CATEGORÍA: <b id="t-cat">--</b></p>
        <p>💰 VALOR: <b id="t-val">$0</b></p>
    </div>
    <input id="p-nom" class="input-std" placeholder="Tu Nombre">
    <input id="p-tel" class="input-std" placeholder="Tu WhatsApp">
    <button class="btn-pay" onclick="registrar()">ANOTARME</button>
</div>

<script>
    firebase.initializeApp({ databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const eid = new URLSearchParams(window.location.search).get('id');

    if(eid) {
        db.ref('eventos/'+eid).once('value', s => {
            const ev = s.val();
            document.getElementById('t-org').innerText = ev.organiza.toUpperCase();
            document.getElementById('t-fec').innerText = ev.fecha.split('-').reverse().join('/');
            document.getElementById('t-hor').innerText = ev.hora + ' a ' + (ev.horaFin || '--') + ' hs';
            document.getElementById('t-lug').innerText = ev.lugar || 'Sede a confirmar';
            document.getElementById('t-cat').innerText = ev.categorias || 'General';
            document.getElementById('t-val').innerText = "$" + (ev.valor || 0);
        });
    }

    function registrar() {
        const n = document.getElementById('p-nom').value.trim();
        const t = document.getElementById('p-tel').value.trim();
        if(!n || !t) return alert("Faltan datos");
        
        db.ref('eventos/'+eid+'/inscriptos').once('value', s => {
            const ins = s.val() || [];
            ins.push({ nombre: n, telefono: t, estado: 'pendiente' });
            db.ref('eventos/'+eid+'/inscriptos').set(ins).then(() => {
                alert("¡Inscripto con éxito!");
                location.reload();
            });
        });
    }
</script>
</body>
</html>
