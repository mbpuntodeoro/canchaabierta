<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --danger: #ff3b30; --success: #25D366; }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        .container { max-width: 450px; width: 100%; }
        .back-link { text-decoration: none; color: var(--sub); font-size: 13px; font-weight: 700; display: block; margin-bottom: 20px; text-transform: uppercase; }
        
        .card { background: var(--card); padding: 30px; border-radius: 32px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); }
        .tag-cat { font-size: 10px; color: var(--sub); background: rgba(134, 134, 139, 0.12); padding: 4px 10px; border-radius: 8px; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        
        h2 { margin: 10px 0; font-size: 28px; font-weight: 900; letter-spacing: -1px; line-height: 1.1; }
        .info-row { font-size: 15px; color: var(--sub); font-weight: 600; margin-bottom: 20px; border-bottom: 1px solid #f2f2f7; padding-bottom: 15px; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 20px 0 8px 5px; }
        .input-std { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #f2f2f7; font-size: 16px; outline: none; transition: 0.3s; }
        .input-std:focus { border-color: var(--primary); }

        .btn-pay { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; border-radius: 20px; font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 15px; transition: 0.2s; }
        .btn-pay:active { transform: scale(0.97); }

        /* CAJA ROJA DE PAGO */
        .payment-box { background: #fff2f2; border: 2px solid #ffdbdb; border-radius: 24px; padding: 25px; margin: 20px 0; text-align: center; }
        .payment-box b { color: var(--danger); font-size: 13px; text-transform: uppercase; display: block; margin-bottom: 15px; letter-spacing: 1px; }
        .alias-txt { font-size: 22px; font-weight: 900; color: var(--text); display: block; margin-bottom: 10px; letter-spacing: -0.5px; }
        
        .btn-copy { background: white; color: var(--text); border: 1px solid #ddd; padding: 10px 20px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .btn-whatsapp { background: var(--success); color: white; border: none; width: 100%; padding: 18px; border-radius: 18px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <a href="javascript:history.back()" class="back-link">← Volver a la cartelera</a>

    <div class="card" id="form-container">
        <div id="loading">Cargando detalles...</div>
        
        <div id="content" class="hidden">
            <span class="tag-cat" id="txt-cat">Categoría</span>
            <h2 id="txt-organiza">Turno</h2>
            <div class="info-row">
                <span id="txt-fecha">--/--</span> • <span id="txt-hora">--:-- HS</span><br>
                📍 <span id="txt-lugar">---</span>
            </div>

            <div style="background: #eef6ff; padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #d0e3ff;">
                <p style="margin:0; font-size:11px; font-weight:800; color:var(--primary); text-transform:uppercase;">Valor Inscripción</p>
                <h3 style="margin:5px 0 0 0; font-size:26px; font-weight:900;" id="txt-precio">$0</h3>
            </div>

            <label>Nombre y Apellido</label>
            <input type="text" id="player-name" class="input-std" placeholder="Tu nombre">

            <label>WhatsApp</label>
            <input type="tel" id="player-phone" class="input-std" placeholder="Sin 0 ni 15">

            <button class="btn-pay" id="btn-submit" onclick="registrarJugador()">CONFIRMAR Y VER PAGO</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI",
        authDomain: "padelapp-e72af.firebaseapp.com",
        databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com",
        projectId: "padelapp-e72af",
        storageBucket: "padelapp-e72af.firebasestorage.app",
        messagingSenderId: "806914592971",
        appId: "1:806914592971:web:84720063fc36a882b40b4e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('id');
    const orgId = params.get('org');

    let evento = null;

    if (eventId) {
        get(ref(db, `eventos/${eventId}`)).then(snap => {
            if (snap.exists()) {
                evento = snap.val();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('txt-cat').innerText = evento.categorias || "General";
                document.getElementById('txt-organiza').innerText = evento.organiza;
                document.getElementById('txt-fecha').innerText = evento.fecha.split('-').reverse().join('/');
                document.getElementById('txt-hora').innerText = evento.hora + " HS";
                document.getElementById('txt-lugar').innerText = evento.lugar;
                document.getElementById('txt-precio').innerText = "$" + (evento.valor || 0).toLocaleString();
            }
        });
    }

    window.registrarJugador = async () => {
        const nombre = document.getElementById('player-name').value.trim();
        const telefono = document.getElementById('player-phone').value.trim();
        if (!nombre || !telefono) return alert("Completá tus datos");

        const btn = document.getElementById('btn-submit');
        btn.disabled = true; btn.innerText = "PROCESANDO...";

        try {
            const snap = await get(ref(db, `eventos/${eventId}/inscriptos`));
            let inscriptos = snap.val() || [];
            
            inscriptos.push({ nombre, telefono, estado: "pendiente", fecha: new Date().toISOString() });
            await update(ref(db, `eventos/${eventId}`), { inscriptos });

            // PANTALLA DE ÉXITO CON CAJA DE PAGO
            const alias = evento.alias || "COORDINAR.CON.ADMIN";
            const celu = evento.celuOrganizador || "5491166463800";
            const msgWA = encodeURIComponent(`Hola! Me acabo de anotar para ${evento.organiza} el ${evento.fecha.split('-').reverse().join('/')}. Mi nombre es ${nombre}. Acá te mando el comprobante del pago.`);

            document.getElementById('form-container').innerHTML = `
                <div style="text-align:center;">
                    <div style="font-size:60px; margin-bottom:15px;">✅</div>
                    <h2 style="font-size:24px;">¡Inscripción Exitosa!</h2>
                    <p style="color:var(--sub); font-size:14px; margin-bottom:25px;">Hola <b>${nombre}</b>, reservamos tu lugar. Para confirmar definitivamente, por favor realizá el pago:</p>
                    
                    <div class="payment-box">
                        <b>⚠️ PASO FINAL: REALIZAR PAGO</b>
                        <span class="alias-txt" id="alias-val">${alias}</span>
                        <button class="btn-copy" onclick="copiarAlias('${alias}')">
                            <span>📋</span> <span id="copy-txt">COPIAR ALIAS</span>
                        </button>
                    </div>

                    <a href="https://wa.me/${celu}?text=${msgWA}" target="_blank" class="btn-whatsapp">
                        <span>💬</span> ENVIAR COMPROBANTE AL ORGANIZADOR
                    </a>

                    <button class="btn-pay" style="background:#f2f2f7; color:var(--sub); margin-top:20px; font-size:13px;" onclick="location.href='v.html?org=${orgId}'">
                        VOLVER A LA CARTELERA
                    </button>
                </div>
            `;
        } catch (e) { alert("Error: " + e.message); btn.disabled = false; }
    };

    window.copiarAlias = (txt) => {
        navigator.clipboard.writeText(txt).then(() => {
            const btnTxt = document.getElementById('copy-txt');
            btnTxt.innerText = "¡COPIADO!";
            setTimeout(() => btnTxt.innerText = "COPIAR ALIAS", 2000);
        });
    };
</script>
</body>
</html>
