<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js?v=6"></script>
    <style>
        :root { --primary: #007aff; --danger: #ff3b30; }
        body { font-family: 'Outfit', sans-serif; background: #f2f2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #1d1d1f; }
        .card { background: white; border-radius: 30px; padding: 35px 30px; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box;}
        .title { font-size: 24px; font-weight: 900; text-align: center; text-transform: uppercase; margin-bottom: 25px; line-height: 1.2; }
        .info-box { background: #f8f9fb; border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid #f2f2f7; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 12px; }
        .input-std { width: 100%; padding: 16px; border-radius: 16px; border: 1.5px solid #eee; margin-bottom: 12px; font-family: inherit; font-size: 15px; outline: none; box-sizing: border-box; }
        .btn-join { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 900; font-size: 15px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        /* CAJA DE ADVERTENCIA REPARADA */
        .warning-box { background: #fff2f2; border: 2px solid #ffdbdb; border-radius: 22px; padding: 20px; margin: 20px 0; text-align: center; }
        .warning-text { color: #1d1d1f; font-weight: 700; font-size: 14px; margin-bottom: 15px; line-height: 1.4; display: block; }
        .amount-text { display: block; font-size: 18px; font-weight: 900; color: var(--danger); margin-bottom: 15px; }
        
        /* ALIAS BOX */
        .alias-container { display: flex; align-items: center; background: white; border: 1.5px solid #ffdbdb; border-radius: 14px; overflow: hidden; margin-top: 5px; }
        .alias-data { flex: 1; padding: 12px; text-align: center; font-size: 16px; font-weight: 900; color: #1d1d1f; }
        .btn-copy { background: #ffdbdb; border: none; padding: 12px 15px; color: var(--danger); font-weight: 800; font-size: 11px; cursor: pointer; text-transform: uppercase; }

        #loading { text-align: center; font-weight: 800; color: #888; }
    </style>
</head>
<body>

    <div id="loading">Cargando datos...</div>

    <div class="card" id="main-card" style="display:none;">
        
        <div id="form-screen">
            <div class="title" id="t-nombre">--</div>
            <div class="info-box">
                <div class="info-row">📅 FECHA: <span id="t-fec">--</span></div>
                <div class="info-row">🕒 HORARIO: <span id="t-hs">--</span></div>
                <div class="info-row">📍 LUGAR: <span id="t-lug">--</span></div>
                <div class="info-row">👤 ORGANIZA: <span id="t-org">--</span></div>
                <div class="info-row" style="margin-top: 15px;">💰 VALOR: <b id="t-val" style="color:#1d1d1f; font-size:16px;">$0</b></div>
            </div>
            <input type="text" id="p-name" class="input-std" placeholder="Tu Nombre y Apellido">
            <input type="tel" id="p-celu" class="input-std" placeholder="Tu WhatsApp">
            <button onclick="anotarse()" class="btn-join" id="btn-submit">CONFIRMAR MI LUGAR</button>
        </div>

        <div id="success-screen" style="display:none; text-align:center;">
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            <h2 style="margin-top:0; font-weight:900; text-transform:uppercase; letter-spacing:-0.5px;">¡Solicitud Recibida!</h2>
            
            <div class="warning-box">
                <span class="warning-text">Para asegurar tu lugar realiza la transferencia o contactate con el organizador para coordinar otra forma de pago.</span>
                
                <span style="font-size: 10px; font-weight: 800; color: #aaa; text-transform: uppercase;">Importe a transferir:</span>
                <span class="amount-text" id="s-importe-final">$0</span>
                
                <span style="font-size: 10px; font-weight: 800; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 5px;">ALIAS:</span>
                <div class="alias-container">
                    <div class="alias-data" id="s-alias-final">--</div>
                    <button class="btn-copy" onclick="copiarAlias()">Copiar</button>
                </div>
            </div>

            <button onclick="notificarWa()" class="btn-join" style="background:#25D366; color:white; margin-top:0;">📲 ENVIAR COMPROBANTE</button>
            <button onclick="window.location.href='v.html?org='+org" class="btn-join" style="background:#eef6ff; color:var(--primary); margin-top:10px; font-size: 12px;">VOLVER A LA CARTELERA</button>
        </div>
    </div>

<script>
    const id = new URLSearchParams(window.location.search).get('id');
    const org = new URLSearchParams(window.location.search).get('org');
    let eventData = {}; 

    if(!id || !org) {
        document.getElementById('loading').innerText = "Enlace incompleto.";
    } else {
        db.ref(`eventos/${id}`).once('value', snap => {
            eventData = snap.val();
            if(!eventData) { document.getElementById('loading').innerText = "El evento ya no está disponible."; return; }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';

            const diasList = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            const fObj = new Date(eventData.fecha + 'T12:00:00');
            const fechaTxt = `${diasList[fObj.getDay()]} ${PadelSaaS.fmtFecha(fObj.getTime())}`;

            document.getElementById('t-nombre').innerText = eventData.organiza;
            document.getElementById('t-fec').innerText = fechaTxt;
            document.getElementById('t-hs').innerText = eventData.hora + ' a ' + (eventData.horaFin || '--') + ' hs';
            document.getElementById('t-lug').innerText = eventData.lugar || '--';
            document.getElementById('t-org').innerText = eventData.nombreOrganizador || '--';
            document.getElementById('t-val').innerText = PadelUtils.fmtDinero(eventData.valor);
            
            // Datos para la pantalla de éxito
            document.getElementById('s-importe-final').innerText = PadelUtils.fmtDinero(eventData.valor);
            document.getElementById('s-alias-final').innerText = eventData.alias || 'CONSULTAR AL DUEÑO';
        });
    }

    function anotarse() {
        const name = document.getElementById('p-name').value.trim();
        const celu = document.getElementById('p-celu').value.trim();
        if(!name || !celu) return alert("Por favor, ingresá tu nombre y WhatsApp.");
        
        document.getElementById('btn-submit').disabled = true;
        document.getElementById('btn-submit').innerText = "PROCESANDO...";

        db.ref(`eventos/${id}/inscriptos`).once('value', s => {
            const list = s.val() || [];
            list.push({ nombre: name, celular: celu, estado: 'pendiente', fecha: Date.now() });
            db.ref(`eventos/${id}/inscriptos`).set(list).then(() => {
                document.getElementById('form-screen').style.display = 'none';
                document.getElementById('success-screen').style.display = 'block';
                window.scrollTo(0,0);
            });
        });
    }

    function copiarAlias() {
        const alias = document.getElementById('s-alias-final').innerText;
        if(alias === 'CONSULTAR AL DUEÑO') return;
        navigator.clipboard.writeText(alias).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.innerText = "¡COPIADO!";
            setTimeout(() => { btn.innerText = "COPIAR"; }, 2000);
        });
    }

    function notificarWa() {
        const celOrg = eventData.celuOrganizador;
        const nombrePlayer = document.getElementById('p-name').value.trim();
        const texto = `¡Hola! Me anoté a la cancha "${eventData.organiza}". Soy ${nombrePlayer}. Te envío el comprobante de transferencia:`;
        window.open(`https://wa.me/${celOrg.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(texto)}`, '_blank');
    }
</script>
</body>
</html>
