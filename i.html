<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --text: #1d1d1f; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; flex-direction: column; align-items: center;}
        .card { background: white; padding: 35px; border-radius: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); text-align: center; max-width: 450px; width: 100%; box-sizing: border-box;}
        .info-box { background: #f8f9fb; padding: 25px; border-radius: 20px; margin: 20px 0; text-align: left; font-size: 15px; border: 1px solid #eee; line-height: 1.6;}
        .input-std { width: 100%; padding: 18px; border-radius: 18px; border: 2px solid #f2f2f7; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; font-family: inherit;}
        .btn-pay { background: var(--primary); color: white; border: none; width: 100%; padding: 20px; border-radius: 22px; font-weight: 900; cursor: pointer; font-size: 17px;}
        .payment-box { background: #fff2f2; border: 2px solid #ffdbdb; border-radius: 24px; padding: 25px; margin-top: 25px; }
        .footer-personal { text-align: center; margin-top: 40px; padding: 20px; width: 100%; max-width: 450px;}
        .btn-orange { background: #ff9500; color: white; text-decoration: none; padding: 14px 25px; border-radius: 50px; font-weight: 900; font-size: 13px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card" id="main-card">
    <h1 id="t-org" style="margin-top:0; font-weight: 900; letter-spacing: -1px;">...</h1>
    <div class="info-box">
        <p>📅 FECHA: <b id="t-fec">--</b></p>
        <p>🕒 HORARIO: <b id="t-hor">--</b></p>
        <p>📍 LUGAR: <b id="t-lug">--</b></p>
        <p>👤 ORGANIZA: <b id="t-owner">--</b></p>
        <p>🏷️ CATEGORÍA: <b id="t-cat">--</b></p>
        <p>💰 VALOR: <b id="t-val">$0</b></p>
    </div>
    <input id="p-nom" class="input-std" placeholder="Tu Nombre">
    <input id="p-tel" class="input-std" placeholder="Tu WhatsApp">
    <button class="btn-pay" onclick="registrar()">ANOTARME</button>
</div>

<div class="footer-personal">
    <p style="font-size:10px; font-weight:800; color:#ccc; letter-spacing:1px">DESARROLLADO POR MARIANO BLUMENFELD</p>
    <a href="https://wa.me/5491166463800" class="btn-orange">💬 ¿DUDAS? ESCRIBIME</a>
</div>

<script>
    const eid = new URLSearchParams(window.location.search).get('id');
    let evento = null;

    if(eid) {
        db.ref('eventos/'+eid).once('value', s => {
            evento = s.val();
            document.getElementById('t-org').innerText = evento.organiza.toUpperCase();
            // USANDO EL CEREBRO PARA LA FECHA
            document.getElementById('t-fec').innerText = PadelUtils.fmtFechaFull(evento.fecha);
            document.getElementById('t-hor').innerText = evento.hora + ' a ' + (evento.horaFin || '--') + ' hs';
            document.getElementById('t-lug').innerText = evento.lugar || 'Sede a confirmar';
            document.getElementById('t-owner').innerText = evento.nombreOrganizador || 'Admin';
            document.getElementById('t-cat').innerText = evento.categorias || 'General';
            document.getElementById('t-val').innerText = PadelUtils.fmtDinero(evento.valor);
        });
    }

    function registrar() {
        const n = document.getElementById('p-nom').value.trim();
        const t = document.getElementById('p-tel').value.trim();
        if(!n || !t) return alert("Faltan datos");
        db.ref('eventos/'+eid+'/inscriptos').once('value', s => {
            const ins = s.val() || [];
            if(ins.length >= evento.cupo) return alert("Cancha llena");
            ins.push({ nombre: n, telefono: t, estado: 'pendiente' });
            db.ref('eventos/'+eid+'/inscriptos').set(ins).then(() => {
                document.getElementById('main-card').innerHTML = `
                    <div style="font-size:60px">✅</div>
                    <h2>¡Inscripción Exitosa!</h2>
                    <div class="payment-box">
                        <b style="color:#ff3b30; font-size:11px">PARA ASEGURAR TU LUGAR, REALIZÁ LA TRANSFERENCIA O ESCRIBIME</b>
                        <h1 style="margin:15px 0">${evento.alias}</h1>
                        <button onclick="navigator.clipboard.writeText('${evento.alias}'); alert('Alias Copiado')" style="padding:10px; border-radius:10px; border:1px solid #ddd; cursor:pointer; font-family:inherit; font-weight:700">📋 COPIAR ALIAS</button>
                    </div>
                    <a href="https://wa.me/${evento.celuOrganizador}" style="display:block; background:#25D366; color:white; padding:20px; border-radius:20px; margin-top:15px; text-decoration:none; font-weight:800">💬 ENVIAR COMPROBANTE</a>
                `;
            });
        });
    }
</script>
</body>
</html>
