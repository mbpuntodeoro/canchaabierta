<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub Pro - SGCA</title>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ffcc00; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.4; }
        .container { max-width: 850px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; }
        
        .accordion-item { background: white; border-radius: 20px; margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; border: 1.5px solid #f2f2f7; }
        .accordion-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { padding: 0 20px 20px 20px; display: none; border-top: 1px solid #f2f2f7; background: #fff; }
        .accordion-item.active .accordion-content { display: block; }

        .tag-status { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; margin-left: 8px; }
        .tag-suspended { background: var(--danger); color: white; }
        .tag-ok { background: var(--success); color: white; }
        .tag-trial { background: var(--warning); color: black; }

        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 15px 0 6px 6px; }
        .input-std { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e5e5e7; font-size: 14px; outline: none; background: #fff; margin-bottom: 10px; }
        
        .btn-blue { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-manage { background: #eef6ff; color: var(--primary); border: none; padding: 8px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }
        
        .cancha-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fb; padding: 12px 15px; border-radius: 12px; margin-bottom: 6px; border: 1px solid #efeff4; }
        .cancha-row span { font-size: 11px; font-weight: 700; color: var(--sub); }
        .cancha-row a { font-size: 11px; font-weight: 800; color: var(--primary); text-decoration: none; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 24px; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div id="view-login">
        <div style="background:white; padding:30px; border-radius:24px; max-width:400px; margin:100px auto; text-align:center; box-shadow:var(--shadow);">
            <h1 style="margin-top: 0;">Master Admin</h1>
            <p style="font-size: 12px; color: var(--sub); margin-bottom: 20px;">Acceso seguro cifrado end-to-end</p>
            <input type="email" id="master-email" class="input-std" placeholder="Correo electrónico" style="text-align:center;">
            <input type="password" id="master-pass" class="input-std" placeholder="Contraseña" style="text-align:center; margin-bottom:20px;">
            <button id="btn-login" class="btn-blue" onclick="login()">Ingresar al Sistema</button>
        </div>
    </div>

    <div id="view-panel" class="hidden">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -1px;">Centro de Mandos Pro</h1>
            <button onclick="cerrarSesion()" style="background: none; border: none; font-size: 11px; font-weight: 800; color: var(--sub); cursor: pointer;">CERRAR SESIÓN</button>
        </header>
        <div id="org-list"></div>
        <div style="margin-top:40px; text-align:center;">
            <button class="btn-manage" style="background:var(--text); color:white; padding:15px 30px;" onclick="nuevoOrgPrompt()">+ AGREGAR NUEVO ORGANIZADOR</button>
        </div>
    </div>

    <div id="modal-finance" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title" style="margin:0 0 20px 0; font-size: 22px;">Configuración</h2>
            <input type="hidden" id="modal-org-id">
            
            <div style="background: #fff2f2; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1.5px solid #ffdbdb; display: flex; justify-content: space-between; align-items: center;">
                <div><b style="color:var(--danger); font-size:14px;">SUSPENDER CLIENTE</b><p style="margin:0; font-size:11px; color:#a35e5e;">Bloquea gestión e inscripciones.</p></div>
                <input type="checkbox" id="mod-suspendido" style="transform: scale(1.5);">
            </div>

            <div style="background: #f8f9fb; padding: 18px; border-radius: 18px; margin-bottom: 20px; border: 1px solid #eee;">
                <label style="margin-top:0;">Deuda Actual</label>
                <div style="display:flex; align-items: center; justify-content: space-between;">
                    <h3 id="txt-deuda-modal" style="font-size: 28px; margin:0; font-weight: 900;">$0</h3>
                    <button class="btn-manage" style="background: var(--success); color: white;" onclick="confirmarPago()">COBRAR Y RENOVAR</button>
                </div>
            </div>

            <div style="background: #fff9e6; padding: 15px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #ffeeba;">
                <label style="margin-top:0; color:#856404;">Setear Días de Prueba (desde hoy)</label>
                <input id="mod-prueba-dias" class="input-std" type="number" placeholder="Ej: 7" oninput="calcularFechasAutomaticas()" style="border-color:#ffeeba;">
            </div>

            <div class="grid-2">
                <div><label>Vencimiento de Abono</label><input id="mod-ciclo" class="input-std" type="date"></div>
                <div><label>Límite Crédito ($)</label><input id="mod-limite" class="input-std" type="number"></div>
            </div>

            <div class="grid-2">
                <div><label>Costo Abono ($)</label><input id="mod-abono" class="input-std" type="number"></div>
                <div><label>Costo Cancha ($)</label><input id="mod-cancha" class="input-std" type="number"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="btn-blue" onclick="guardarFinanzas()">💾 Guardar Cambios</button>
                <button class="btn-blue" style="background:#f2f2f7; color:var(--text);" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    // IMPORTANTE: Incorporamos el módulo de Autenticación
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // Mantenemos la sesión activa si recargás la página
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-panel').classList.remove('hidden');
            cargarLista();
        }
    });

    window.login = () => {
        const email = document.getElementById('master-email').value.trim();
        const pass = document.getElementById('master-pass').value;
        const btn = document.getElementById('btn-login');

        if (!email || !pass) return alert("Completá ambos campos");

        btn.innerText = "Autenticando...";
        btn.disabled = true;

        signInWithEmailAndPassword(auth, email, pass)
            .then((userCredential) => {
                // Logueo exitoso
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-panel').classList.remove('hidden');
                cargarLista();
            })
            .catch((error) => {
                alert("Error de acceso. Verificá tu correo y contraseña.");
                btn.innerText = "Ingresar al Sistema";
                btn.disabled = false;
            });
    };

    window.cerrarSesion = () => {
        signOut(auth).then(() => {
            location.reload();
        });
    };

    function cargarLista() {
        onValue(ref(db, 'hubs'), async (snap) => {
            const hubs = snap.val() || {};
            const list = document.getElementById('org-list'); list.innerHTML = "";
            for (let id in hubs) {
                const fSnap = await get(ref(db, 'facturacion/' + id + '/cuenta'));
                const f = fSnap.val() || { consumoActual: 0, cuentaSuspendida: false };
                const hoy = new Date();
                const isTrial = f.fechaFinPrueba && new Date(f.fechaFinPrueba + "T23:59:59") > hoy;
                
                const item = document.createElement('div');
                item.className = "accordion-item";
                
                let canchasHtml = "";
                const cIds = hubs[id].canchas || [];
                for (let cid of cIds) {
                    canchasHtml += `
                        <div class="cancha-row">
                            <span>ID: ${cid}</span>
                            <a href="v.html?id=${cid}&org=${id}" target="_blank">VER CANCHA ➔</a>
                        </div>`;
                }

                item.innerHTML = `
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <div>
                            <b style="text-transform:uppercase;">${hubs[id].nombre || id}</b>
                            ${f.cuentaSuspendida ? '<span class="tag-status tag-suspended">Suspendido</span>' : isTrial ? '<span class="tag-status tag-trial">En Prueba</span>' : '<span class="tag-status tag-ok">Activo</span>'}
                            <div style="font-size:11px; color:var(--sub); font-weight:700; margin-top:4px;">Deuda: $${(f.consumoActual || 0).toLocaleString()} | Vence: ${f.fechaFinCiclo || '-'}</div>
                        </div>
                        <div style="font-size:18px; color:var(--sub);">▾</div>
                    </div>
                    <div class="accordion-content">
                        <div style="display:flex; gap:10px; margin:15px 0;">
                            <button class="btn-manage" onclick="abrirFinanzas('${id}')">⚙️ GESTIÓN FINANCIERA</button>
                            <a href="v.html?org=${id}" target="_blank" class="btn-manage" style="text-decoration:none; background:#f2f2f7; color:var(--text);">CARTELERA</a>
                            <a href="d.html?org=${id}" target="_blank" class="btn-manage" style="text-decoration:none; background:#f2f2f7; color:var(--text);">DASHBOARD</a>
                        </div>
                        
                        <div style="background:#f2f2f7; padding:15px; border-radius:15px; margin-bottom:15px;">
                            <label style="margin-top:0;">URL Acortada de la Cartelera</label>
                            <input class="input-std" placeholder="Ej: bit.ly/mi-club" value="${hubs[id].urlCorta || ''}" onchange="guardarUrlHub('${id}', this.value)">
                        </div>

                        <label>Canchas vinculadas:</label>
                        ${canchasHtml || '<p style="font-size:11px; color:#ccc; margin:10px 0;">Sin canchas vinculadas.</p>'}
                    </div>
                `;
                list.appendChild(item);
            }
        });
    }

    window.toggleAccordion = (el) => {
        const item = el.parentElement;
        const isActive = item.classList.contains('active');
        document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('active'));
        if (!isActive) item.classList.add('active');
    };

    window.guardarUrlHub = (hubId, val) => {
        update(ref(db, 'hubs/' + hubId), { urlCorta: val }).then(() => alert("URL de Cartelera guardada"));
    };

    window.calcularFechasAutomaticas = () => {
        const dias = parseInt(document.getElementById('mod-prueba-dias').value) || 0;
        if (dias > 0) {
            const hoy = new Date();
            const fPrueba = new Date(); fPrueba.setDate(hoy.getDate() + dias);
            const fCiclo = new Date(fPrueba); fCiclo.setDate(fCiclo.getDate() + 30);
            document.getElementById('mod-ciclo').value = fCiclo.toISOString().split('T')[0];
        }
    };

    window.abrirFinanzas = async (id) => {
        const s = await get(ref(db, 'facturacion/' + id + '/cuenta'));
        const f = s.val() || { consumoActual: 0, costoAbono: 25000, costoCancha: 7000, cuentaSuspendida: false, limiteCredito: 30000 };
        document.getElementById('modal-org-id').value = id;
        document.getElementById('modal-title').innerText = "Finanzas: " + id;
        document.getElementById('txt-deuda-modal').innerText = "$" + (f.consumoActual || 0).toLocaleString();
        document.getElementById('mod-limite').value = f.limiteCredito || 30000;
        document.getElementById('mod-abono').value = f.costoAbono || 25000;
        document.getElementById('mod-cancha').value = f.costoCancha || 7000;
        document.getElementById('mod-ciclo').value = f.fechaFinCiclo || "";
        document.getElementById('mod-suspendido').checked = f.cuentaSuspendida || false;
        document.getElementById('mod-prueba-dias').value = "";
        document.getElementById('modal-finance').classList.remove('hidden');
    };

    window.confirmarPago = async () => {
        const id = document.getElementById('modal-org-id').value;
        const s = await get(ref(db, 'facturacion/' + id + '/cuenta'));
        const f = s.val();
        if (f.consumoActual <= 0) return alert("No hay deuda pendiente.");
        if (!confirm("¿Confirmás el pago? Se reseteará la deuda y se sumarán 30 días al plan.")) return;
        const hoy = new Date();
        const venceActual = f.fechaFinCiclo ? new Date(f.fechaFinCiclo + "T23:59:59") : hoy;
        const nuevaFecha = hoy > venceActual ? hoy : venceActual;
        nuevaFecha.setDate(nuevaFecha.getDate() + 30);
        await update(ref(db, 'facturacion/' + id + '/cuenta'), { consumoActual: 0, fechaFinCiclo: nuevaFecha.toISOString().split('T')[0], estado: "activo" });
        await push(ref(db, 'facturacion/' + id + '/historial'), { fecha: hoy.toISOString(), monto: f.consumoActual, tipo: "PAGO" });
        alert("Pago registrado y plan renovado."); cerrarModal();
    };

    window.guardarFinanzas = async () => {
        const id = document.getElementById('modal-org-id').value;
        const dias = parseInt(document.getElementById('mod-prueba-dias').value) || 0;
        let updates = {
            costoAbono: parseInt(document.getElementById('mod-abono').value),
            costoCancha: parseInt(document.getElementById('mod-cancha').value),
            fechaFinCiclo: document.getElementById('mod-ciclo').value,
            limiteCredito: parseInt(document.getElementById('mod-limite').value),
            cuentaSuspendida: document.getElementById('mod-suspendido').checked
        };
        if (dias > 0) {
            const fP = new Date(); fP.setDate(fP.getDate() + dias);
            updates.fechaFinPrueba = fP.toISOString().split('T')[0];
            updates.abonoCobrado = false;
        }
        await update(ref(db, 'facturacion/' + id + '/cuenta'), updates);
        alert("Configuración Guardada"); cerrarModal();
    };

    window.nuevoOrgPrompt = async () => {
        const id = prompt("ID del Hub (minúsculas, sin espacios):"); if(!id) return;
        const nom = prompt("Nombre Comercial:"); if(!nom) return;
        await set(ref(db, 'hubs/' + id), { nombre: nom, canchas: [] });
    };
    window.cerrarModal = () => document.getElementById('modal-finance').classList.add('hidden');
</script>
</body>
</html>
