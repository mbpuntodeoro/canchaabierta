<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub | PadelApp Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --dark: #121212; --bg: #f8f9fa; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; color: var(--dark); }
        
        /* Login Overlay */
        #login-screen { position: fixed; inset: 0; background: var(--dark); display: flex; align-items: center; justify-content: center; z-index: 1000; color: white; flex-direction: column; }
        .login-box { background: #1e1e1e; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        
        /* Dashboard Layout */
        header { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; display: none; }
        
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card p { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin: 5px 0 0; }
        
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .form-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        input { padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-main:disabled { background: #ccc; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge { background: #e3f2fd; color: #0d47a1; padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>🔒 Admin Access</h2>
        <p>Inicie sesión para gestionar el Master Hub</p>
        <input type="email" id="admin-email" placeholder="Email" style="width: 90%; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white;">
        <input type="password" id="admin-pass" placeholder="Contraseña" style="width: 90%; margin-bottom: 20px; background: #222; border: 1px solid #444; color: white;">
        <button class="btn-main" onclick="handleLogin()">ENTRAR</button>
    </div>
</div>

<header>
    <h1>PadelApp <span style="font-weight: 300;">Master Hub</span></h1>
</header>

<div class="container">
    <div class="grid-stats">
        <div class="stat-card"><h4>Hubs Activos</h4><p id="total-hubs">0</p></div>
        <div class="stat-card"><h4>Comisiones Pendientes</h4><p id="total-comisiones">$0</p></div>
    </div>

    <div class="card">
        <h2>🚀 Alta de Nuevo Organizador</h2>
        <div class="form-group">
            <input id="new-org-id" placeholder="ID (ej: club-norte)">
            <input id="new-org-nombre" placeholder="Nombre Comercial">
        </div>
        <div class="form-group">
            <input id="new-org-email" placeholder="Email del Cliente">
            <input id="new-org-pass" type="password" placeholder="Contraseña (mín. 6 chars)">
        </div>
        <button id="btn-crear" class="btn-main" onclick="altaPro()">CREAR CUENTA Y ACTIVAR ROBOT</button>
    </div>

    <div class="card">
        <h2>📋 Gestión de Clubes</h2>
        <table id="tabla-hubs">
            <thead>
                <tr><th>Club / ID</th><th>Email</th><th>Deuda</th><th>Abono</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // --- CONFIGURACIÓN DE FIREBASE (PEGÁ TUS DATOS ACÁ) ---
   const firebaseConfig = {
  apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI",
  authDomain: "padelapp-e72af.firebaseapp.com",
  databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com",
  projectId: "padelapp-e72af",
  storageBucket: "padelapp-e72af.firebasestorage.app",
  messagingSenderId: "806914592971",
  appId: "1:806914592971:web:84720063fc36a882b40b4e"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const functions = getFunctions(app);
    const crearOrganizador = httpsCallable(functions, 'crearOrganizador');

    // MANEJO DE LOGIN
    window.handleLogin = async () => {
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('admin-pass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (error) {
            alert("Error: " + error.message);
        }
    };

    // CONTROL DE SESIÓN
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.querySelector('.container').style.display = 'block';
            cargarDatos();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    // LLAMADA AL ROBOT (CLOUD FUNCTION)
    window.altaPro = async () => {
        const data = {
            hubId: document.getElementById('new-org-id').value.trim(),
            nombreOrg: document.getElementById('new-org-nombre').value.trim(),
            email: document.getElementById('new-org-email').value.trim(),
            password: document.getElementById('new-org-pass').value.trim()
        };

        if(!data.hubId || !data.email || data.password.length < 6) {
            return alert("Por favor, complete todos los campos (Pass mín. 6 caracteres)");
        }

        const btn = document.getElementById('btn-crear');
        btn.innerText = "⏳ Creando en Google Cloud...";
        btn.disabled = true;

        try {
            const res = await crearOrganizador(data);
            alert("¡Éxito! Organizador creado y vinculado.");
            location.reload();
        } catch (error) {
            console.error(error);
            alert("Error del Servidor: " + error.message);
            btn.innerText = "CREAR CUENTA Y ACTIVAR ROBOT";
            btn.disabled = false;
        }
    };

    // CARGA DE TABLA Y STATS
    function cargarDatos() {
        onValue(ref(db, 'hubs'), (snapshot) => {
            const hubs = snapshot.val();
            if(!hubs) return;
            document.getElementById('total-hubs').innerText = Object.keys(hubs).length;
            const tbody = document.querySelector('#tabla-hubs tbody');
            tbody.innerHTML = "";

            Object.keys(hubs).forEach(id => {
                const h = hubs[id];
                onValue(ref(db, `facturacion/${id}/cuenta`), (snap) => {
                    const fac = snap.val() || { consumoActual: 0, costoAbono: 0 };
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${h.nombre}</strong><br><small>${id}</small></td>
                        <td>${h.email}</td>
                        <td style="color:red; font-weight:bold">$${fac.consumoActual.toLocaleString()}</td>
                        <td><span class="badge">$${fac.costoAbono.toLocaleString()}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        });
    }
</script>
</body>
</html>
