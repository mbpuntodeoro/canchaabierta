<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub Pro - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ff9500; --danger: #ff3b30; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .hub-item { background: white; padding: 20px; border-radius: 24px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .tag { font-size: 9px; font-weight: 800; padding: 5px 10px; border-radius: 8px; text-transform: uppercase; }
        .tag-trial { background: #fff9e6; color: var(--warning); }
        .tag-active { background: #eafaf1; color: var(--success); }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .footer-brand { margin-top: 50px; text-align: center; border-top: 1px solid #ddd; padding-top: 30px; }
        .btn-footer-wa { background: #FF9500; color: white; text-decoration: none; padding: 12px 25px; border-radius: 12px; font-size: 11px; font-weight: 800; display: inline-block; box-shadow: 0 4px 15px rgba(255,149,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-weight:900; letter-spacing:-1px">Master Hub Pro</h1>
        <div id="hubs-list">Cargando clubes...</div>
        <div class="footer-brand">
            <p style="font-size:10px; font-weight:800; color:var(--sub); letter-spacing:1px">DESARROLLADO POR MARIANO BLUMENFELD</p>
            <a href="https://wa.me/5491166463800" class="btn-footer-wa">🚀 ¡QUIERO ORGANIZAR MI CANCHA!</a>
        </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI", authDomain: "padelapp-e72af.firebaseapp.com", databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com", projectId: "padelapp-e72af", storageBucket: "padelapp-e72af.appspot.com", messagingSenderId: "806914592971", appId: "1:806914592971:web:84720063fc36a882b40b4e" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);
    onValue(ref(db, 'hubs'), async snap => {
        const hubs = snap.val(); const container = document.getElementById('hubs-list'); container.innerHTML = "";
        for (let id in hubs) {
            const fSnap = await get(ref(db, `facturacion/${id}/cuenta`)); const f = fSnap.val() || {};
            const isTrial = f.fechaFinPrueba && new Date(f.fechaFinPrueba + "T23:59:59") > new Date();
            const item = document.createElement('div'); item.className = "hub-item";
            item.innerHTML = `<div><b style="text-transform:uppercase">${hubs[id].nombre || id}</b> <span class="tag ${isTrial ? 'tag-trial' : 'tag-active'}">${isTrial ? 'En Prueba' : 'Activo'}</span><div style="font-size:12px; color:var(--sub); margin-top:5px">Deuda: $${(f.consumoActual || 0).toLocaleString()}</div></div><button class="btn-blue" onclick="window.open('d.html?org=${id}')">Gobernar</button>`;
            container.appendChild(item);
        }
    });
</script>
</body>
</html>
