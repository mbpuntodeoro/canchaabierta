<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --text: #1d1d1f; --sub: #86868b; --danger: #ff3b30; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        header { background: #000; color: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px solid var(--primary); }
        .hub-item { background: white; border-radius: 20px; padding: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .input-std { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #ddd; margin-bottom: 10px; font-family: inherit; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-edit { background: #eee; padding: 10px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; text-decoration: none; color: #333; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 35px; max-height: 90vh; overflow-y: auto; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 10px 0 4px 5px; }
    </style>
</head>
<body>
    <header><h2>Master PadelApp</h2><button onclick="location.reload()" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:10px;">ACTUALIZAR</button></header>
    <div class="container">
        <div class="card">
            <h3 style="margin-top:0">🚀 Nuevo Organizador</h3>
            <input id="new-id" class="input-std" placeholder="ID (ej: club-smash)">
            <input id="new-name" class="input-std" placeholder="Nombre Comercial">
            <button class="btn-blue" onclick="crearHub()">REGISTRAR</button>
        </div>
        <div id="lista-clubes">Cargando...</div>
    </div>

    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Perfil y Finanzas</h2>
            <input type="hidden" id="edit-id">
            <label>Nombre Comercial</label><input id="mod-nom" class="input-std">
            <label>Contacto</label><input id="mod-con" class="input-std">
            <label>WhatsApp</label><input id="mod-cel" class="input-std">
            <label>URL / Alias</label><input id="mod-url" class="input-std">
            <hr>
            <label>Deuda ($)</label><input id="mod-deu" class="input-std" type="number">
            <label>Límite ($)</label><input id="mod-lim" class="input-std" type="number">
            <label>Vencimiento Trial</label><input id="mod-venc" class="input-std" type="date">
            <button class="btn-blue" onclick="guardarPerfil()">GUARDAR TODO</button>
            <button class="btn-blue" onclick="cerrarModal()" style="background:#eee; color:#333; margin-top:10px">CERRAR</button>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function render() {
        db.ref('hubs').on('value', async (snap) => {
            const hubs = snap.val() || {};
            const container = document.getElementById('lista-clubes');
            container.innerHTML = "";
            for (let id in hubs) {
                const fSnap = await db.ref(`facturacion/${id}/cuenta`).once('value');
                const f = fSnap.val() || {};
                container.innerHTML += `
                    <div class="hub-item">
                        <div><b>${f.nombreOrg || id}</b><br><small style="color:gray">Deuda: $${f.consumoActual || 0}</small></div>
                        <div style="display:flex; gap:5px">
                            <button class="btn-edit" onclick="abrirPerfil('${id}')">⚙️ EDITAR</button>
                            <a href="d.html?org=${id}" class="btn-edit">DASHBOARD</a>
                        </div>
                    </div>`;
            }
        });
    }

    function crearHub() {
        const id = document.getElementById('new-id').value.trim();
        const nom = document.getElementById('new-name').value.trim();
        if(!id || !nom) return alert("Faltan datos");
        db.ref('hubs/'+id).set({ nombre: nom, canchas: [] });
        db.ref(`facturacion/${id}/cuenta`).set({ nombreOrg: nom, consumoActual: 0, limiteCredito: 50000, urlAcortada: id });
        alert("Creado");
    }

    function abrirPerfil(id) {
        db.ref(`facturacion/${id}/cuenta`).once('value', s => {
            const f = s.val() || {};
            document.getElementById('edit-id').value = id;
            document.getElementById('mod-nom').value = f.nombreOrg || "";
            document.getElementById('mod-con').value = f.nombreContacto || "";
            document.getElementById('mod-cel').value = f.celularContacto || "";
            document.getElementById('mod-url').value = f.urlAcortada || id;
            document.getElementById('mod-deu').value = f.consumoActual || 0;
            document.getElementById('mod-lim').value = f.limiteCredito || 0;
            document.getElementById('mod-venc').value = f.fechaFinCiclo || "";
            document.getElementById('modal-edit').style.display = 'flex';
        });
    }

    function guardarPerfil() {
        const id = document.getElementById('edit-id').value;
        const upd = {
            nombreOrg: document.getElementById('mod-nom').value,
            nombreContacto: document.getElementById('mod-con').value,
            celularContacto: document.getElementById('mod-cel').value,
            urlAcortada: document.getElementById('mod-url').value,
            consumoActual: parseInt(document.getElementById('mod-deu').value),
            limiteCredito: parseInt(document.getElementById('mod-lim').value),
            fechaFinCiclo: document.getElementById('mod-venc').value
        };
        db.ref(`facturacion/${id}/cuenta`).update(upd).then(() => {
            alert("Grabado con éxito");
            cerrarModal();
        });
    }

    function cerrarModal() { document.getElementById('modal-edit').style.display = 'none'; }
    render();
</script>
</body>
</html>
