<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - Cancha Abierta</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --sub: #8e8e93; --success: #34c759; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 24px; font-weight: 800; letter-spacing: -1px; margin: 0; }
        
        .org-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.02); }
        .org-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .org-name { font-size: 18px; font-weight: 700; color: var(--text); text-transform: uppercase; }
        .badge { background: #e1f0ff; color: var(--primary); padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border-radius: 12px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        .btn-view { background: #f2f2f7; color: var(--text); }
        .btn-admin { background: var(--primary); color: white; }
        .btn-add { background: #1c1c1e; color: white; width: 100%; margin-top: 20px; padding: 15px; border-radius: 15px; font-weight: 700; border: none; cursor: pointer; }
        .btn-save { background: var(--success); color: white; width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; border: none; margin-top: 10px; }

        .input-std { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 14px; outline: none; }
        
        .event-list { margin-top: 15px; border-top: 1px solid #f2f2f7; padding-top: 15px; }
        .event-item { font-size: 13px; padding: 8px 0; display: flex; justify-content: space-between; border-bottom: 1px solid #f9f9fb; }
        .event-item a { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* MODAL CORREGIDO */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); display: none; /* Invisible por defecto */
            align-items: center; justify-content: center; padding: 20px; z-index: 100; 
        }
        .modal-overlay.active { display: flex; } /* Se muestra solo con esta clase */
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Centro de Mandos</h1>
        <div style="font-size: 20px;">🚀</div>
    </div>

    <div id="org-list">Cargando organizadores...</div>

    <button class="btn-add" onclick="abrirModal()">+ Nuevo Organizador</button>
</div>

<div id="modal-nuevo" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin-top:0; letter-spacing:-1px;">Nuevo Cliente</h2>
        
        <label style="font-size:10px; font-weight:800; color:var(--sub);">ID DEL ORGANIZADOR (PARA EL LINK)</label>
        <input id="new-org-id" class="input-std" placeholder="Ej: wini-padel">
        
        <label style="font-size:10px; font-weight:800; color:var(--sub);">NOMBRE DEL PRIMER EVENTO</label>
        <input id="new-event-name" class="input-std" placeholder="Ej: Cancha Abierta Wini">
        
        <label style="font-size:10px; font-weight:800; color:var(--sub);">NOMBRE DEL ORGANIZADOR</label>
        <input id="new-organizador" class="input-std" placeholder="Ej: Wini">

        <button class="btn-save" onclick="crearOrganizador()">🚀 Crear y Activar</button>
        <button class="btn" onclick="cerrarModal()" style="width:100%; background:none; color:var(--sub); margin-top:10px;">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. Cargar Organizadores
    onValue(ref(db, 'hubs'), (snap) => {
        const hubs = snap.val() || {};
        const container = document.getElementById('org-list');
        container.innerHTML = "";

        Object.keys(hubs).forEach(orgId => {
            const events = hubs[orgId] || [];
            const card = document.createElement('div');
            card.className = 'org-card';
            card.innerHTML = `
                <div class="org-header">
                    <span class="org-name">${orgId}</span>
                    <span class="badge">${events.length} CANCHAS</span>
                </div>
                <div class="actions">
                    <a href="v.html?org=${orgId}" target="_blank" class="btn btn-view">Ver Cartelera</a>
                    <button class="btn btn-admin" onclick="toggleEvents('${orgId}')">Gestionar</button>
                </div>
                <div id="list-${orgId}" class="event-list hidden">
                    <div id="items-${orgId}">Cargando eventos...</div>
                </div>
            `;
            container.appendChild(card);
            
            events.forEach(id => {
                get(ref(db, 'eventos/' + id)).then(s => {
                    const d = s.val();
                    if(!d) return;
                    const link = document.createElement('div');
                    link.className = 'event-item';
                    link.innerHTML = `<span>${d.organiza || id}</span><a href="v.html?id=${id}" target="_blank">EDITAR ⚙️</a>`;
                    const listDiv = document.getElementById('items-' + orgId);
                    if(listDiv.innerHTML.includes("Cargando")) listDiv.innerHTML = "";
                    listDiv.appendChild(link);
                });
            });
        });
    });

    // 2. Funciones del Modal Corregidas
    window.abrirModal = () => {
        document.getElementById('modal-nuevo').classList.add('active');
    };

    window.cerrarModal = () => {
        document.getElementById('modal-nuevo').classList.remove('active');
        // Limpiar inputs al cerrar
        document.getElementById('new-org-id').value = "";
        document.getElementById('new-event-name').value = "";
        document.getElementById('new-organizador').value = "";
    };

    window.crearOrganizador = async () => {
        const orgId = document.getElementById('new-org-id').value.trim().toLowerCase().replace(/\s+/g, '-');
        const eventName = document.getElementById('new-event-name').value.trim();
        const organizador = document.getElementById('new-organizador').value.trim();
        
        if(!orgId || !eventName || !organizador) return alert("Completá todos los campos");

        const eventId = `${orgId}-principal`;
        const nuevoEvento = {
            organiza: eventName,
            organizador: organizador,
            lugar: "A confirmar",
            fecha: "2026-01-01",
            hora: "20:00", horaFin: "22:00",
            valor: 0, alias: "tu.alias", celuOrganizador: "11",
            categorias: "A definir", password: "1234", inscriptos: []
        };

        try {
            await set(ref(db, 'eventos/' + eventId), nuevoEvento);
            await set(ref(db, 'hubs/' + orgId), [eventId]);
            alert("¡Organizador creado!");
            cerrarModal();
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    window.toggleEvents = (id) => {
        document.getElementById('list-' + id).classList.toggle('hidden');
    };
</script>
</body>
</html>
