<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub Pro - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ff9500; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* LOGIN VIEW */
        #view-login { display: flex; height: 100vh; align-items: center; justify-content: center; background: #000; padding: 20px; }
        .login-card { background: white; padding: 40px; border-radius: 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow); }
        
        /* PANEL VIEW */
        header { background: #000; color: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        /* STATS */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 28px; text-align: center; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02); }
        .stat-card h4 { margin: 0; font-size: 11px; text-transform: uppercase; color: var(--sub); letter-spacing: 1.5px; font-weight: 800; }
        .stat-card p { font-size: 36px; font-weight: 900; margin: 10px 0 0; color: var(--primary); letter-spacing: -1px; }

        /* ALTA FORM */
        .card-new { background: white; padding: 30px; border-radius: 30px; box-shadow: var(--shadow); margin-bottom: 40px; border: 2.5px solid var(--primary); }
        .card-new h3 { margin: 0 0 20px 0; font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
        
        /* LISTA ACORDEON */
        .accordion-item { background: white; border-radius: 22px; margin-bottom: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); overflow: hidden; border: 1px solid #eee; }
        .accordion-header { padding: 22px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .accordion-header:hover { background: #f9f9f9; }
        .accordion-content { padding: 25px; display: none; border-top: 1px solid #f2f2f7; background: #fafafa; }
        .accordion-item.active .accordion-content { display: block; }
        
        .tag-status { font-size: 9px; padding: 5px 12px; border-radius: 10px; font-weight: 800; text-transform: uppercase; margin-left: 10px; }
        
        /* INPUTS Y BOTONES */
        .input-std { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid #e5e5e7; font-size: 15px; outline: none; margin-bottom: 12px; font-family: inherit; transition: 0.3s; }
        .input-std:focus { border-color: var(--primary); background: #fcfcff; }
        
        .btn-blue { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-manage { background: #eee; color: var(--text); border: none; padding: 12px 20px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; text-decoration: none; text-align: center; }

        /* MODAL */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 480px; padding: 35px; border-radius: 35px; box-shadow: var(--shadow); position: relative; }
        .hidden { display: none !important; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 15px 0 6px 6px; letter-spacing: 1px; }

        .footer-brand { margin-top: 60px; text-align: center; padding: 40px 20px; border-top: 1px solid #ddd; }
        .btn-footer-wa { background: #FF9500; color: white; text-decoration: none; padding: 14px 30px; border-radius: 15px; font-size: 12px; font-weight: 800; display: inline-block; box-shadow: 0 5px 20px rgba(255,149,0,0.3); }
    </style>
</head>
<body>

<div id="view-login">
    <div class="login-card">
        <h1 style="font-weight:900; letter-spacing:-2px; font-size:32px; margin-bottom:10px">Master Hub</h1>
        <p style="color:var(--sub); margin-bottom:30px; font-size:14px">Acceso exclusivo administración</p>
        <input type="email" id="log-email" class="input-std" placeholder="Email Admin">
        <input type="password" id="log-pass" class="input-std" placeholder="Contraseña">
        <button class="btn-blue" onclick="handleLogin()">INGRESAR AL SISTEMA</button>
    </div>
</div>

<div id="view-panel" class="hidden">
    <header>
        <h2 style="font-weight:900; letter-spacing:-1px; margin:0">PadelApp Master</h2>
        <button onclick="handleLogout()" style="background:rgba(255,255,255,0.15); color:white; border:none; padding:8px 15px; border-radius:10px; font-weight:800; cursor:pointer">SALIR</button>
    </header>

    <div class="container">
        <div class="grid-stats">
            <div class="stat-card"><h4>Clubes Activos</h4><p id="total-hubs">0</p></div>
            <div class="stat-card"><h4>Deuda Pendiente</h4><p id="total-fees">$0</p></div>
        </div>

        <div class="card-new">
            <h3 style="margin:0 0 20px 0">🚀 Alta de Organizador</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px">
                <input id="new-id" class="input-std" placeholder="ID (ej: club-sur)">
                <input id="new-name" class="input-std" placeholder="Nombre Comercial">
            </div>
            <button class="btn-blue" onclick="crearHub()">REGISTRAR Y ACTIVAR DASHBOARD</button>
        </div>

        <div id="org-list"></div>

        <div class="footer-brand">
            <p style="font-size:10px; font-weight:800; color:var(--sub); letter-spacing:1.5px; margin-bottom:20px">DESARROLLADO POR MARIANO BLUMENFELD</p>
            <a href="https://wa.me/5491166463800" class="btn-footer-wa">🚀 ¡QUIERO ORGANIZAR MI CANCHA!</a>
        </div>
    </div>
</div>

<div id="modal-finance" class="modal hidden">
    <div class="modal-content">
        <h2 style="margin-top:0; letter-spacing:-1px; font-size:24px">Gestión Financiera</h2>
        <input type="hidden" id="modal-org-id">
        
        <label>Deuda Acumulada ($)</label>
        <input id="mod-deuda" class="input-std" type="number" step="100">
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
            <div><label>Vence Plan</label><input id="mod-ciclo" class="input-std" type="date"></div>
            <div><label>🎁 Sumar Trial (Días)</label><input id="mod-trial" class="input-std" type="number" placeholder="Ej: 7"></div>
        </div>

        <div style="background:#fff2f2; padding:20px; border-radius:20px; margin:20px 0; display:flex; justify-content:space-between; align-items:center; border:1px solid #ffdbdb">
            <div>
                <b style="color:var(--danger); font-size:14px">SUSPENDER CLIENTE</b>
                <p style="margin:4px 0 0 0; font-size:10px; color:var(--sub); font-weight:600">Bloquea el uso del Dashboard.</p>
            </div>
            <input type="checkbox" id="mod-suspendido" style="transform:scale(1.8)">
        </div>

        <button class="btn-blue" onclick="guardarFinanzas()">GUARDAR CAMBIOS</button>
        <button class="btn-blue" onclick="archivarHub()" style="background:#000; margin-top:12px">ELIMINAR DEFINITIVAMENTE</button>
        <button class="btn-blue" onclick="cerrarModal()" style="background:#eee; color:#333; margin-top:12px">CANCELAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI", authDomain: "padelapp-e72af.firebaseapp.com", databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com", projectId: "padelapp-e72af", storageBucket: "padelapp-e72af.appspot.com", messagingSenderId: "806914592971", appId: "1:806914592971:web:84720063fc36a882b40b4e" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app); const auth = getAuth(app);

    // AUTH
    window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('log-email').value, document.getElementById('log-pass').value).catch(e => alert("Acceso denegado: " + e.message));
    window.handleLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, user => {
        if(user) {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-panel').classList.remove('hidden');
            initDash();
        }
    });

    // DASHBOARD LOGIC
    function initDash() {
        onValue(ref(db, 'hubs'), async snap => {
            const hubs = snap.val() || {};
            const list = document.getElementById('org-list'); list.innerHTML = "";
            let totalD = 0; let count = 0;

            for(let id in hubs) {
                try {
                    const fSnap = await get(ref(db, `facturacion/${id}/cuenta`));
                    const f = fSnap.val() || { consumoActual: 0 };
                    totalD += (f.consumoActual || 0);
                    count++;

                    const isTrial = f.fechaFinPrueba && new Date(f.fechaFinPrueba + "T23:59:59") > new Date();
                    const isSuspended = f.cuentaSuspendida || false;

                    const item = document.createElement('div'); 
                    item.className = "accordion-item";
                    item.innerHTML = `
                        <div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">
                            <div>
                                <b style="text-transform:uppercase; font-size:15px">${hubs[id].nombre || id}</b>
                                <span class="tag-status" style="background:${isSuspended?'#ff3b30':(isTrial?'#fff9e6':'#eafaf1')}; color:${isSuspended?'#fff':(isTrial?'#ff9500':'#34c759')}">
                                    ${isSuspended?'Suspendido':(isTrial?'Prueba':'Activo')}
                                </span>
                                <div style="font-size:11px; color:var(--sub); margin-top:6px; font-weight:600">
                                    Deuda: $${(f.consumoActual||0).toLocaleString()} | Vence: ${f.fechaFinCiclo || '-'}
                                </div>
                            </div>
                            <div><span style="font-size:20px; color:#ccc">▾</span></div>
                        </div>
                        <div class="accordion-content">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
                                <button class="btn-manage" onclick="abrirFinanzas('${id}')">⚙️ FINANZAS</button>
                                <a href="d.html?org=${id}" target="_blank" class="btn-manage" style="line-height:30px; background:var(--primary); color:white">DASHBOARD CLIENTE</a>
                            </div>
                            <div style="margin-top:20px; font-size:10px; color:#aaa; background:#eee; padding:12px; border-radius:12px; word-break:break-all">
                                <b>🔗 URL CARTELERA:</b> ${window.location.origin}/canchaabierta/v.html?org=${id}
                            </div>
                        </div>`;
                    list.appendChild(item);
                } catch(e) { console.error("Error al cargar datos del club: " + id); }
            }
            document.getElementById('total-hubs').innerText = count;
            document.getElementById('total-fees').innerText = "$" + totalD.toLocaleString();
        });
    }

    // ACTIONS
    window.crearHub = async () => {
        const id = document.getElementById('new-id').value.trim();
        const nom = document.getElementById('new-name').value.trim();
        if(!id || !nom) return alert("Completa el ID y el Nombre");
        
        await set(ref(db, 'hubs/'+id), { nombre: nom, canchas: [] });
        await set(ref(db, `facturacion/${id}/cuenta`), { 
            consumoActual: 0, 
            nombreOrg: nom, 
            fechaFinCiclo: new Date().toISOString().split('T')[0],
            cuentaSuspendida: false
        });
        
        alert("¡Organizador creado con éxito!");
        document.getElementById('new-id').value = ""; document.getElementById('new-name').value = "";
    };

    window.abrirFinanzas = async id => {
        const s = await get(ref(db, `facturacion/${id}/cuenta`)); 
        const f = s.val() || {};
        document.getElementById('modal-org-id').value = id;
        document.getElementById('mod-deuda').value = f.consumoActual || 0;
        document.getElementById('mod-ciclo').value = f.fechaFinCiclo || "";
        document.getElementById('mod-suspendido').checked = f.cuentaSuspendida || false;
        document.getElementById('mod-trial').value = "";
        document.getElementById('modal-finance').classList.remove('hidden');
    };

    window.guardarFinanzas = async () => {
        const id = document.getElementById('modal-org-id').value;
        const trialDays = parseInt(document.getElementById('mod-trial').value);
        let upd = { 
            consumoActual: parseInt(document.getElementById('mod-deuda').value), 
            fechaFinCiclo: document.getElementById('mod-ciclo').value, 
            cuentaSuspendida: document.getElementById('mod-suspendido').checked 
        };
        if(trialDays > 0) {
            let fp = new Date(); fp.setDate(fp.getDate() + trialDays);
            upd.fechaFinPrueba = fp.toISOString().split('T')[0];
        }
        await update(ref(db, `facturacion/${id}/cuenta`), upd);
        alert("¡Datos financieros actualizados!"); 
        cerrarModal();
    };

    window.archivarHub = async () => {
        const id = document.getElementById('modal-org-id').value;
        if(confirm("¿Eliminar este club? Se borrarán todos los datos activos y finanzas.")){
            const snap = await get(ref(db, 'hubs/'+id));
            await set(ref(db, 'archivo_hubs/'+id), snap.val());
            await set(ref(db, 'hubs/'+id), null);
            await set(ref(db, 'facturacion/'+id), null);
            alert("Club eliminado."); 
            cerrarModal();
        }
    };

    window.cerrarModal = () => document.getElementById('modal-finance').classList.add('hidden');
</script>
</body>
</html>
