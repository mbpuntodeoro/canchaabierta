<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const params = new URLSearchParams(window.location.search);
    const orgId = params.get('org');
    let currentId = params.get('id') || 'cancha-egd';
    let ev = {};

    function limpiarHora(h) { return h ? h.replace(':00', '') : ''; }

    function formatearFecha(fechaStr) {
        if (!fechaStr) return '-';
        const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const [year, month, day] = fechaStr.split('-');
        const date = new Date(year, month - 1, day);
        return `${dias[date.getDay()]} ${parseInt(day)}/${parseInt(month)}`;
    }

    if (orgId && !params.get('id')) {
        document.getElementById('view-hub').classList.remove('hidden');
        onValue(ref(db, 'hubs/' + orgId), (snap) => {
            const orgData = snap.val() || {};
            // Mostramos el Nombre Real en el Hub
            document.getElementById('hub-org-name').innerText = (orgData.nombre || orgId).toUpperCase();
            
            const list = orgData.canchas || [];
            const hubList = document.getElementById('hub-list');
            hubList.innerHTML = "";
            list.forEach(id => {
                get(ref(db, 'eventos/' + id)).then(s => {
                    const d = s.val();
                    if(d && !d.suspendido) {
                        const item = document.createElement('a');
                        item.className = 'hub-item';
                        item.href = `?id=${id}&org=${orgId}`;
                        item.innerHTML = `
                            <b>${d.organiza || 'Evento'}</b>
                            <div><span class="tag-cat">${d.categorias || 'Todas'}</span></div>
                            <span style="font-size:12px; color:#8e8e93;">${formatearFecha(d.fecha)} de ${limpiarHora(d.hora)} a ${limpiarHora(d.horaFin)} hs</span>
                        `;
                        hubList.appendChild(item);
                    }
                });
            });
        });
    } else {
        document.getElementById('view-event').classList.remove('hidden');
        onValue(ref(db, 'eventos/' + currentId), (snap) => {
            ev = snap.val() || {};
            render();
        });
    }

    window.inscribirse = () => {
        const n = document.getElementById('in-nom').value.trim();
        const c = document.getElementById('in-cel').value.trim();
        if(!n || !c) return alert("Faltan datos");
        if(!ev.inscriptos) ev.inscriptos = [];
        ev.inscriptos.push({ id: Date.now(), nombre: n, celular: c, estado: 'pendiente' });
        set(ref(db, 'eventos/'+currentId+'/inscriptos'), ev.inscriptos).then(() => {
            document.getElementById('view-event').classList.add('hidden');
            document.getElementById('view-success').classList.remove('hidden');
        });
    };

    window.abrirAdmin = () => {
        const p = prompt("Clave:");
        if (p === (ev.password || "1234")) {
            document.getElementById('view-event').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
            document.getElementById('ed-org-name').value = ev.organiza || "";
            document.getElementById('ed-organizador').value = ev.organizador || "";
            document.getElementById('ed-lugar').value = ev.lugar || "";
            document.getElementById('ed-hor').value = ev.hora || "";
            document.getElementById('ed-hor-fin').value = ev.horaFin || "";
            document.getElementById('ed-valor').value = ev.valor || 0;
            document.getElementById('ed-alias').value = ev.alias || "";
            document.getElementById('ed-celu').value = ev.celuOrganizador || "";
            document.getElementById('ed-cat').value = ev.categorias || "";
            document.getElementById('ed-fec').value = ev.fecha || "";
            document.getElementById('ed-cupo').value = ev.cupo || 0;
        } else { alert("Clave incorrecta"); }
    };

    window.guardar = () => {
        update(ref(db, 'eventos/'+currentId), {
            organiza: document.getElementById('ed-org-name').value,
            organizador: document.getElementById('ed-organizador').value,
            lugar: document.getElementById('ed-lugar').value,
            hora: document.getElementById('ed-hor').value,
            horaFin: document.getElementById('ed-hor-fin').value,
            valor: parseInt(document.getElementById('ed-valor').value),
            alias: document.getElementById('ed-alias').value,
            celuOrganizador: document.getElementById('ed-celu').value,
            categorias: document.getElementById('ed-cat').value,
            fecha: document.getElementById('ed-fec').value,
            cupo: parseInt(document.getElementById('ed-cupo').value)
        }).then(() => alert("¡Guardado!"));
    };

    window.copiarAlias = () => { if(ev.alias) navigator.clipboard.writeText(ev.alias).then(() => alert("Alias copiado!")); };
    window.enviarWhatsapp = () => {
        const msg = encodeURIComponent(`Hola! Soy ${document.getElementById('in-nom').value}, te paso el comprobante para la cancha del ${formatearFecha(ev.fecha)}`);
        window.open(`https://wa.me/${ev.celuOrganizador}?text=${msg}`);
    };
    window.cambiar = (oid) => {
        const idx = ev.inscriptos.findIndex(x => x.id === oid);
        const estados = ["pendiente", "reservado", "pagado"];
        ev.inscriptos[idx].estado = estados[(estados.indexOf(ev.inscriptos[idx].estado) + 1) % 3];
        set(ref(db, 'eventos/'+currentId+'/inscriptos'), ev.inscriptos);
    };

    function render() {
        document.getElementById('txt-event-name').innerText = (ev.organiza || "CARGANDO...").toUpperCase();
        document.getElementById('txt-organizador').innerText = ev.organizador || "A confirmar";
        document.getElementById('txt-cat').innerText = ev.categorias || "TODAS LAS CATEGORÍAS";
        document.getElementById('txt-fecha').innerText = formatearFecha(ev.fecha);
        document.getElementById('txt-hora').innerText = `DE ${ev.hora || '--'} A ${ev.horaFin || '--'} HS`;
        document.getElementById('txt-lugar').innerText = ev.lugar || '-';
        document.getElementById('txt-valor').innerText = "$" + (ev.valor || 0).toLocaleString('es-AR');
        document.getElementById('ex-monto').innerText = "$" + (ev.valor || 0).toLocaleString('es-AR');
        document.getElementById('ex-alias').innerText = ev.alias || '-';
        let html = "";
        (ev.inscriptos || []).forEach(p => {
            html += `<div class="admin-item"><span><b>${p.nombre}</b></span><button class="estado-btn ${p.estado}" onclick="cambiar(${p.id})">${p.estado}</button></div>`;
        });
        document.getElementById('lista-admin').innerHTML = html || "<p style='color:#ccc; font-size:12px;'>Sin inscriptos</p>";
    }
</script>
