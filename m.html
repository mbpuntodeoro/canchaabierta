<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub Pro - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --danger: #ff3b30; --success: #34c759; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: #000; color: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .card-new { background: white; padding: 30px; border-radius: 28px; box-shadow: var(--shadow); margin-bottom: 40px; border: 2.5px solid var(--primary); }
        .accordion-item { background: white; border-radius: 20px; margin-bottom: 12px; overflow: hidden; border: 1px solid #eee; }
        .accordion-header { padding: 22px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { padding: 25px; display: none; border-top: 1px solid #f2f2f7; background: #fafafa; }
        .accordion-item.active .accordion-content { display: block; }
        .input-std { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #e5e5e7; font-size: 15px; outline: none; margin-bottom: 10px; font-family: inherit; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-manage { background: #eee; color: var(--text); border: none; padding: 12px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; text-decoration: none; text-align: center; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 35px; border-radius: 35px; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none !important; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 12px 0 4px 6px; }
    </style>
</head>
<body>
    <header><h2 style="font-weight:900; letter-spacing:-1px">PadelApp Master</h2><button onclick="location.reload()" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:10px; cursor:pointer">SALIR</button></header>
    <div class="container">
        <div class="card-new">
            <h3 style="margin:0 0 20px 0">🚀 Alta de Organizador</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <input id="new-id" class="input-std" placeholder="ID (ej: adictos-sur)">
                <input id="new-name" class="input-std" placeholder="Nombre Fantasía">
            </div>
            <button class="btn-blue" onclick="crearHub()">REGISTRAR Y ACTIVAR</button>
        </div>
        <div id="org-list">Cargando clubes activos...</div>
    </div>

    <div id="modal-finance" class="modal hidden">
        <div class="modal-content">
            <h2 style="margin-top:0">Perfil y Finanzas</h2>
            <input type="hidden" id="modal-org-id">
            <label>Nombre Comercial</label><input id="mod-nombre-com" class="input-std">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Contacto</label><input id="mod-contacto" class="input-std"></div>
                <div><label>WhatsApp</label><input id="mod-celu" class="input-std"></div>
            </div>
            <label>Alias URL Acortada</label><input id="mod-url" class="input-std" placeholder="ej: adictos">
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>Deuda Actual ($)</label><input id="mod-deuda" class="input-std" type="number"></div>
                <div><label>Límite Crédito ($)</label><input id="mod-limite" class="input-std" type="number"></div>
            </div>
            <label>Vencimiento Plan</label><input id="mod-ciclo" class="input-std" type="date">
            <div style="background:#fff2f2; padding:15px; border-radius:18px; margin:15px 0; display:flex; justify-content:space-between; align-items:center; border:1px solid #ffdbdb">
                <b style="color:var(--danger); font-size:12px">SUSPENDER ACCESO</b>
                <input type="checkbox" id="mod-suspendido" style="transform:scale(1.6)">
            </div>
            <button class="btn-blue" onclick="guardarTodo()">GUARDAR CAMBIOS</button>
            <button class="btn-blue" onclick="archivarHub()" style="background:#000; margin-top:10px">BORRAR TOTAL</button>
            <button class="btn-blue" onclick="cerrarModal()" style="background:#eee; color:#333; margin-top:10px">CANCELAR</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI", authDomain: "padelapp-e72af.firebaseapp.com", databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com", projectId: "padelapp-e72af", storageBucket: "padelapp-e72af.appspot.com", messagingSenderId: "806914592971", appId: "1:806914592971:web:84720063fc36a882b40b4e" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);

    onValue(ref(db, 'hubs'), async snap => {
        const hubs = snap.val() || {}; const list = document.getElementById('org-list'); list.innerHTML = "";
        for(let id in hubs) {
            const fSnap = await get(ref(db, `facturacion/${id}/cuenta`)); const f = fSnap.val() || {};
            const item = document.createElement('div'); item.className = "accordion-item";
            item.innerHTML = `<div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">
                <div><b>${f.nombreOrg || id}</b><div style="font-size:11px;color:var(--sub)">Deuda: $${(f.consumoActual||0).toLocaleString()} | Lim: $${(f.limiteCredito||0).toLocaleString()}</div></div>
                <div>▾</div></div><div class="accordion-content">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                    <button class="btn-manage" onclick="abrirEditor('${id}')">⚙️ EDITAR PERFIL</button>
                    <a href="d.html?org=${id}" target="_blank" class="btn-manage" style="line-height:26px">ABRIR PANEL</a>
                </div></div>`;
            list.appendChild(item);
        }
    });

    window.crearHub = async () => {
        const id = document.getElementById('new-id').value.trim(); const nom = document.getElementById('new-name').value.trim();
        if(!id || !nom) return alert("Faltan datos");
        await set(ref(db, 'hubs/'+id), { nombre: nom, canchas: [] });
        await set(ref(db, `facturacion/${id}/cuenta`), { nombreOrg: nom, consumoActual: 0, limiteCredito: 50000, urlAcortada: id });
        alert("¡Creado!"); location.reload();
    };

    window.abrirEditor = async id => {
        const s = await get(ref(db, `facturacion/${id}/cuenta`)); const f = s.val() || {};
        document.getElementById('modal-org-id').value = id;
        document.getElementById('mod-nombre-com').value = f.nombreOrg || "";
        document.getElementById('mod-contacto').value = f.nombreContacto || "";
        document.getElementById('mod-celu').value = f.celularContacto || "";
        document.getElementById('mod-url').value = f.urlAcortada || id;
        document.getElementById('mod-deuda').value = f.consumoActual || 0;
        document.getElementById('mod-limite').value = f.limiteCredito || 0;
        document.getElementById('mod-ciclo').value = f.fechaFinCiclo || "";
        document.getElementById('mod-suspendido').checked = f.cuentaSuspendida || false;
        document.getElementById('modal-finance').classList.remove('hidden');
    };

    window.guardarTodo = async () => {
        const id = document.getElementById('modal-org-id').value;
        const upd = {
            nombreOrg: document.getElementById('mod-nombre-com').value,
            nombreContacto: document.getElementById('mod-contacto').value,
            celularContacto: document.getElementById('mod-celu').value,
            urlAcortada: document.getElementById('mod-url').value,
            consumoActual: parseInt(document.getElementById('mod-deuda').value),
            limiteCredito: parseInt(document.getElementById('mod-limite').value),
            fechaFinCiclo: document.getElementById('mod-ciclo').value,
            cuentaSuspendida: document.getElementById('mod-suspendido').checked
        };
        await update(ref(db, `facturacion/${id}/cuenta`), upd);
        alert("Guardado"); cerrarModal();
    };

    window.archivarHub = async () => {
        const id = document.getElementById('modal-org-id').value;
        if(confirm("¿Eliminar?")){
            await set(ref(db, 'hubs/'+id), null); await set(ref(db, 'facturacion/'+id), null);
            alert("Eliminado"); location.reload();
        }
    };
    window.cerrarModal = () => document.getElementById('modal-finance').classList.add('hidden');
</script>
</body>
</html>
