<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub Pro - SGCA</title>
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --shadow: 0 10px 30px rgba(0,0,0,0.06); --success: #34c759; --warning: #ffcc00; --danger: #ff3b30; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; }
        
        /* ACORDEON STYLES */
        .accordion-item { background: white; border-radius: 20px; margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; border: 1.5px solid #f2f2f7; }
        .accordion-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .accordion-header:hover { background: #fafafa; }
        .accordion-content { padding: 0 20px 20px 20px; display: none; border-top: 1px solid #f2f2f7; background: #fff; }
        .accordion-item.active .accordion-content { display: block; }
        .accordion-item.active .accordion-header { background: #f8f9fb; }

        .tag-status { font-size: 9px; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; }
        .tag-suspended { background: var(--danger); color: white; }
        .tag-ok { background: var(--success); color: white; }

        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 15px 0 6px 6px; }
        .input-std { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e5e5e7; font-size: 14px; outline: none; }
        
        .btn-blue { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-manage { background: #eef6ff; color: var(--primary); border: none; padding: 8px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }
        
        .cancha-row { display: grid; grid-template-columns: 1fr 1.5fr auto; gap: 10px; align-items: center; background: #f8f9fb; padding: 10px; border-radius: 12px; margin-bottom: 8px; }
        .cancha-row span { font-size: 11px; font-weight: 700; color: var(--sub); overflow: hidden; text-overflow: ellipsis; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="container">
    <div id="view-login">
        <div style="background:white; padding:30px; border-radius:24px; max-width:400px; margin:100px auto; text-align:center; box-shadow:var(--shadow);">
            <h1>Master Admin</h1>
            <input type="password" id="master-pass" class="input-std" placeholder="Clave Maestra" style="text-align:center; margin-bottom:15px;">
            <button class="btn-blue" onclick="login()">Entrar</button>
        </div>
    </div>

    <div id="view-panel" class="hidden">
        <div class="header"><h1>Centro de Mandos Pro</h1></div>
        
        <div id="org-list"></div>

        <div style="margin-top:40px; text-align:center;">
            <button class="btn-manage" style="background:var(--text); color:white; padding:15px 30px;" onclick="nuevoOrgPrompt()">+ AGREGAR NUEVO ORGANIZADOR</button>
        </div>
    </div>

    <div id="modal-finance" class="modal hidden">
        <div style="background:white; padding:25px; border-radius:24px; width:90%; max-width:450px;">
            <h2 id="modal-title" style="margin-top:0;">Configuración</h2>
            <input type="hidden" id="modal-org-id">
            
            <div style="background: #fff2f2; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1.5px solid #ffdbdb; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <b style="color:var(--danger); font-size:14px;">SUSPENDER CLIENTE</b>
                    <p style="margin:0; font-size:11px; color:#a35e5e;">Bloquea gestión e inscripciones.</p>
                </div>
                <input type="checkbox" id="mod-suspendido" style="transform: scale(1.5);">
            </div>

            <label>Deuda Actual ($)</label>
            <input id="mod-consumo" class="input-std" type="number">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Abono ($)</label><input id="mod-abono" class="input-std" type="number"></div>
                <div><label>Cancha ($)</label><input id="mod-cancha" class="input-std" type="number"></div>
            </div>

            <label>Vencimiento de Abono</label>
            <input id="mod-ciclo" class="input-std" type="date">

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="btn-blue" onclick="guardarFinanzas()">Guardar</button>
                <button class="btn-blue" style="background:#f2f2f7; color:var(--text);" onclick="cerrarModal()">Cancelar</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.login = () => {
        if(document.getElementById('master-pass').value === "MB2026") {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-panel').classList.remove('hidden');
            cargarLista();
        }
    };

    function cargarLista() {
        onValue(ref(db, 'hubs'), async (snap) => {
            const hubs = snap.val() || {};
            const list = document.getElementById('org-list'); list.innerHTML = "";
            for (let id in hubs) {
                const fSnap = await get(ref(db, 'facturacion/' + id + '/cuenta'));
                const f = fSnap.val() || { consumoActual: 0, cuentaSuspendida: false };
                
                const item = document.createElement('div');
                item.className = "accordion-item";
                
                let canchasHtml = "";
                const cIds = hubs[id].canchas || [];
                for(let cid of cIds) {
                    const cSnap = await get(ref(db, 'eventos/' + cid));
                    const urlC = cSnap.val()?.urlCorta || "";
                    canchasHtml += `
                        <div class="cancha-row">
                            <span>ID: ${cid}</span>
                            <input class="input-std" style="padding:6px; font-size:11px;" placeholder="URL Corta (Bitly)" id="url-${cid}" value="${urlC}" onchange="guardarUrlCorta('${cid}', this.value)">
                            <a href="v.html?id=${cid}&org=${id}" target="_blank" style="font-size:11px; font-weight:800; color:var(--primary); text-decoration:none;">IR ➔</a>
                        </div>`;
                }

                item.innerHTML = `
                    <div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">
                        <div>
                            <b style="text-transform:uppercase;">${hubs[id].nombre || id}</b>
                            ${f.cuentaSuspendida ? '<span class="tag-status tag-suspended">Suspendido</span>' : '<span class="tag-status tag-ok">Activo</span>'}
                            <div style="font-size:11px; color:var(--sub); font-weight:700; margin-top:4px;">Deuda: $${f.consumoActual.toLocaleString()} | Vence: ${f.fechaFinCiclo || '-'}</div>
                        </div>
                        <div style="font-size:20px; color:var(--sub);">▾</div>
                    </div>
                    <div class="accordion-content">
                        <div style="display:flex; gap:10px; margin:15px 0;">
                            <button class="btn-manage" onclick="abrirFinanzas('${id}')">⚙️ GESTIÓN FINANCIERA</button>
                            <a href="v.html?org=${id}" target="_blank" class="btn-manage" style="text-decoration:none; background:#f2f2f7; color:var(--text);">VER CARTELERA</a>
                            <a href="d.html?org=${id}" target="_blank" class="btn-manage" style="text-decoration:none; background:#f2f2f7; color:var(--text);">DASHBOARD</a>
                        </div>
                        <label>Canchas vinculadas y URLs cortas:</label>
                        ${canchasHtml || '<p style="font-size:11px; color:#ccc;">Sin canchas vinculadas.</p>'}
                    </div>
                `;
                list.appendChild(item);
            }
        });
    }

    window.guardarUrlCorta = (cid, val) => {
        update(ref(db, 'eventos/' + cid), { urlCorta: val });
    };

    window.abrirFinanzas = async (id) => {
        const s = await get(ref(db, 'facturacion/' + id + '/cuenta'));
        const f = s.val() || { consumoActual: 0, costoAbono: 25000, costoCancha: 7000, cuentaSuspendida: false };
        document.getElementById('modal-org-id').value = id;
        document.getElementById('modal-title').innerText = "Finanzas: " + id;
        document.getElementById('mod-consumo').value = f.consumoActual;
        document.getElementById('mod-abono').value = f.costoAbono || 25000;
        document.getElementById('mod-cancha').value = f.costoCancha || 7000;
        document.getElementById('mod-ciclo').value = f.fechaFinCiclo || "";
        document.getElementById('mod-suspendido').checked = f.cuentaSuspendida || false;
        document.getElementById('modal-finance').classList.remove('hidden');
    };

    window.guardarFinanzas = async () => {
        const id = document.getElementById('modal-org-id').value;
        const updates = {
            consumoActual: parseInt(document.getElementById('mod-consumo').value),
            costoAbono: parseInt(document.getElementById('mod-abono').value),
            costoCancha: parseInt(document.getElementById('mod-cancha').value),
            fechaFinCiclo: document.getElementById('mod-ciclo').value,
            cuentaSuspendida: document.getElementById('mod-suspendido').checked
        };
        await update(ref(db, 'facturacion/' + id + '/cuenta'), updates);
        alert("Configuración Guardada"); cerrarModal();
    };

    window.nuevoOrgPrompt = async () => {
        const id = prompt("ID del Hub (ej: adictos-padel):"); if(!id) return;
        const nom = prompt("Nombre Comercial (ej: Adictos Padel):"); if(!nom) return;
        await set(ref(db, 'hubs/' + id), { nombre: nom, canchas: [] });
        alert("Creado.");
    };

    window.cerrarModal = () => document.getElementById('modal-finance').classList.add('hidden');
</script>
</body>
</html>
