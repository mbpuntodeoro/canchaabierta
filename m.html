<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub Pro - SGCA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f8f9fb; --text: #1d1d1f; --sub: #86868b; --success: #34c759; --warning: #ffcc00; --danger: #ff3b30; --shadow: 0 10px 30px rgba(0,0,0,0.06); }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 850px; margin: auto; padding: 20px; }
        #view-login { display: flex; height: 100vh; align-items: center; justify-content: center; background: #000; }
        .login-card { background: white; padding: 40px; border-radius: 28px; width: 350px; text-align: center; }
        header { background: #000; color: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 24px; text-align: center; box-shadow: var(--shadow); }
        .stat-card p { font-size: 32px; font-weight: 800; margin: 10px 0 0; color: var(--primary); }
        .card-new { background: white; padding: 30px; border-radius: 28px; box-shadow: var(--shadow); margin-bottom: 40px; border: 2px solid var(--primary); }
        .accordion-item { background: white; border-radius: 20px; margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
        .accordion-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-content { padding: 0 20px 20px 20px; display: none; border-top: 1px solid #f2f2f7; }
        .accordion-item.active .accordion-content { display: block; }
        .input-std { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid #e5e5e7; font-size: 15px; outline: none; margin-bottom: 10px; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-manage { background: #f2f2f7; color: var(--text); border: none; padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; text-decoration: none; }
        .tag-status { font-size: 9px; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; margin-left: 10px; }
        .tag-suspended { background: var(--danger); color: white; }
        .tag-trial { background: var(--warning); color: black; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 95%; max-width: 450px; padding: 30px; border-radius: 32px; max-height: 90vh; overflow-y: auto; }
        .footer-brand { margin-top: 50px; text-align: center; padding: 30px 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        .footer-brand p { font-size: 10px; font-weight: 800; color: var(--sub); letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .btn-footer-wa { background: #FF9500; color: white; text-decoration: none; padding: 12px 25px; border-radius: 12px; font-size: 11px; font-weight: 800; display: inline-block; box-shadow: 0 4px 15px rgba(255,149,0,0.2); }
        .hidden { display: none !important; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 15px 0 6px 6px; }
    </style>
</head>
<body>
<div id="view-login">
    <div class="login-card">
        <h1>Master Hub</h1>
        <input type="email" id="log-email" class="input-std" placeholder="Email Admin">
        <input type="password" id="log-pass" class="input-std" placeholder="Contraseña">
        <button class="btn-blue" onclick="handleLogin()">ENTRAR</button>
    </div>
</div>
<div id="view-panel" class="hidden">
    <header><h2>PadelApp Master</h2><button class="btn-manage" onclick="handleLogout()" style="background:#333;color:white">SALIR</button></header>
    <div class="container">
        <div class="grid-stats">
            <div class="stat-card"><h4>Hubs Activos</h4><p id="total-hubs">0</p></div>
            <div class="stat-card"><h4>Por Cobrar Total</h4><p id="total-fees">$0</p></div>
        </div>
        <div class="card-new">
            <h3>🚀 Alta de Organizador</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <input id="new-id" class="input-std" placeholder="ID (ej: club-sur)">
                <input id="new-name" class="input-std" placeholder="Nombre Comercial">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <input id="new-email" class="input-std" placeholder="Email del Cliente">
                <input id="new-pass" type="password" class="input-std" placeholder="Clave (mín 6)">
            </div>
            <button id="btn-crear" class="btn-blue" onclick="altaAutomatizada()">CREAR CUENTA Y ACTIVAR ROBOT</button>
        </div>
        <div id="org-list"></div>
        <div class="footer-brand"><p>DESARROLLADO POR MARIANO BLUMENFELD</p><a href="https://wa.me/5491166463800" class="btn-footer-wa">🚀 ¡QUIERO ORGANIZAR MI CANCHA!</a></div>
    </div>
</div>

<div id="modal-finance" class="modal hidden">
    <div class="modal-content">
        <h2 id="modal-title">Configuración</h2>
        <input type="hidden" id="modal-org-id">
        <div style="background:#fff2f2;padding:15px;border-radius:18px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;border:1.5px solid #ffdbdb">
            <div><b style="color:var(--danger)">SUSPENDER CLIENTE</b><p style="margin:0;font-size:11px">Bloquea el acceso al sistema.</p></div>
            <input type="checkbox" id="mod-suspendido" style="transform:scale(1.6)">
        </div>
        <div style="background:#f4f4f7;padding:20px;border-radius:20px;text-align:center;margin-bottom:20px">
            <label>Deuda Acumulada</label><h3 id="txt-deuda-modal" style="font-size:36px;margin:10px 0">$0</h3>
            <button class="btn-blue" style="background:var(--success)" onclick="confirmarPago()">✅ MARCAR COMO PAGADO</button>
        </div>
        <div style="background:#fff9e6;padding:15px;border-radius:18px;margin-bottom:20px;border:1px solid #ffeeba">
            <label>🎁 Setear Prueba (Días)</label><input id="mod-prueba-dias" class="input-std" type="number" oninput="calcularFechasAutomaticas()">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label>Vencimiento</label><input id="mod-ciclo" class="input-std" type="date"></div>
            <div><label>Límite Cred.</label><input id="mod-limite" class="input-std" type="number"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label>Abono ($)</label><input id="mod-abono" class="input-std" type="number"></div>
            <div><label>Por Cancha ($)</label><input id="mod-cancha" class="input-std" type="number"></div>
        </div>
        <button class="btn-blue" onclick="guardarFinanzas()" style="margin-top:20px">💾 Guardar Cambios</button>
        <button class="btn-blue" onclick="cerrarModal()" style="background:#eee;color:#333;margin-top:10px">Cerrar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get, update, set, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

    const firebaseConfig = { apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI", authDomain: "padelapp-e72af.firebaseapp.com", databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com", projectId: "padelapp-e72af", storageBucket: "padelapp-e72af.appspot.com", messagingSenderId: "806914592971", appId: "1:806914592971:web:84720063fc36a882b40b4e" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app); const auth = getAuth(app); const functions = getFunctions(app); const crearOrganizador = httpsCallable(functions, 'crearOrganizador');

    window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('log-email').value, document.getElementById('log-pass').value).catch(e => alert(e.message));
    window.handleLogout = () => signOut(auth).then(() => location.reload());
    onAuthStateChanged(auth, user => { if(user){ document.getElementById('view-login').classList.add('hidden'); document.getElementById('view-panel').classList.remove('hidden'); initDash(); } });

    function initDash() {
        onValue(ref(db, 'hubs'), async snap => {
            const hubs = snap.val() || {}; const list = document.getElementById('org-list'); list.innerHTML = "";
            let totalFees = 0; document.getElementById('total-hubs').innerText = Object.keys(hubs).length;
            for(let id in hubs) {
                const fSnap = await get(ref(db, `facturacion/${id}/cuenta`)); const f = fSnap.val() || { consumoActual: 0 };
                totalFees += f.consumoActual;
                const hoy = new Date(); const isTrial = f.fechaFinPrueba && new Date(f.fechaFinPrueba + "T23:59:59") > hoy;
                const item = document.createElement('div'); item.className = "accordion-item";
                item.innerHTML = `<div class="accordion-header" onclick="this.parentElement.classList.toggle('active')"><div><b style="text-transform:uppercase">${hubs[id].nombre || id}</b>${f.cuentaSuspendida ? '<span class="tag-status tag-suspended">Suspendido</span>' : isTrial ? '<span class="tag-status tag-trial">En Prueba</span>' : ''}<div style="font-size:11px;color:var(--sub);margin-top:4px">Deuda: $${f.consumoActual.toLocaleString()} | Vence: ${f.fechaFinCiclo || '-'}</div></div><div>▾</div></div><div class="accordion-content"><div style="display:flex;gap:10px;margin-top:15px"><button class="btn-manage" onclick="abrirFinanzas('${id}')">⚙️ FINANZAS</button><a href="d.html?org=${id}" target="_blank" class="btn-manage">DASHBOARD</a><button class="btn-manage" style="background:#fff2f2;color:var(--danger);margin-left:auto" onclick="eliminarHub('${id}')">🗑️ ARCHIVAR</button></div></div>`;
                list.appendChild(item);
            }
            document.getElementById('total-fees').innerText = "$" + totalFees.toLocaleString();
        });
    }

    window.altaAutomatizada = async () => {
        const data = { hubId: document.getElementById('new-id').value.trim(), nombreOrg: document.getElementById('new-name').value.trim(), email: document.getElementById('new-email').value.trim(), password: document.getElementById('new-pass').value.trim() };
        if(!data.hubId || data.password.length < 6) return alert("Mínimo 6 caracteres");
        const btn = document.getElementById('btn-crear'); btn.innerText = "⏳ Creando..."; btn.disabled = true;
        try { await crearOrganizador(data); alert("Hub creado con éxito"); location.reload(); } catch(e) { alert(e.message); btn.disabled = false; btn.innerText = "REINTENTAR"; }
    };

    window.abrirFinanzas = async id => {
        const s = await get(ref(db, `facturacion/${id}/cuenta`)); const f = s.val() || { consumoActual: 0, costoAbono: 25000, costoCancha: 7000 };
        document.getElementById('modal-org-id').value = id; document.getElementById('txt-deuda-modal').innerText = "$" + f.consumoActual.toLocaleString();
        document.getElementById('mod-abono').value = f.costoAbono; document.getElementById('mod-cancha').value = f.costoCancha;
        document.getElementById('mod-ciclo').value = f.fechaFinCiclo || ""; document.getElementById('mod-limite').value = f.limiteCredito || 30000;
        document.getElementById('mod-suspendido').checked = f.cuentaSuspendida || false;
        document.getElementById('modal-finance').classList.remove('hidden');
    };

    window.guardarFinanzas = async () => {
        const id = document.getElementById('modal-org-id').value;
        const dias = parseInt(document.getElementById('mod-prueba-dias').value) || 0;
        let upds = { costoAbono: parseInt(document.getElementById('mod-abono').value), costoCancha: parseInt(document.getElementById('mod-cancha').value), fechaFinCiclo: document.getElementById('mod-ciclo').value, limiteCredito: parseInt(document.getElementById('mod-limite').value), cuentaSuspendida: document.getElementById('mod-suspendido').checked };
        if(dias > 0){ let fP = new Date(); fP.setDate(hoy.getDate() + dias); upds.fechaFinPrueba = fP.toISOString().split('T')[0]; }
        await update(ref(db, `facturacion/${id}/cuenta`), upds); alert("Guardado"); cerrarModal();
    };

    window.eliminarHub = async id => { if(confirm("¿Archivar este club?")){ const s = await get(ref(db, `hubs/${id}`)); await set(ref(db, `archivo_hubs/${id}`), s.val()); await set(ref(db, `hubs/${id}`), null); alert("Archivado"); } };
    window.cerrarModal = () => document.getElementById('modal-finance').classList.add('hidden');
</script>
</body>
</html>
