<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --sub: #8e8e93; --success: #34c759; --danger: #ff3b30; --warning: #ffcc00; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        h1 { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 30px; }
        .org-card { background: var(--card); border-radius: 28px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .org-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .org-detail { margin-top: 20px; padding-top: 20px; border-top: 1px solid #f2f2f7; display: none; }
        .org-detail.active { display: block; }
        .event-box { background: #f9f9fb; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #eee; }
        .btn { padding: 10px 16px; border-radius: 12px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; text-decoration: none; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-dark { background: var(--text); color: white; }
        .btn-gray { background: #eee; color: var(--text); }
        .btn-suspend { background: var(--warning); }
        .btn-active { background: var(--success); color: white; }
        .input-std { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; outline: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 32px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Centro de Mandos 🏟️</h1>
    <div id="org-list">Cargando...</div>
    <button class="btn btn-dark" style="width:100%; padding:20px; border-radius:20px; margin-top:20px;" onclick="abrirModal('org')">+ Nuevo Organizador</button>
</div>
<div id="modal-nuevo" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const BASE_URL = "v.html";

    onValue(ref(db, 'hubs'), (snap) => {
        const hubs = snap.val() || {};
        const container = document.getElementById('org-list');
        container.innerHTML = "";
        Object.keys(hubs).forEach(orgId => {
            const orgData = hubs[orgId];
            const eventIds = orgData.canchas || [];
            const card = document.createElement('div');
            card.className = 'org-card';
            card.innerHTML = `
                <div class="org-header" onclick="toggleOrg('${orgId}')">
                    <b>${orgData.nombre || orgId}</b>
                    <div style="display:flex;gap:5px;">
                        <button class="btn btn-gray" onclick="event.stopPropagation(); copiar('${window.location.href.replace('m.html', 'v.html')}?org=${orgId}')">📋</button>
                        <button class="btn btn-gray">Editar</button>
                    </div>
                </div>
                <div class="org-detail" id="detail-${orgId}">
                    <div id="items-${orgId}"></div>
                    <button class="btn btn-blue" style="width:100%; margin-top:10px;" onclick="abrirModal('cancha', '${orgId}', '${orgData.nombre}')">+ Nueva Cancha</button>
                    <button class="btn" style="color:red;width:100%;margin-top:10px;" onclick="eliminarOrg('${orgId}')">Eliminar Cliente</button>
                </div>
            `;
            container.appendChild(card);
            const listDiv = document.getElementById('items-' + orgId);
            eventIds.forEach(id => {
                get(ref(db, 'eventos/' + id)).then(s => {
                    const d = s.val(); if(!d) return;
                    const b = document.createElement('div');
                    b.className = 'event-box';
                    b.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <b>${d.organiza}</b>
                            <div style="display:flex;gap:5px;">
                                <button class="btn ${d.suspendido?'btn-active':'btn-suspend'}" onclick="toggleS('${id}',${d.suspendido})">${d.suspendido?'ON':'OFF'}</button>
                                <a href="${BASE_URL}?id=${id}" class="btn btn-blue">Gestionar</a>
                                <button class="btn btn-gray" onclick="eliminarC('${orgId}','${id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                    listDiv.appendChild(b);
                });
            });
        });
    });

    window.toggleOrg = (id) => { document.getElementById('detail-'+id).classList.toggle('active'); };
    window.abrirModal = (tipo, orgId = '', nombreReal = '') => {
        const body = document.getElementById('modal-body');
        if (tipo === 'org') {
            body.innerHTML = `<h2>Nuevo Cliente</h2><input id="in-name" class="input-std" placeholder="Nombre Real"><button class="btn btn-blue" style="width:100%" onclick="crearOrg()">Crear</button>`;
        } else {
            body.innerHTML = `<h2>Nueva Cancha: ${nombreReal}</h2><input id="in-cancha" class="input-std" placeholder="Nombre Cancha"><button class="btn btn-blue" style="width:100%" onclick="agregarC('${orgId}','${nombreReal}')">Agregar</button>`;
        }
        document.getElementById('modal-nuevo').classList.add('active');
    };
    window.cerrarModal = () => document.getElementById('modal-nuevo').classList.remove('active');
    window.crearOrg = async () => {
        const n = document.getElementById('in-name').value.trim(); if(!n) return;
        const id = n.toLowerCase().replace(/\s+/g, '-').normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        await set(ref(db, 'hubs/'+id), { nombre: n, canchas: [] }); cerrarModal();
    };
    window.agregarC = async (orgId, nReal) => {
        const cN = document.getElementById('in-cancha').value.trim(); if(!cN) return;
        const id = `${orgId}-${cN.toLowerCase().replace(/\s+/g, '-')}-${Date.now().toString().slice(-4)}`;
        const snap = await get(ref(db, 'hubs/'+orgId));
        let ids = snap.val().canchas || []; ids.push(id);
        await set(ref(db, 'eventos/'+id), { organiza: cN, organizador: nReal, fecha: "2026-04-20", hora: "20:00", horaFin: "22:00", valor: 0, password: "1234" });
        await update(ref(db, 'hubs/'+orgId), { canchas: ids }); cerrarModal();
    };
    window.toggleS = (id, s) => update(ref(db, 'eventos/'+id), { suspendido: !s });
    window.copiar = (t) => { navigator.clipboard.writeText(t).then(() => alert("Copiado")); };
    window.eliminarC = async (orgId, evId) => {
        const snap = await get(ref(db, 'hubs/'+orgId));
        let ids = snap.val().canchas.filter(i => i !== evId);
        await update(ref(db, 'hubs/'+orgId), { canchas: ids });
        await remove(ref(db, 'eventos/'+evId));
    };
    window.eliminarOrg = (id) => { if(confirm("¿Borrar cliente?")) remove(ref(db, 'hubs/'+id)); };
</script>
</body>
</html>
