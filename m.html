<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - Centro de Mandos</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --sub: #8e8e93; --success: #34c759; --danger: #ff3b30; --warning: #ffcc00; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; -webkit-font-smoothing: antialiased; }
        .container { max-width: 600px; margin: auto; }
        h1 { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 30px; }
        
        .org-card { background: var(--card); border-radius: 28px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .org-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .org-detail { margin-top: 20px; padding-top: 20px; border-top: 1px solid #f2f2f7; display: none; }
        .org-detail.active { display: block; animation: fadeIn 0.3s ease; }

        .event-box { background: #f9f9fb; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #eee; }
        .btn { padding: 10px 16px; border-radius: 12px; border: none; font-size: 11px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; text-decoration: none; text-transform: uppercase; justify-content: center; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-dark { background: var(--text); color: white; }
        .btn-gray { background: #eee; color: var(--text); }
        .btn-suspend { background: var(--warning); color: #000; }
        .btn-active { background: var(--success); color: white; }
        
        /* HERRAMIENTA DE LINKS */
        .link-tool { margin-top: 15px; border-top: 1px dotted #ddd; padding-top: 12px; }
        .input-short { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 8px; outline: none; font-size: 11px; background: #fff; }

        .input-std { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; outline: none; font-size: 14px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 32px; width: 100%; max-width: 400px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>Centro de Mandos 🏟️</h1>
    <div id="org-list">Cargando tablero...</div>
    <button class="btn btn-dark" style="width:100%; padding:20px; border-radius:20px; margin-top:20px; font-size:14px;" onclick="abrirModal('org')">+ Nuevo Organizador</button>
</div>

<div id="modal-nuevo" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'hubs'), (snap) => {
        const hubs = snap.val() || {};
        const container = document.getElementById('org-list');
        container.innerHTML = "";
        Object.keys(hubs).forEach(orgId => {
            const orgData = hubs[orgId];
            const eventIds = orgData.canchas || [];
            const card = document.createElement('div');
            card.className = 'org-card';
            card.innerHTML = `
                <div class="org-header" onclick="toggleOrg('${orgId}')">
                    <div style="line-height:1.2">
                        <b style="font-size:18px; text-transform:uppercase;">${orgData.nombre || orgId}</b><br>
                        <span style="font-size:11px; color:var(--sub)">${eventIds.length} Canchas creadas</span>
                    </div>
                    <div style="display:flex;gap:5px;">
                        <button class="btn btn-gray" style="padding:10px" onclick="event.stopPropagation(); copiar('${window.location.origin}${window.location.pathname.replace('m.html','v.html')}?org=${orgId}')" title="Copiar Link Hub">📋 HUB</button>
                        <button class="btn btn-gray" style="font-size:18px">▾</button>
                    </div>
                </div>
                <div class="org-detail" id="detail-${orgId}">
                    <div id="items-${orgId}"></div>
                    <button class="btn btn-blue" style="width:100%; margin-top:10px; padding:15px;" onclick="abrirModal('cancha', '${orgId}', '${orgData.nombre}')">+ Nueva Cancha</button>
                    <button class="btn" style="color:var(--danger);width:100%;margin-top:15px;background:none;font-size:10px;" onclick="eliminarOrg('${orgId}')">ELIMINAR TODO EL CLIENTE</button>
                </div>
            `;
            container.appendChild(card);
            const listDiv = document.getElementById('items-' + orgId);
            
            eventIds.forEach(id => {
                onValue(ref(db, 'eventos/' + id), (s) => {
                    const d = s.val(); if(!d) return;
                    let b = document.getElementById('box-' + id);
                    if(!b) { b = document.createElement('div'); b.id = 'box-' + id; b.className = 'event-box'; listDiv.appendChild(b); }
                    
                    const esSusp = d.suspendido === true;
                    b.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div style="line-height:1.2">
                                <b style="font-size:14px;">${d.organiza}</b><br>
                                <span style="font-size:9px;color:${esSusp?'var(--danger)':'var(--success)'}">${esSusp ? '● SUSPENDIDA' : '● ACTIVA'}</span>
                            </div>
                            <div style="display:flex;gap:5px;">
                                <button class="btn ${esSusp ? 'btn-active' : 'btn-suspend'}" style="padding:8px 10px" onclick="toggleS('${id}',${esSusp})">
                                    ${esSusp ? 'Habilitar' : 'Suspender'}
                                </button>
                                <a href="v.html?id=${id}" class="btn btn-blue" style="padding:8px" target="_blank">⚙️</a>
                                <button class="btn btn-gray" style="padding:8px" onclick="eliminarC('${orgId}','${id}')">🗑️</button>
                            </div>
                        </div>
                        
                        <div class="link-tool">
                            <input id="short-${id}" class="input-short" placeholder="Pega el link corto (TinyURL/Bitly)..." value="${d.linkCorto || ''}">
                            <div style="display:flex; gap:5px;">
                                <button class="btn btn-gray" style="flex:1; font-size:9px; padding:6px;" onclick="guardarLinkCorto('${id}')">💾 Guardar</button>
                                <button class="btn btn-gray" style="flex:1; font-size:9px; padding:6px;" onclick="copiar('${document.getElementById('short-'+id)?.value || d.linkCorto || ''}')">📋 Copiar</button>
                            </div>
                        </div>
                    `;
                });
            });
        });
    });

    window.toggleOrg = (id) => { document.getElementById('detail-'+id).classList.toggle('active'); };
    
    window.guardarLinkCorto = (id) => {
        const url = document.getElementById('short-' + id).value.trim();
        update(ref(db, 'eventos/' + id), { linkCorto: url }).then(() => alert("Link corto guardado"));
    };

    window.abrirModal = (tipo, orgId = '', nombreReal = '') => {
        const body = document.getElementById('modal-body');
        if (tipo === 'org') {
            body.innerHTML = `<h2>Nuevo Organizador</h2><label style="font-size:10px;font-weight:800;color:var(--sub)">NOMBRE COMERCIAL</label><input id="in-name" class="input-std" placeholder="Ej: Sergio Padel"><button class="btn btn-blue" style="width:100%;padding:15px" onclick="crearOrg()">Crear Cliente</button><button class="btn" style="width:100%;margin-top:10px" onclick="cerrarModal()">Cancelar</button>`;
        } else {
            body.innerHTML = `<h2>Nueva Cancha: ${nombreReal}</h2><label style="font-size:10px;font-weight:800;color:var(--sub)">NOMBRE DEL TURNO</label><input id="in-cancha" class="input-std" placeholder="Ej: Martes Pro"><button class="btn btn-blue" style="width:100%;padding:15px" onclick="agregarC('${orgId}','${nombreReal}')">Agregar Cancha</button><button class="btn" style="width:100%;margin-top:10px" onclick="cerrarModal()">Cancelar</button>`;
        }
        document.getElementById('modal.nuevo')?.classList.add('active') || document.getElementById('modal-nuevo').classList.add('active');
    };

    window.cerrarModal = () => document.getElementById('modal-nuevo').classList.remove('active');

    window.crearOrg = async () => {
        const n = document.getElementById('in-name').value.trim(); if(!n) return;
        const id = n.toLowerCase().replace(/\s+/g, '-').normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        await set(ref(db, 'hubs/'+id), { nombre: n, canchas: [] }); cerrarModal();
    };

    window.agregarC = async (orgId, nReal) => {
        const cN = document.getElementById('in-cancha').value.trim(); if(!cN) return;
        const id = `${orgId}-${cN.toLowerCase().replace(/\s+/g, '-')}-${Date.now().toString().slice(-4)}`;
        const snap = await get(ref(db, 'hubs/'+orgId));
        let ids = snap.val().canchas || []; ids.push(id);
        await set(ref(db, 'eventos/'+id), { 
            organiza: cN, 
            organizador: nReal, 
            fecha: "2026-04-20", 
            hora: "20:00", 
            horaFin: "22:00", 
            valor: 0, 
            alias: "AliasMP",
            celuOrganizador: "11",
            categorias: "Todas",
            password: "1234", 
            suspendido: false,
            linkCorto: "" 
        });
        await update(ref(db, 'hubs/'+orgId), { canchas: ids }); cerrarModal();
    };

    window.toggleS = (id, sActual) => update(ref(db, 'eventos/'+id), { suspendido: !sActual });
    window.copiar = (t) => { 
        if(!t) return alert("No hay link para copiar");
        navigator.clipboard.writeText(t).then(() => alert("Copiado al portapapeles")); 
    };
    
    window.eliminarC = async (orgId, evId) => {
        if(!confirm("¿Borrar cancha? Se perderán inscriptos.")) return;
        const snap = await get(ref(db, 'hubs/'+orgId));
        let ids = snap.val().canchas.filter(i => i !== evId);
        await update(ref(db, 'hubs/'+orgId), { canchas: ids });
        await remove(ref(db, 'eventos/'+evId));
    };

    window.eliminarOrg = (id) => { if(confirm("¿Borrar TODO el cliente y sus canchas?")) remove(ref(db, 'hubs/'+id)); };
</script>
</body>
</html>
