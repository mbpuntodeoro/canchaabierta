<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --danger: #ff3b30; --warning: #ff9500; --success: #34c759; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; }
        header { background: #000; color: white; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px solid var(--primary); }
        .hub-item { background: white; border-radius: 20px; margin-bottom: 12px; border: 1px solid #eee; overflow: hidden; }
        .hub-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .hub-content { padding: 20px; display: none; border-top: 1px solid #eee; background: #fafafa; }
        .hub-item.active .hub-content { display: block; }
        .tag-status { font-size: 9px; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; margin-left: 10px; font-weight: 900; }
        .st-trial { background: #eef6ff; color: var(--primary); }
        .st-activo { background: #e8f9ee; color: var(--success); }
        .st-susp { background: #fff2f2; color: var(--danger); }
        .input-std { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #ddd; margin-bottom: 10px; font-family: inherit; box-sizing: border-box; }
        .btn-blue { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-edit { background: #eee; padding: 10px 15px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; text-decoration: none; color: #333; margin-top: 10px; display: inline-block;}
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 35px; max-height: 90vh; overflow-y: auto; }
        label { display: block; font-size: 10px; font-weight: 800; color: var(--sub); text-transform: uppercase; margin: 10px 0 4px 5px; }
    </style>
</head>
<body>
    <header><h2>Master PadelApp</h2></header>
    <div class="container">
        <div class="card">
            <h3>🚀 Alta de Organizador</h3>
            <input id="new-id" class="input-std" placeholder="ID Club (ej: smash-padel)">
            <input id="new-name" class="input-std" placeholder="Nombre Comercial">
            <button class="btn-blue" onclick="crearHub()">REGISTRAR</button>
        </div>
        <div id="lista-clubes">Cargando clubes...</div>
    </div>

    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Perfil y Trial</h2>
            <input type="hidden" id="edit-id">
            <label>Nombre Comercial</label><input id="mod-nom" class="input-std">
            <label>WhatsApp Dueño</label><input id="mod-cel" class="input-std">
            <hr>
            <label>Días de Trial (Gratis)</label>
            <input id="mod-trial-days" class="input-std" type="number" placeholder="Ej: 30">
            <div style="background:#fff2f2; padding:15px; border-radius:18px; margin:15px 0; display:flex; justify-content:space-between; align-items:center; border:1px solid #ffdbdb">
                <b style="color:var(--danger); font-size:11px">SUSPENDER CUENTA</b>
                <input type="checkbox" id="mod-susp" style="transform:scale(1.5)">
            </div>
            <button class="btn-blue" onclick="guardarPerfil()">GUARDAR CAMBIOS</button>
            <button class="btn-blue" onclick="cerrarModal()" style="background:#eee; color:#333; margin-top:10px">CANCELAR</button>
        </div>
    </div>

<script>
    firebase.initializeApp({ databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" });
    const db = firebase.database();

    function render() {
        db.ref('hubs').on('value', async (snap) => {
            const hubs = snap.val() || {};
            const container = document.getElementById('lista-clubes');
            container.innerHTML = "";
            for (let id in hubs) {
                const fSnap = await db.ref(`facturacion/${id}/cuenta`).once('value');
                const f = fSnap.val() || {};
                let tagClass = "st-activo", tagText = "Activo";
                if(f.cuentaSuspendida) { tagClass = "st-susp"; tagText = "Suspendido"; }
                else if(f.trialStartDate && f.trialDays) {
                    const remaining = f.trialDays - Math.floor((Date.now() - f.trialStartDate) / 86400000);
                    if(remaining > 0) { tagClass = "st-trial"; tagText = `Trial: ${remaining}d`; }
                }
                container.innerHTML += `
                    <div class="hub-item" id="item-${id}">
                        <div class="hub-header" onclick="document.getElementById('item-${id}').classList.toggle('active')">
                            <span>${f.nombreOrg || id} <span class="tag-status ${tagClass}">${tagText}</span></span> <span>▾</span>
                        </div>
                        <div class="hub-content">
                            <button class="btn-edit" onclick="abrirPerfil('${id}')">⚙️ EDITAR TRIAL / PERFIL</button>
                            <a href="d.html?org=${id}" target="_blank" class="btn-edit" style="background: #000; color:#fff">ABRIR DASHBOARD</a>
                        </div>
                    </div>`;
            }
        });
    }

    function crearHub() {
        const id = document.getElementById('new-id').value.trim();
        const nom = document.getElementById('new-name').value.trim();
        if(!id || !nom) return alert("Faltan datos");
        db.ref('hubs/'+id).set({ nombre: nom, canchas: [] });
        db.ref(`facturacion/${id}/cuenta`).set({ nombreOrg: nom, consumoActual: 0, trialDays: 0, trialStartDate: 0, cuentaSuspendida: false });
        alert("¡Creado!");
    }

    function abrirPerfil(id) {
        db.ref(`facturacion/${id}/cuenta`).once('value', s => {
            const f = s.val() || {};
            document.getElementById('edit-id').value = id;
            document.getElementById('mod-nom').value = f.nombreOrg || "";
            document.getElementById('mod-cel').value = f.celularContacto || "";
            document.getElementById('mod-trial-days').value = f.trialDays || 0;
            document.getElementById('mod-susp').checked = f.cuentaSuspendida || false;
            document.getElementById('modal-edit').style.display = 'flex';
        });
    }

    function guardarPerfil() {
        const id = document.getElementById('edit-id').value;
        const upd = {
            nombreOrg: document.getElementById('mod-nom').value,
            celularContacto: document.getElementById('mod-cel').value,
            trialDays: parseInt(document.getElementById('mod-trial-days').value),
            trialStartDate: Date.now(),
            cuentaSuspendida: document.getElementById('mod-susp').checked
        };
        db.ref(`facturacion/${id}/cuenta`).update(upd).then(() => { alert("Guardado"); cerrarModal(); });
    }

    function cerrarModal() { document.getElementById('modal-edit').style.display = 'none'; }
    render();
</script>
</body>
</html>
