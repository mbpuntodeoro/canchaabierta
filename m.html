<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard - Cancha Abierta</title>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --sub: #8e8e93; --success: #34c759; --danger: #ff3b30; --warning: #ffcc00; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: auto; }
        .org-card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); }
        .org-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .event-box { background: #f9f9fb; border-radius: 16px; padding: 15px; margin-top: 15px; border: 1px solid #eee; }
        .event-item { padding: 15px 0; border-bottom: 1px solid #eee; }
        .event-item:last-child { border-bottom: none; }
        
        /* BOTONES */
        .btn-small { padding: 8px 12px; border-radius: 10px; border: none; font-size: 11px; font-weight: 700; cursor: pointer; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: #eee; color: var(--text); }
        .btn-suspend { background: var(--warning); color: #000; }
        .btn-active { background: var(--success); color: white; }
        
        .input-short { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 11px; margin: 8px 0; outline: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 100; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 400px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-weight:900; letter-spacing:-1px;">Centro de Mandos 🏟️</h1>
    <div id="org-list">Cargando...</div>
    <button style="width:100%; background:#1c1c1e; color:white; padding:18px; border-radius:18px; border:none; font-weight:700; margin-top:20px; cursor:pointer;" onclick="abrirModal('org')">+ Nuevo Organizador</button>
</div>

<div id="modal-nuevo" class="modal-overlay">
    <div class="modal-content" id="modal-body"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, get, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const BASE_URL = "https://mbpuntodeoro.github.io/canchaabierta/v.html";

    onValue(ref(db, 'hubs'), (snap) => {
        const hubs = snap.val() || {};
        const container = document.getElementById('org-list');
        container.innerHTML = "";

        Object.keys(hubs).forEach(orgId => {
            const eventIds = hubs[orgId] || [];
            const card = document.createElement('div');
            card.className = 'org-card';
            card.innerHTML = `
                <div class="org-header">
                    <div>
                        <h2 style="margin:0; text-transform:uppercase; font-size:18px;">${orgId}</h2>
                        <span style="font-size:10px; color:var(--primary); cursor:pointer;" onclick="copiar('${BASE_URL}?org=${orgId}')">📋 Copiar Link Cartelera</span>
                    </div>
                </div>
                <div class="event-box">
                    <div id="list-${orgId}">Cargando canchas...</div>
                    <button style="width:100%; background:none; border:1px dashed var(--primary); color:var(--primary); padding:10px; border-radius:10px; font-weight:700; margin-top:10px; cursor:pointer;" onclick="abrirModal('cancha', '${orgId}')">+ Nueva Cancha</button>
                </div>
            `;
            container.appendChild(card);

            const listDiv = document.getElementById('list-' + orgId);
            listDiv.innerHTML = "";
            eventIds.forEach(id => {
                get(ref(db, 'eventos/' + id)).then(s => {
                    const d = s.val();
                    if(!d) return;
                    const item = document.createElement('div');
                    item.className = 'event-item';
                    const btnEstadoTxt = d.suspendido ? "HABILITAR" : "SUSPENDER";
                    const btnEstadoClase = d.suspendido ? "btn-active" : "btn-suspend";

                    item.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div style="line-height:1.2">
                                <b style="font-size:14px;">${d.organiza}</b><br>
                                <span style="font-size:10px; color:#8e8e93;">ID: ${id}</span>
                            </div>
                            <div style="display:flex; gap:5px;">
                                <button class="btn-small ${btnEstadoClase}" onclick="toggleSuspender('${id}', ${d.suspendido || false})">${btnEstadoTxt}</button>
                                <a href="v.html?id=${id}" target="_blank" class="btn-small btn-blue" style="text-decoration:none">Gestionar</a>
                                <button class="btn-small btn-gray" onclick="eliminarCancha('${orgId}', '${id}')">🗑️</button>
                            </div>
                        </div>
                        <div style="margin-top:10px;">
                            <input id="link-${id}" class="input-short" placeholder="Pegar link corto (TinyURL/Bitly) aquí..." value="${d.linkCorto || ''}">
                            <div style="display:flex; gap:5px;">
                                <button class="btn-small btn-gray" style="flex:1" onclick="guardarLinkCorto('${id}')">💾 Guardar Link</button>
                                <button class="btn-small btn-gray" style="flex:1" onclick="copiarLinkCorto('${id}')">📋 Copiar</button>
                            </div>
                        </div>
                    `;
                    listDiv.appendChild(item);
                });
            });
        });
    });

    window.toggleSuspender = (id, estadoActual) => {
        update(ref(db, 'eventos/' + id), { suspendido: !estadoActual });
    };

    window.guardarLinkCorto = (id) => {
        const url = document.getElementById('link-' + id).value.trim();
        update(ref(db, 'eventos/' + id), { linkCorto: url }).then(() => alert("Link corto guardado"));
    };

    window.copiarLinkCorto = (id) => {
        const url = document.getElementById('link-' + id).value;
        if(!url) return alert("No hay link corto guardado");
        navigator.clipboard.writeText(url).then(() => alert("Link corto copiado!"));
    };

    window.copiar = (txt) => { navigator.clipboard.writeText(txt).then(() => alert("Copiado!")); };

    window.abrirModal = (tipo, orgId = '') => {
        const body = document.getElementById('modal-body');
        if (tipo === 'org') {
            body.innerHTML = `<h2>Nuevo Cliente</h2>
                <input id="in-org-id" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;" placeholder="ID (ej: wini-padel)">
                <input id="in-event-name" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;" placeholder="Nombre Cancha (ej: Cancha Abierta Wini)">
                <button style="width:100%; background:#007aff; color:white; padding:15px; border-radius:12px; border:none; font-weight:700;" onclick="crearOrg()">Crear</button>
                <button style="width:100%; background:none; color:#8e8e93; margin-top:10px; border:none;" onclick="cerrarModal()">Cancelar</button>`;
        } else {
            body.innerHTML = `<h2>Nueva Cancha para ${orgId}</h2>
                <input id="in-new-name" style="width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:1px solid #ddd;" placeholder="Nombre (ej: Martes Pro)">
                <input id="in-target-org" type="hidden" value="${orgId}">
                <button style="width:100%; background:#007aff; color:white; padding:15px; border-radius:12px; border:none; font-weight:700;" onclick="agregarCancha()">Agregar</button>
                <button style="width:100%; background:none; color:#8e8e93; margin-top:10px; border:none;" onclick="cerrarModal()">Cancelar</button>`;
        }
        document.getElementById('modal-nuevo').classList.add('active');
    };

    window.cerrarModal = () => document.getElementById('modal-nuevo').classList.remove('active');

    window.crearOrg = async () => {
        const id = document.getElementById('in-org-id').value.trim().toLowerCase().replace(/\s+/g, '-');
        const eventName = document.getElementById('in-event-name').value;
        const eventId = `${id}-1`;
        await set(ref(db, 'eventos/' + eventId), { organiza: eventName, lugar: "Sede", fecha: "2026-04-20", hora: "20:00", horaFin: "22:00", valor: 0, password: "1234" });
        await set(ref(db, 'hubs/' + id), [eventId]);
        cerrarModal();
    };

    window.agregarCancha = async () => {
        const orgId = document.getElementById('in-target-org').value;
        const name = document.getElementById('in-new-name').value;
        const newId = `${orgId}-${name.toLowerCase().replace(/\s+/g, '-')}`;
        const snap = await get(ref(db, 'hubs/' + orgId));
        const ids = snap.val() || [];
        ids.push(newId);
        await set(ref(db, 'eventos/' + newId), { organiza: name, lugar: "Sede", fecha: "2026-04-20", hora: "20:00", horaFin: "22:00", valor: 0, password: "1234" });
        await set(ref(db, 'hubs/' + orgId), ids);
        cerrarModal();
    };

    window.eliminarCancha = async (orgId, eventId) => {
        if(!confirm("¿Borrar?")) return;
        const snap = await get(ref(db, 'hubs/' + orgId));
        const ids = snap.val().filter(id => id !== eventId);
        await set(ref(db, 'hubs/' + orgId), ids);
        await remove(ref(db, 'eventos/' + eventId));
    };
</script>
</body>
</html>
