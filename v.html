<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --sub: #86868b; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: #fff; padding: 25px; text-align: center; border-bottom: 1px solid #e5e5e7; }
        .container { max-width: 500px; margin: auto; padding: 20px 15px; }
        .event-card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; margin-left: 8px; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); margin-top: 8px; font-weight: 600; }
        .btn-join { background: var(--primary); color: white; text-decoration: none; display: block; text-align: center; padding: 18px; border-radius: 18px; font-weight: 900; margin-top: 20px; }
    </style>
</head>
<body>
    <header><h1 id="hub-name" style="margin:0; font-weight:900">...</h1></header>
    <div class="container"><div id="lista-eventos"></div></div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    const firebaseConfig = { apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI", authDomain: "padelapp-e72af.firebaseapp.com", databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com", projectId: "padelapp-e72af", storageBucket: "padelapp-e72af.appspot.com", messagingSenderId: "806914592971", appId: "1:806914592971:web:84720063fc36a882b40b4e" };
    const app = initializeApp(firebaseConfig); const db = getDatabase(app);
    const orgId = new URLSearchParams(window.location.search).get('org');
    
    const fmtFechaHumana = (f, h1, h2) => {
        if(!f) return '--';
        const ds = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const [y, m, d] = f.split('-'); const dO = new Date(y, m - 1, d);
        return `${ds[dO.getDay()]} ${parseInt(d)}/${parseInt(m)} de ${h1} a ${h2 || '--'} hs`;
    };

    if(orgId){
        onValue(ref(db, `hubs/${orgId}`), async snap => {
            const h = snap.val() || {}; document.getElementById('hub-name').innerText = h.nombre || "Cartelera";
            const list = document.getElementById('lista-eventos'); list.innerHTML = "";
            let data = [];
            for(let id of (h.canchas || [])){
                const eSnap = await get(ref(db, `eventos/${id}`));
                if(eSnap.exists()) data.push({ id, ...eSnap.val() });
            }
            data.sort((a,b) => new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));
            data.forEach(d => {
                list.innerHTML += `<div class="event-card">
                    <div style="display:flex;align-items:center"><h3 style="margin:0;font-size:18px;font-weight:800;text-transform:uppercase">🎾 ${d.organiza}</h3><span class="tag-cat">${d.categorias || 'Gral'}</span></div>
                    <div class="info-row">📅 ${fmtFechaHumana(d.fecha, d.hora, d.horaFin)}</div>
                    <div class="info-row">📍 ${d.lugar || 'Sede a confirmar'}</div>
                    <a href="i.html?id=${d.id}&org=${orgId}" class="btn-join">ANOTARME</a>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
