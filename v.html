<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Canchas - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js?v=21"></script>
    <style>
        :root { 
            --bg-main: #F2F2F7; --gray-1: #F9F9FB; --gray-2: #E5E5EA; 
            --text-main: #1C1C1E; --text-sub: #8E8E93; 
            --blue-grad: linear-gradient(180deg, #0A84FF, #007AFF);
            --green-grad: linear-gradient(180deg, #34C759, #30B350);
            --anim-fast: 150ms; --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
        }
        body { font-family: 'Outfit', -apple-system, sans-serif; background: var(--bg-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: var(--text-main); -webkit-tap-highlight-color: transparent;}
        
        .header-box { text-align: center; margin-bottom: 25px; width: 100%; max-width: 500px; animation: modalIn 400ms var(--ease-out) forwards; }
        .h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; margin: 0 0 5px 0; text-transform: uppercase; }
        
        /* ETIQUETA VIP PARA JUGADORES */
        .badge-fundador { display: inline-block; background: #fff9e6; color: #856404; font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 8px; border: 1px solid #ffeeba; margin-top: 5px; letter-spacing: 0.5px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); text-transform: uppercase;}

        .court-list { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); text-decoration: none; color: inherit; display: block; transition: transform var(--anim-fast) var(--ease-out), box-shadow var(--anim-fast); opacity: 0; transform: translateY(10px); animation: fadeSlide 300ms var(--ease-out) forwards; }
        .card:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; border-bottom: 1px dashed var(--gray-2); padding-bottom: 12px;}
        .card-title { font-weight: 900; font-size: 18px; margin: 0; text-transform: uppercase; line-height: 1.2; flex: 1; padding-right: 10px;}
        .badge-cat { font-size: 10px; color: #007AFF; background: rgba(0,122,255,0.1); padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }
        
        .info-row { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 6px; }
        
        .btn-join { background: var(--blue-grad); box-shadow: 0 4px 12px rgba(0,122,255,0.2); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 15px; text-align: center; }
        .btn-full { background: var(--gray-2); color: var(--text-sub); box-shadow: none; pointer-events: none;}
        
        @keyframes modalIn { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes fadeSlide { to { opacity: 1; transform: translateY(0); } }

        #loading-init { text-align: center; font-weight: 800; color: var(--text-sub); margin-top: 50px; }
        .no-courts { text-align: center; font-weight: 700; color: var(--text-sub); background: white; padding: 30px; border-radius: 20px; font-size: 15px; }

        .footer-pro { text-align: center; margin-top: 40px; padding: 20px 0 40px; width: 100%; max-width: 420px; }
        .footer-brand { font-size: 10px; font-weight: 800; color: var(--text-sub); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="loading-init">Buscando canchas disponibles...</div>

    <div class="header-box" id="header-box" style="display:none;">
        <h1 class="h1" id="t-org-name">Cartelera</h1>
        <div id="badge-fundador-container" style="display: none;">
            <span class="badge-fundador">⭐ ORGANIZADOR OFICIAL</span>
        </div>
    </div>

    <div class="court-list" id="court-list"></div>

    <div class="footer-pro" id="footer-pro" style="display:none;">
        <div class="footer-brand">Desarrollado por Mariano Blumenfeld</div>
        <p style="font-size:12px; font-weight:700; color:#444;">La forma más simple de organizar tu cancha abierta de pádel.</p>
    </div>

<script>
    const orgId = new URLSearchParams(window.location.search).get('org');
    
    if(!orgId) {
        document.getElementById('loading-init').innerText = "Enlace incompleto.";
    } else {
        // Cargar datos del club (para nombre y etiqueta VIP)
        db.ref(`facturacion/${orgId}/cuenta`).once('value', snap => {
            const cuenta = snap.val() || {};
            document.getElementById('t-org-name').innerText = cuenta.nombreOrg || "Canchas Disponibles";
            
            // Si es fundador, le mostramos la chapa a los jugadores
            if (cuenta.esFundador && !cuenta.archivado) {
                document.getElementById('badge-fundador-container').style.display = 'block';
            }
            
            document.getElementById('header-box').style.display = 'block';
            document.getElementById('footer-pro').style.display = 'block';
        });

        // Cargar canchas disponibles
        db.ref('hubs/' + orgId).on('value', async (snap) => {
            const hubData = snap.val();
            const listContainer = document.getElementById('court-list');
            document.getElementById('loading-init').style.display = 'none';

            if (!hubData || !hubData.canchas || hubData.canchas.length === 0) {
                listContainer.innerHTML = "<div class='no-courts'>No hay canchas publicadas en este momento.<br><br>🎾 Volvé a consultar más tarde.</div>";
                return;
            }

            let htmlAcumulado = "";
            let canchasActivas = 0;
            const ahora = Date.now();
            const diasList = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

            const promesas = hubData.canchas.map(cid => db.ref('eventos/' + cid).once('value'));
            const snapshots = await Promise.all(promesas);
            
            let eventos = [];
            snapshots.forEach(s => {
                if (s.exists()) {
                    eventos.push({ id: s.key, ...s.val() });
                }
            });

            // Ordenar por fecha y hora
            eventos.sort((a,b) => new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));

            eventos.forEach((d, index) => {
                let horaFinReal = d.horaFin;
                if (!horaFinReal && d.hora) {
                    const [h, m] = d.hora.split(':');
                    const dateObj = new Date();
                    dateObj.setHours(parseInt(h), parseInt(m) + 90);
                    horaFinReal = `${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                } else if (!horaFinReal) { horaFinReal = '23:59'; }
                
                const finEvento = new Date(d.fecha + 'T' + horaFinReal).getTime();
                
                // Solo mostramos las que NO pasaron
                if (ahora <= finEvento || d.tipo === 'recurrente') {
                    canchasActivas++;
                    const ocupados = (d.inscriptos || []).reduce((acc, p) => acc + (p.cantidad || 1), 0);
                    const libres = Math.max(0, (d.cupo || 99) - ocupados);
                    const fObj = new Date(d.fecha + 'T12:00:00');
                    const fechaTxt = `${diasList[fObj.getDay()]} ${PadelSaaS.fmtFecha(fObj.getTime())}`;
                    
                    let btnHtml = "";
                    if (libres > 0) {
                        btnHtml = `<div class="btn-join">ANOTARME (${libres} lugares)</div>`;
                    } else {
                        btnHtml = `<div class="btn-join btn-full">CANCHA LLENA</div>`;
                    }

                    htmlAcumulado += `
                        <a href="i.html?id=${d.id}&org=${orgId}" class="card" style="animation-delay: ${index * 50}ms;">
                            <div class="card-header">
                                <h3 class="card-title">${d.organiza}</h3>
                                <span class="badge-cat">${d.categorias || 'Mixto'}</span>
                            </div>
                            <div class="info-row">📅 ${fechaTxt}</div>
                            <div class="info-row">🕒 ${d.hora} hs</div>
                            <div class="info-row" style="color:var(--text-main); font-size:16px; margin-top:10px;">
                                💰 <b>${PadelUtils.fmtDinero(d.valor)}</b> <small style="font-size:11px; color:var(--text-sub);">/ persona</small>
                            </div>
                            ${btnHtml}
                        </a>
                    `;
                }
            });

            if (canchasActivas === 0) {
                listContainer.innerHTML = "<div class='no-courts'>No hay canchas activas en este momento.<br><br>🎾 Volvé a consultar más tarde.</div>";
            } else {
                listContainer.innerHTML = htmlAcumulado;
            }
        });
    }
</script>
</body>
</html>
