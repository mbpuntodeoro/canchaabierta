<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Canchas - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #007aff; 
            --bg: #f2f2f7; 
            --card: #ffffff; 
            --text: #1d1d1f; 
            --sub: #86868b; 
            --success: #34c759; 
            --shadow: 0 8px 20px rgba(0,0,0,0.05); 
        }
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 50px; }
        
        header { background: #fff; padding: 25px 20px; text-align: center; border-bottom: 1px solid #e5e5e7; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -1px; }
        
        .container { max-width: 500px; margin: auto; padding: 0 15px; }

        /* ESTILO DEL EVENTO / CANCHA */
        .event-card { 
            background: var(--card); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 15px; 
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .event-header { 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            gap: 8px; 
            margin-bottom: 12px;
        }

        .event-title { 
            font-size: 18px; 
            font-weight: 800; 
            letter-spacing: -0.5px;
            margin: 0;
            line-height: 1.2;
        }

        /* EL TAG DE CATEGORÍA QUE PEDISTE */
        .tag-cat {
            font-size: 10px;
            color: var(--sub); /* Mismo color que la hora */
            background: rgba(134, 134, 139, 0.12); /* Resaltado liviano */
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap; /* Evita que la categoría se corte */
        }

        .event-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .detail-item { font-size: 13px; color: var(--sub); font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .detail-item b { color: var(--text); font-weight: 800; }

        .btn-join { 
            background: var(--primary); 
            color: white; 
            text-decoration: none; 
            display: block; 
            text-align: center; 
            padding: 16px; 
            border-radius: 16px; 
            font-weight: 800; 
            font-size: 15px;
            transition: 0.2s;
        }
        .btn-join:active { transform: scale(0.97); opacity: 0.9; }

        .status-closed { background: #f2f2f7; color: var(--sub); cursor: not-allowed; }

        .empty-msg { text-align: center; padding: 50px 20px; color: var(--sub); font-weight: 600; }
    </style>
</head>
<body>

<header>
    <h1 id="hub-name">Cargando Cartelera...</h1>
</header>

<div class="container">
    <div id="lista-eventos">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- CONFIGURACIÓN ---
    const firebaseConfig = {
        apiKey: "AIzaSyA0g_t1wW1ZIeQP9KPR-SkjiEO7HAbWGjI",
        authDomain: "padelapp-e72af.firebaseapp.com",
        databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com",
        projectId: "padelapp-e72af",
        storageBucket: "padelapp-e72af.firebasestorage.app",
        messagingSenderId: "806914592971",
        appId: "1:806914592971:web:84720063fc36a882b40b4e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const params = new URLSearchParams(window.location.search);
    const orgId = params.get('org');

    const fFec = (f) => { 
        if(!f) return '-'; 
        const ds=['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO']; 
        const [y,m,d]=f.split('-'); 
        const dt=new Date(y,m-1,d); 
        return `${ds[dt.getDay()]} ${parseInt(d)}/${parseInt(m)}`; 
    };

    if (orgId) {
        // 1. Obtener datos del Hub (Nombre)
        onValue(ref(db, `hubs/${orgId}`), async (snap) => {
            const hub = snap.val();
            if (hub) {
                document.getElementById('hub-name').innerText = hub.nombre;
                
                // 2. Cargar sus canchas/eventos
                const listContainer = document.getElementById('lista-eventos');
                listContainer.innerHTML = "";
                
                if (!hub.canchas || hub.canchas.length === 0) {
                    listContainer.innerHTML = '<p class="empty-msg">No hay canchas disponibles en este momento.</p>';
                    return;
                }

                // Recorrer IDs de canchas
                for (let cid of hub.canchas) {
                    const evSnap = await get(ref(db, `eventos/${cid}`));
                    if (evSnap.exists()) {
                        const d = evSnap.val();
                        if (d.suspendido) continue; // Si está suspendida no la mostramos

                        const card = document.createElement('div');
                        card.className = "event-card";
                        
                        const slotsLibres = Math.max(0, d.cupo - (d.inscriptos ? d.inscriptos.length : 0));
                        const isClosed = d.inscripcionesCerradas || slotsLibres <= 0;

                        card.innerHTML = `
                            <div class="event-header">
                                <h3 class="event-title">🎾 ${d.organiza}</h3>
                                <span class="tag-cat">${d.categorias || 'General'}</span>
                            </div>
                            
                            <div class="event-details">
                                <div class="detail-item">📅 <b>${fFec(d.fecha)}</b></div>
                                <div class="detail-item">⏰ <b>${d.hora} HS</b></div>
                                <div class="detail-item">📍 <b>${d.lugar}</b></div>
                                <div class="detail-item">👥 <b>${slotsLibres} LIBRES</b></div>
                            </div>

                            <a href="${isClosed ? '#' : `i.html?id=${cid}&org=${orgId}`}" 
                               class="btn-join ${isClosed ? 'status-closed' : ''}">
                               ${isClosed ? 'INSCRIPCIONES CERRADAS' : 'RESERVAR MI LUGAR'}
                            </a>
                        `;
                        listContainer.appendChild(card);
                    }
                }
            }
        });
    } else {
        document.getElementById('hub-name').innerText = "ID de Hub no encontrado";
    }

</script>
</body>
</html>
