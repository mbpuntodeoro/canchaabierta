<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - Cancha Abierta</title>
    <style>
        :root {
            --primary: #007aff;
            --bg: #f4f7f9;
            --card: #ffffff;
            --text: #1c1c1e;
            --sub: #8e8e93;
            --success: #34c759;
            --warning: #ffcc00;
            --danger: #ff3b30;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 16px; line-height: 1.5; }
        .container { max-width: 480px; margin: auto; }
        
        .card { background: var(--card); padding: 24px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.02); }
        
        /* Header */
        .header-main { text-align: center; margin-bottom: 24px; }
        .header-main h1 { font-size: 12px; letter-spacing: 1.5px; color: var(--sub); margin: 0; text-transform: uppercase; font-weight: 800; }
        .header-main .event-name { font-size: 26px; font-weight: 900; color: var(--primary); margin-top: 6px; display: block; letter-spacing: -0.5px; }

        /* Grilla de Información */
        .info-grid { background: #f9fafb; padding: 20px; border-radius: 18px; margin-bottom: 24px; border: 1px solid #edf1f7; }
        .info-item { font-size: 15px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; }
        .info-item b { color: var(--sub); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; font-weight: 700; }
        .info-item span { text-align: right; font-weight: 600; max-width: 70%; }

        /* Formulario */
        label { font-size: 11px; font-weight: 800; color: var(--sub); display: block; margin: 20px 0 8px 4px; text-transform: uppercase; }
        input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #e5e5ea; font-size: 16px; box-sizing: border-box; transition: 0.2s; background: #fff; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(0,122,255,0.08); }
        
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-outline { background: white; border: 1.5px solid var(--primary); color: var(--primary); margin-top: 12px; font-size: 14px; }
        .btn-whatsapp { background: var(--success); color: white; margin-top: 20px; }
        .btn-admin { background: #000; color: white; margin-top: 40px; font-size: 14px; }
        .btn-soporte { background: #f1f3f5; color: var(--primary); font-size: 13px; margin-top: 30px; border: 1px solid #e2e4e7; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Stats */
        .stats-table { width: 100%; border-collapse: collapse; margin: 20px 0; background: #fafbfc; border-radius: 16px; overflow: hidden; border: 1px solid #eee; }
        .stats-table td { padding: 14px 18px; font-size: 15px; border-bottom: 1px solid #f0f0f0; }
        .stats-table tr:last-child td { border-bottom: none; }
        .stat-val { font-weight: 800; float: right; color: var(--text); }

        /* Lista */
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f2f2f7; }
        .estado-btn { padding: 10px 14px; border-radius: 12px; font-size: 11px; color: white; font-weight: 800; text-align: center; min-width: 140px; cursor: pointer; border: none; }
        .pagado { background: var(--success); }
        .reservado { background: var(--warning); color: #000; }
        .pendiente { background: var(--danger); }

        .hidden { display: none !important; }
        .footer-credits { text-align: center; margin-top: 40px; font-size: 10px; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="view-user">
        <div class="header-main">
            <h1>🎾 INSCRIPCIÓN CANCHA ABIERTA</h1>
            <span id="txt-evento-name" class="event-name">Cargando...</span>
        </div>

        <div class="info-grid">
            <div class="info-item"><b>📅 Fecha</b> <span id="txt-fecha">-</span></div>
            <div class="info-item"><b>🕒 Horario</b> <span id="txt-hora">-</span></div>
            <div class="info-item"><b>📍 Lugar</b> <span id="txt-lugar">-</span></div>
            <div class="info-item"><b>👤 Organiza</b> <span id="txt-organizador">-</span></div>
            <div class="info-item" style="margin-top:12px; border-top: 1px solid #eee; padding-top: 12px;">
                <b>💰 Valor</b> <span id="txt-valor" style="font-size: 18px; color: var(--primary);">$0</span>
            </div>
            <div class="info-item"><b>🏦 Alias</b> <span id="txt-alias" style="color: var(--danger); font-size: 16px;">-</span></div>
        </div>

        <div id="form-container">
            <input id="in-nom" placeholder="Nombre y Apellido">
            <input id="in-cel" placeholder="WhatsApp" style="margin-top: 12px;">
            <button class="btn-primary" onclick="inscribirse()">Anotarme ahora</button>
        </div>
        
        <div id="msg-cerrado" class="hidden" style="text-align: center; padding: 30px; font-weight: 900; color: var(--danger);">
            🚫 INSCRIPCIONES CERRADAS
        </div>
    </div>

    <div class="card hidden" id="view-success">
        <div style="text-align: center; padding: 10px 0;">
            <div style="font-size: 60px; margin-bottom: 15px;">✅</div>
            <h2 style="margin: 0; font-size: 24px; font-weight: 900;">¡Anotado correctamente!</h2>
            <div style="background: #f1f3f5; padding: 24px; border-radius: 20px; margin: 24px 0; border: 1px solid #e5e5ea;">
                <span id="ex-monto" style="font-size: 32px; font-weight: 900; color: var(--text);">$0</span>
                <hr style="border: none; border-top: 1px solid #ddd; margin: 15px 0;">
                <span id="ex-alias" style="font-size: 18px; font-weight: 800; color: var(--primary);">-</span>
            </div>
            <button class="btn-whatsapp" onclick="enviarWhatsapp()">📲 Enviar comprobante</button>
            <button class="btn-outline" onclick="location.reload()">Volver</button>
        </div>
    </div>

    <div class="card hidden" id="view-admin">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <h2 style="margin:0; font-size: 20px;">Configuración</h2>
            <button onclick="location.reload()" style="background: #f1f3f5; width: auto; padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: 700;">Cerrar</button>
        </div>

        <label>Staff y Evento</label>
        <input id="ed-org-name" placeholder="Nombre del Evento">
        <input id="ed-staff" placeholder="Nombre del Organizador" style="margin-top: 10px;">
        <input id="ed-celu" placeholder="WhatsApp Organizador (549...)" style="margin-top: 10px;">

        <label>Fecha y Club</label>
        <input id="ed-fec" type="date">
        <input id="ed-hor" placeholder="Horario" style="margin-top: 10px;">
        <input id="ed-lug" placeholder="Lugar" style="margin-top: 10px;">

        <label>Precio y Alias</label>
        <input id="ed-val" type="number" placeholder="Costo">
        <input id="ed-ali" placeholder="Alias MP" style="margin-top: 10px;">
        <input id="ed-cup" type="number" placeholder="Cupos totales" style="margin-top: 10px;">
        
        <label>Seguridad</label>
        <input id="ed-pass" type="password" placeholder="Clave admin">

        <button class="btn-primary" onclick="guardar()" style="margin-top: 25px;">💾 Guardar Cambios</button>
        <button id="btnLock" onclick="toggleBloqueo()"></button>

        <table class="stats-table">
            <tr><td>🎾 Cupos Totales <span id="st-cupo" class="stat-val">-</span></td></tr>
            <tr><td>✅ Libres <span id="st-lib" class="stat-val" style="color: var(--success);">-</span></td></tr>
            <tr><td>💸 Pagaron <span id="st-pag" class="stat-val">-</span></td></tr>
            <tr><td>🤝 Pagan en cancha <span id="st-res" class="stat-val">-</span></td></tr>
            <tr><td>⏳ Pendientes <span id="st-pend" class="stat-val">-</span></td></tr>
        </table>

        <div id="lista-admin" style="margin-top: 20px; border-top: 2px solid #f2f2f7;"></div>

        <button class="btn-soporte" onclick="window.open('https://wa.me/5491166463800?text=Hola%20Mariano,%20necesito%20soporte%20técnico%20con%20Cancha%20Abierta')">
            🆘 Soporte Técnico (Mariano)
        </button>
    </div>

    <button id="btnSwitch" class="btn-admin" onclick="abrirAdmin()">⚙️ Panel de Organizador</button>

    <div class="footer-credits">
        MARIANO BLUMENFELD — CANCHA ABIERTA V3
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || 'demo';
    const evRef = ref(db, 'eventos/' + id);
    let ev = {};

    onValue(evRef, (snap) => {
        ev = snap.val() || {};
        if (!ev.inscriptos) ev.inscriptos = [];
        render();
    });

    window.abrirAdmin = () => {
        const p = prompt("Contraseña:");
        if (p === ev.password || p === "Cancha2026") {
            document.getElementById('view-user').classList.add('hidden');
            document.getElementById('view-admin').classList.remove('hidden');
            document.getElementById('btnSwitch').classList.add('hidden');
            
            document.getElementById('ed-org-name').value = ev.organiza || "";
            document.getElementById('ed-staff').value = ev.organizador_nombre || "";
            document.getElementById('ed-lug').value = ev.lugar || "";
            document.getElementById('ed-fec').value = ev.fecha || "";
            document.getElementById('ed-hor').value = ev.hora || "";
            document.getElementById('ed-val').value = ev.valor || 0;
            document.getElementById('ed-ali').value = ev.alias || "";
            document.getElementById('ed-cup').value = ev.cupo || 0;
            document.getElementById('ed-celu').value = ev.celuOrganizador || "";
            document.getElementById('ed-pass').value = ev.password || "";
        }
    };

    window.guardar = () => {
        update(evRef, {
            organiza: document.getElementById('ed-org-name').value,
            organizador_nombre: document.getElementById('ed-staff').value,
            lugar: document.getElementById('ed-lug').value,
            fecha: document.getElementById('ed-fec').value,
            hora: document.getElementById('ed-hor').value,
            valor: parseInt(document.getElementById('ed-val').value) || 0,
            alias: document.getElementById('ed-ali').value,
            cupo: parseInt(document.getElementById('ed-cup').value) || 0,
            celuOrganizador: document.getElementById('ed-celu').value.replace(/\D/g,''),
            password: document.getElementById('ed-pass').value
        }).then(() => alert("¡Configuración guardada!"));
    };

    window.inscribirse = () => {
        const n = document.getElementById('in-nom').value.trim();
        const c = document.getElementById('in-cel').value.trim();
        if(!n || !c) return alert("Faltan datos");
        
        ev.inscriptos.push({ 
            id: Date.now(), 
            statusTime: Date.now(), 
            nombre: n, 
            celular: c, 
            estado: 'pendiente' 
        });
        set(ref(db, 'eventos/'+id+'/inscriptos'), ev.inscriptos).then(() => {
            document.getElementById('view-user').classList.add('hidden');
            document.getElementById('view-success').classList.remove('hidden');
        });
    };

    window.cambiar = (originalId) => {
        const idx = ev.inscriptos.findIndex(x => x.id === originalId);
        const ciclos = ["pendiente", "reservado", "pagado"];
        ev.inscriptos[idx].estado = ciclos[(ciclos.indexOf(ev.inscriptos[idx].estado) + 1) % 3];
        ev.inscriptos[idx].statusTime = Date.now(); 
        set(ref(db, 'eventos/'+id+'/inscriptos'), ev.inscriptos);
    };

    window.toggleBloqueo = () => update(evRef, { bloqueado: !ev.bloqueado });

    window.enviarWhatsapp = () => {
        const m = `✅ Hola! Soy ${document.getElementById('in-nom').value}. Envío comprobante de $${ev.valor} para ${ev.organiza}`;
        window.open(`https://wa.me/${ev.celuOrganizador}?text=${encodeURIComponent(m)}`);
    };

    function render() {
        document.getElementById('txt-evento-name').innerText = (ev.organiza || "Cargando...").toUpperCase();
        document.getElementById('txt-organizador').innerText = ev.organizador_nombre || "A confirmar";
        
        let fAmi = ev.fecha || 'A confirmar';
        if(ev.fecha) {
            const fO = new Date(ev.fecha + "T00:00:00");
            fAmi = new Intl.DateTimeFormat('es-ES', { weekday: 'long', day: 'numeric', month: 'long' }).format(fO);
        }
        document.getElementById('txt-fecha').innerText = fAmi.toUpperCase();
        document.getElementById('txt-hora').innerText = ev.hora || '--:--';
        document.getElementById('txt-lugar').innerText = ev.lugar || 'A confirmar';
        document.getElementById('txt-valor').innerText = "$" + (ev.valor || 0).toLocaleString();
        document.getElementById('txt-alias').innerText = ev.alias || '-';
        document.getElementById('ex-monto').innerText = "$" + (ev.valor || 0).toLocaleString();
        document.getElementById('ex-alias').innerText = ev.alias || '-';

        const bLock = document.getElementById('btnLock');
        bLock.innerText = ev.bloqueado ? "🔓 ABRIR INSCRIPCIONES" : "🔒 CERRAR INSCRIPCIONES";
        bLock.style.background = ev.bloqueado ? "var(--success)" : "var(--danger)";
        bLock.style.marginTop = "12px";
        document.getElementById('form-container').className = ev.bloqueado ? "hidden" : "";
        document.getElementById('msg-cerrado').className = ev.bloqueado ? "" : "hidden";

        const ins = ev.inscriptos || [];
        const pag = ins.filter(x => x.estado === 'pagado').length;
        const res = ins.filter(x => x.estado === 'reservado').length;
        const pen = ins.filter(x => x.estado === 'pendiente').length;

        document.getElementById('st-cupo').innerText = ev.cupo || 0;
        document.getElementById('st-lib').innerText = (ev.cupo || 0) - (pag + res);
        document.getElementById('st-pag').innerText = pag;
        document.getElementById('st-res').innerText = res;
        document.getElementById('st-pend').innerText = pen;

        const weight = { 'pagado': 1, 'reservado': 2, 'pendiente': 3 };
        const listaOrdenada = [...ins].sort((a, b) => {
            if (weight[a.estado] !== weight[b.estado]) return weight[a.estado] - weight[b.estado];
            return (a.statusTime || a.id) - (b.statusTime || b.id);
        });

        let html = "";
        listaOrdenada.forEach((p) => {
            const label = p.estado === 'reservado' ? 'PAGAN EN CANCHA' : p.estado.toUpperCase();
            html += `
            <div class="admin-item">
                <div><b>${p.nombre}</b><br><small style="color:var(--sub)">${p.celular}</small></div>
                <button class="estado-btn ${p.estado}" onclick="cambiar(${p.id})">${label}</button>
            </div>`;
        });
        document.getElementById('lista-admin').innerHTML = html || "<p style='text-align:center; padding:30px; color:#999;'>Sin inscriptos</p>";
    }
</script>
</body>
</html>
