<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="app-config.js?v=2"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; --danger: #ff3b30; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; }
        header { background: #fff; padding: 25px; text-align: center; border-bottom: 1px solid #e5e5e7; }
        .container { max-width: 500px; margin: auto; padding: 20px 15px; }
        .event-card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; margin-left: 8px; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); margin-top: 10px; font-weight: 600; }
        .btn-join { background: var(--primary); color: white; text-decoration: none; display: block; text-align: center; padding: 18px; border-radius: 18px; font-weight: 900; margin-top: 20px; text-transform: uppercase; }
        .footer-personal { text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid #eee; }
        .btn-orange { background: #ff9500; color: white; text-decoration: none; padding: 14px 25px; border-radius: 50px; font-weight: 900; font-size: 13px; display: inline-block; margin-top: 10px; }
        .suspendido-box { background: #fff2f2; border: 2px solid #ffdbdb; border-radius: 24px; padding: 30px; text-align: center; margin-top: 20px;}
        .suspendido-box h2 { color: var(--danger); font-weight: 900; margin: 0 0 10px 0; text-transform: uppercase;}
        .suspendido-box p { color: #888; font-weight: 600; font-size: 14px; margin: 0; }
    </style>
</head>
<body>
    <header><h1 id="hub-name" style="margin:0; font-weight:900">Cargando Cartelera...</h1></header>
    <div class="container">
        <div id="lista-eventos"></div>
        <div class="footer-personal">
            <p style="font-size:10px; font-weight:800; color:#ccc; letter-spacing:1px">DESARROLLADO POR MARIANO BLUMENFELD</p>
            <a href="https://wa.me/5491166463800" class="btn-orange">💬 ¿DUDAS? ESCRIBIME</a>
        </div>
    </div>
<script>
    const orgId = new URLSearchParams(window.location.search).get('org');

    if(orgId) {
        db.ref(`facturacion/${orgId}`).on('value', snapF => {
            const dataF = snapF.val() || {};
            const cuentaInfo = dataF.cuenta || {};
            const movimientos = dataF.movimientos || {};
            
            document.getElementById('hub-name').innerText = cuentaInfo.nombreOrg?.toUpperCase() || orgId.toUpperCase();
            
            const res = PadelSaaS.analizarCuenta(cuentaInfo, movimientos);
            const isBlocked = res ? res.isBlocked : false;

            const list = document.getElementById('lista-eventos');
            
            if (isBlocked) {
                list.innerHTML = `<div class="suspendido-box"><h2>🚫 Canchas no disponibles</h2><p>Los turnos de este organizador se encuentran temporalmente suspendidos.</p></div>`;
                return; 
            }

            db.ref('hubs/'+orgId).once('value', async snapH => {
                const ids = snapH.val()?.canchas || [];
                let canchasData = [];
                
                for(let id of ids){
                    const eSnap = await db.ref('eventos/'+id).once('value');
                    if(eSnap.exists()) {
                        const d = eSnap.val();
                        
                        let horaFinReal = d.horaFin;
                        if (!horaFinReal && d.hora) {
                            const [h, m] = d.hora.split(':');
                            const dateObj = new Date();
                            dateObj.setHours(parseInt(h), parseInt(m) + 90);
                            horaFinReal = `${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
                        } else if (!horaFinReal) {
                            horaFinReal = '23:59';
                        }

                        const finEvento = new Date(d.fecha + 'T' + horaFinReal).getTime();
                        
                        if(Date.now() < finEvento && d.estado !== 'suspendida') {
                            canchasData.push({ id, horaFinCalculada: horaFinReal, ...d });
                        }
                    }
                }
                
                canchasData.sort((a,b) => new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));
                list.innerHTML = "";
                
                if(canchasData.length === 0) {
                    list.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--sub); font-weight: 800;">No hay turnos programados por el momento.</div>`;
                }

                const diasSemana = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

                canchasData.forEach(d => {
                    const fObj = new Date(d.fecha + 'T12:00:00');
                    const fechaTxt = `${diasSemana[fObj.getDay()]} ${PadelSaaS.fmtFecha(fObj.getTime())}`;

                    list.innerHTML += `<div class="event-card">
                        <div style="display:flex;align-items:center;justify-content:space-between;">
                            <h3 style="margin:0;font-size:18px;font-weight:900;text-transform:uppercase">🎾 ${d.organiza}</h3>
                        </div>
                        <div style="margin-top: 5px;"><span class="tag-cat" style="margin-left:0;">${d.categorias || 'TODAS LAS CATEGORÍAS'}</span></div>
                        
                        <div class="info-row" style="margin-top:15px;">📅 ${fechaTxt} | 🕒 ${d.hora} a ${d.horaFinCalculada} hs</div>
                        <div class="info-row">📍 ${d.lugar || 'Sede a confirmar'}</div>
                        <div class="info-row">👤 Organiza: ${d.nombreOrganizador || 'No especificado'}</div>
                        
                        <div class="info-row" style="font-size: 16px; color: var(--text); font-weight: 900; margin-top: 15px;">💰 ${PadelUtils.fmtDinero(d.valor)}</div>
                        <a href="i.html?id=${d.id}&org=${orgId}" class="btn-join">ANOTARME</a>
                    </div>`;
                });
            });
        });
    }
</script>
</body>
</html>
