<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera - PadelApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #007aff; --bg: #f2f2f7; --card: #ffffff; --text: #1d1d1f; --sub: #86868b; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; }
        header { background: #fff; padding: 25px; text-align: center; border-bottom: 1px solid #e5e5e7; }
        .container { max-width: 500px; margin: auto; padding: 20px 15px; }
        .event-card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .tag-cat { font-size: 10px; color: var(--primary); background: #eef6ff; padding: 4px 10px; border-radius: 8px; font-weight: 800; text-transform: uppercase; margin-left: 8px; }
        .info-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--sub); margin-top: 10px; font-weight: 600; }
        .btn-join { background: var(--primary); color: white; text-decoration: none; display: block; text-align: center; padding: 18px; border-radius: 18px; font-weight: 900; margin-top: 20px; }
        .footer-personal { text-align: center; margin-top: 50px; padding: 20px; border-top: 1px solid #eee; }
        .btn-orange { background: #ff9500; color: white; text-decoration: none; padding: 14px 25px; border-radius: 50px; font-weight: 900; font-size: 13px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1 id="hub-name" style="margin:0; font-weight:900">PadelApp</h1></header>
    <div class="container">
        <div id="lista-eventos"></div>
        <div class="footer-personal">
            <p style="font-size:10px; font-weight:800; color:#ccc; letter-spacing:1px">DESARROLLADO POR MARIANO BLUMENFELD</p>
            <a href="https://wa.me/5491166463800" class="btn-orange">💬 ¿DUDAS? ESCRIBIME</a>
        </div>
    </div>
<script>
    firebase.initializeApp({ databaseURL: "https://padelapp-e72af-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    const orgId = new URLSearchParams(window.location.search).get('org');
    function fmtFecha(f) {
        if(!f) return '--';
        const dias = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
        const d = new Date(f + 'T00:00:00');
        return dias[d.getDay()] + ' ' + f.split('-').reverse().slice(0,2).join('/');
    }
    if(orgId){
        db.ref(`facturacion/${orgId}/cuenta`).on('value', s => { document.getElementById('hub-name').innerText = s.val()?.nombreOrg?.toUpperCase() || orgId.toUpperCase(); });
        db.ref('hubs/'+orgId).on('value', async snap => {
            const list = document.getElementById('lista-eventos');
            const ids = snap.val()?.canchas || [];
            let canchasData = [];
            for(let id of ids){
                const eSnap = await db.ref('eventos/'+id).once('value');
                if(eSnap.exists()) {
                    const d = eSnap.val();
                    if(d.estado !== 'deshabilitada') canchasData.push({ id, ...d });
                }
            }
            canchasData.sort((a,b) => new Date(a.fecha+'T'+a.hora) - new Date(b.fecha+'T'+b.hora));
            list.innerHTML = "";
            canchasData.forEach(d => {
                list.innerHTML += `<div class="event-card">
                    <div style="display:flex;align-items:center"><h3 style="margin:0;font-size:18px;font-weight:800;text-transform:uppercase">🎾 ${d.organiza}</h3><span class="tag-cat">${d.categorias}</span></div>
                    <div class="info-row">📅 ${fmtFecha(d.fecha)} | 🕒 ${d.hora} a ${d.horaFin || '--'} hs</div>
                    <div class="info-row">📍 ${d.lugar || 'Sede a confirmar'}</div>
                    <a href="i.html?id=${d.id}&org=${orgId}" class="btn-join">ANOTARME</a>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
